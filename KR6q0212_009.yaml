body:
  text: 東吳毛晉子晉編閲鄂州記室智時較訂詩甲之一銅井時杪冬還山口占還山正及是殘冬乘興門前一拄笻欲望琴川呼艇處寒雲已隔最高峰招鶴兄西山看梅八首山樓無事恣清談曾約看梅到我菴冷地梅開思舊話日遲帆影破春嵐二西山遠峙太湖隈同道相尋不易來所喜自來民俗古四時生計只鋤梅三湖濱梅圃一家家臘月時暄小放葩深謝鄰菴有方誼頻來邀看早開花四青山高下總皆梅春力花顏曉夜催不出戶庭聊縱目也疑香國飽餐回五梅椒糝雪露微紅開落他山亦自同爭若環湖三十里平鋪如雪傲春風六空山梅放寂無聲一點寒香壓衆英坐怪看花多熱鬧那知花不近人情七百草頭邊是祖機謾云吾道色香非湖山佳處梅千樹苔骨冰花聽指揮八忽地寒香撲面來當人鼻孔洞無埋翻思昔日靈雲鈍何待桃花三月開庚辰夏再登銅井設關禁足銅井山菴坐半巔開門湖水漾漪漣三年兩度來休夏一鉢孤峰踵昔賢松子落時閒植杖梅花開際偶移船只今收足圓光裏祗在山中又一天馮荃升文學冒暑過訪跫然足音至棲息豈琳宮道味同嘗蠟詩懷欲化虹再扶蓮社範不減竹林風磐礡清陰下涼生語笑中新秋書事大火西流令序長庭梧一葉報新涼棲遲松院閒堪詠想像荷風遠亦香野老雲霓方切望平疇禾稼未登黃山家雖不憂時事擊壞謳歌世願康晚秋寓湖上青山不改舊時紅宛轉霜林遠近通曳策斷橋殘照裡坐看秋意畫難工冬日放舟鶴湖抵梅居晤周君謨孝廉走筆書贈淡蕩鶴湖水東流幾盤曲朔風激揚之塞波渙層緑我舟為誰來有客在其澳筆寫尼山文記欣耆闍囑現身冠履場和光導塵俗相聞固有年茲秋乃面矚坦度見襟期端操徵素蓄靡靡末法運力為樹竿纛斯人念不忘斯行遂所欲城闥一水渡第宅如鱗簇何為居士居梅花環小築何者居士風蕭蕭數竿竹再晤別無言兩眼對雙目宴坐以終日去住各無束哂彼鈍根師法施嫌未足龍湖蚤發擬之長水阻風泊王江涇作冬行苦日短舟發嘗恐遲誰謂出溪口北風變南吹湖端擁千浪舟首如鳴槌一浪逆百槳槳槳抱艱危舟子競努力胥稱腕力疲雲黃日易暮告我增畏疑水宿固有程或瞑焉可期不若風隔處穩將孤舟艤我心為之制動靜隨所宜岸傍得閒立水際雜有窺近廛正作市人語叢叢私顧我以為異不言心若思石梁駕河曲奔走知是誰鳧鴨何乃縱出沒波問嬉物習從所慣異哉忘險夷爰有遠商舶前邁捷如馳歎彼能勇往不為風波欺指以語同舟篙師佯不知永懷濟川意扣舷聊自怡題穎源弟靜室朱砂澗傍精廬小門設嘗關人境杳當軒不知何代松摩空猶龍勢夭矯暮鼓晨鐘有比鄰雲荒日冷無飛鳥山僧晏起無事營自將落葉空庭掃婁江靜室曉作落落村雞叫數聲床頭睡漢盡惺惺茅簷不覺霜花落衲被寒深是五更宿虎丘西隱浪遊忘卻山中宿枕上悠然夢不同到曉高樓鐘鼓靜幽禽語語喚春風過不二上人傍溪精舍兩三楹炯炯軒窗一色明靜者安居觀實相不妨門外弄橈聲題竹野竹蕭蕭紙上留展來眉睫頓生秋香嚴去後何人識拳石從傍解點頭再登程純甫書樓虛閣登來非一度清秋良晤更相宜謾言襆被中宵宿最好斜陽遠望時張靜垣同舟至乾元菴扁舟隨我過龍湖高掛風帆興不孤相坐空堂未鳴磬秋聲瑟瑟起茭蘆詩部甲之二古南時上折蘆菴二首野情愛枕石頭眠同道招遊煙水邊坐有軒窗堪望遠行非舟楫莫教前芙渠露冷花猶照蘆葦秋深葉盡偏偶憶朱涇垂釣意離鉤三寸驗諸禪矮矮柴門向水開煙林四面繞池臺安居自不生凡想晦跡從言養聖胎清曉語聞幽樹鳥中宵夢入白雲堆隔溪肴見迷津者不惜拋蘆為渡來開爐古南閲諸衲子除夕之作祖風導世古凌然荒院開爐順昔緣杖子山形全正今柴頭品字發新煙兒童竹馬看相戲村里桃符又改年笑我端居無事想也隨人和歲除篇村懷三首村荒遠人事不異居深山門庭無棲泊鳥雀閒往還二水邊與林下原是道人居生性送迎懶非關絶交書三驟雨夜來過春池徹底清自非濠上客時有觀魚情溪濱落花觸目成偈五首長溪昨夜殷其雷驟雨繁花打作堆有客夢中方栩栩朱顏未信一時頽二花下一壺難得醉人間兩鬢易成絲負趨休訝南華語川上徘徊有仲尼三誰家梁燕羽差池實相深談自不知也惜落花銜上下忙忙直作有情癡四緑陰漸漸暗香臺餘萼葳蕤葉底開最苦游蜂情不斷不辭溪路遠飛來五春風行令自無虛花落花開總信渠吹盡殘紅無著處拈來水面飼遊魚杪秋晤唐祈遠於烏戍書園涼風無事坐荒村呼艇來尋不二門高閣倚空連野色寒花照眼抹秋痕峰巒峭峻忘成簣潭水汪洋擬擲綸獅座試憑機掣覓毗耶誰道竟無言九日於住波菴小閣秋杪金風涼遠行思故鄉故鄉在何處眠來知夜長宿當湖西林寺二首當湖煙水際古殿何時興清梵中宵發東吹過舊城二空樓隔市廛一似絶人煙曉日推窗起稻花香滿田題金山圖二首微茫江岸草蕭蕭水次蒼山有姓焦自昔漁人嘗此泛不知南北是何朝二江面微風撼塔鈴塔中長日走江聲剎竿便是瓜洲渡北望長安自此行寄懷天台靈鷲寺石奇和尚二首溪院經年坐春條暖日熏幾思華頂月未踏石橋雲病骨悲同立深言近莫聞溪山原不異終惜一江分二平野春光潤寒巖遼燒熏法筵餘凍雪木座擁高雲杖擊峰齊舞花拈衆樂聞靈山一會在今古又何分贈褚鳳廷道翁壯年雄志四方攜京國風光入馬蹄何似耆年真受用時尋寂樂遇招提褚鳳廷宅看閩中將樂石信是他山石從來未有觀移時踰峻嶺止處近微瀾宛具全峰勢如蒙宿霧寒真光無外泄仁壽此中安登魯菴水閣右個小閣真如斗登來眼豁然溪聲通足下山意在簷邊蒼竹亭亭立斜陽淡淡懸火雲蒸六月想就北窗眠寄吳門玄若機公二首惘惘窮途客年年畏卜居自將同鶴跡時以負角書最可知心久能忘晤面初遙思吟臥處昔竹近何如二溪柳緣參差溪光無定時十年林下誼五字客中詩燕乳花將盡鶯鳴席未移閒將臨水意報與故人知春暮雜詠十首春眠溪院冷無雲曉夢禽聲亦有聞遙憶故山湖水上梅花如雪早紛紛二丈室虛閒篆縷浮忘言摩詰病無儔春風欲盡繩床臥問疾何人一唱酬三梅子青青花事稀後開籬落有薔薇日長隱几心無住閒看中林蝶影飛四溪上花殘少客遊虛廊鎮日似山幽階前稚竹無心長柔緑枝枝自可眸五阡陌猗然帶女桑水村幽致未云荒一茅欲避溪雲暖白石青松詎可忘六小艇桃源未得尋楊花飛落水深深白鷗黃鳥閒相識不礙時時在柳陰七出岫無心雲片片銜花有意鳥雙雙卻嫌㯉性彌年懶只麼閒閒臥北窗八一花到地春隨去數竹穿泥夏早來坐愛薰風應時節不時吹我殿扉開九柔桑采朵碧溪灣蠶月安居自得閒竹杖靠軒聊探水草鞋懸壁待看山十一任飛花落古菴垂絲千尺在深潭打魚船子真為逸顛酒曹山未是憨夢戒雷震公二首有序公梁溪人也倜儻有英氣喜屬詩初與豫遊期明己事後以一代時教講席多立門戶欲窮其致焚膏繼晷苦心幾二十年庚辰冬從南都得疾旅臥吳門之龍樹菴不起無葬地友人慈築火化之移其骨歸石盂山夏夜雨不息孤燈耿無煙伏枕忽成寐故人來我前容顏宛如昔蹈厲殊翩翩緬懷平生歡把臂憑高筵詢之別來意欲語仍默然有若分題夜搆思入虛玄不知萍梗蹤宿痾何時痊前冬遠聞訃無乃夢中傳二吾生四方遊所立望同志於何此相見微覺較前異攢眉對知己何者不得意我留煙村間春夏已易二眷言姑蘇山有君敦道義惠然肯來顧所感不相棄溪花已無飛梅雨適時至水田亂蛙鳴中夜警無睡枕簞時轉側神情見游戲與君學無生生死何足纍君雖乘白雲未忘法門季謂君夢中來能免數行淚夏晚同程純甫菴後散步二首三年不見常時想六月能過一面歡舊路未忘無待引新墻初築且須觀二犁鋤遠近皆耕水殿閣東南忽打雷竹扇葛衣涼正納村風溪雨夜俱來范遵甫覽豫山偈擊節別後寄贈二首天壤有斯文世界不空立精華古人味天機信吐翕在昔洙泗沒餘響授參伋德者必有言聖經賴明緝率循間隱怪厥中方允執百世誰則師性道于焉集以茲願學衆水流必就濕君家大范風文行乃固習豈直正冠履兼知浩篇什英英高雲志青紫可芥拾而余山林人於世何汲汲違親影惟單遠遊歲踰草死生古稱大用是眉宇急徒懷孝友意莫耕桑梓粒感彼陟岵吟中情每岌岌途窮忽返步縣解本無縶抱病欣忘言望古如不及白雲曾高臥青溪一停笠詞章非我事紙墨何暇給偶然流胸襟造次欲滿笈嗟咨自成趣敢落文字級時值枯稿流把讀嘆艱澀誰謂風雅倫見之反珍襲擇術本相異臭味何忽入得非君之懷化理有所吸春花落何處蜂髯爭嗜汁空庭雨餘後竹色正霑浥坐次忘舞蹈風中豁於邑冥心太古上干戈等讓揖乃知楊朱徒多岐自為泣千古惟春雷可以動凡蟄二聖賢生憂患智者當以勗君子所為貴落落乃如玉緬思古先王與聚遂民欲使如登春臺有若醉醽醁飲食會男女水火視菽粟一夫澤不被自慊失亭毒吁嗟斯民中誰者能拔俗簡編不將事風塵屢僕僕斗酒使氣揚青銅照髮緑徒然負此軀大道莫可告君資誠卓秀義理自天屬晏如環堵間蔬水歡亦足文章列芻豢今古靡不囑心力久為殫辛苦過自督胡然遭蹭蹬志不逞鴻鵠天命若可把人事多所局荏苒歲華逝淹留日月促回也其庶乎屢空得君續懷抱幸自寬固窮節不辱三生因緣在讀我林下録恍然投法味快得我心曲竊嗟有生類難解濁世梏鬚眉均丈夫有髮何曲局良驥躍千里要當秣以蓐神魚入重淵其奈網罟數遭逢時有待淪溺苦惟酷君看血氣儔初非不息燭一念從之迷百身亦何贖飛舉欲仙仙妄矣登真籙所以大觀士三界指為獄榮名悲草露甲兵笑蠻觸霸王同一化不讓吳與蜀未聞千載後周鼎在郟鄏我言雖曰放君志乃可沃結纓生未知賢也徒結束聞道夕死可聖兮想其躅時乎不再來逝者亦云速念茲如臨淵其勿寢安褥曠劫良在今萬古碧潭淥晦明在吾眼旋轉任朝旭聿來竹院中宴坐消暑溽法緣偶相聚情好永為篤寧靜近枯淡紛譁謝繁縟因以性命憂要君醍醐浴謾嗤奔蜂微而以化藿蠋久雨梅溪為水鄉一雨經彌月溪流忽高岸舟行如地發天地煙濛濛暑月冷侵骨朝旭豈全蔽晚雷聲不歇所棲異孤峰卑濕上履襪布衲暈白花烘爐無榾拙土階時浸潤出戶有顛蹶老農樹新苗日夕恐見沒荷蓑來遠阡皤然曲鬚髮口稱去年旱溝水村村竭桔槔喧中夜用力徒搰搰今年雨水多川壇不煩謁屋茅雖漏爛上天何敢忽鄰翁偶相值與語同咄咄眷彼淳古意想見休明碣取貌誠則野近仁信哉訥歸來坐室中抱膝亦如兀稍晴軒窗開輒喜遠帆突蒼蒼長天空靄靄陰翳揭杖藜有高情思同采山蕨刪竹二首素性愛丘壑煙村無半峰少留林間意惟此竹一叢入夏取涼便嫌彼枝葉濃斜陽自披剪于以利其鋒運斤值新霽寒翠衫袖封坐石矚高蔭約略欲無重清風應手至幽韻如吹松生成聳秀幹亭亭無秋冬問起有數枝培土同厚鬆立節甚不直謾嗟難見容快哉當西北剪擇空蒙茸忽見天一方高明曠心胸又種竹非遣俗竹中自無塵虛心持特操待老完其真豈欲故伐汝縛去同柴薪昨者北窗下所黜皆非珍況爾當前軒耳目之所親到門無爽氣何以慰嘉賓昏昏但蒙密卑身風雨晨中豈無卓立或難前自陳信哉物因混君子慚經綸吾今選於衆孰曰無其仁疇昔一擊士知非等閒人古木古木臨高簷兀然墮其枝風霜久獨立緑竹左右之木得竹而葉竹同木而欹微風行是中蕭蕭息相吹木喜竹多韻竹欣木無奇木獨存老意竹各挺秀姿並處無嫌猜歲寒將與期木也若無用去之非所宜返照斜日欲西落餘光射東垣萬象復輝映溪林寂無喧其時有逸者與客坐中軒撫茲一過目有會忘乎言移蕉微蕉托我庭始生亦殊苦數日抽一葉畏風莫敢舞遂有清音來曉空落疏雨獨以遠窗下來者恐相侮清晨手種過東西同一土暫移若違性全身忽傴僂茲物體本空衆葉偶合聚觸類悟其軀在乎明眼睹因思滋舊根盆水頻掬取山情近草木非關過惜撫待看碧陰高清涼映簾廡摘瓜天地好生物寸土不空荒人力輔之運溉灌扶其良遂致竹架碧映斯瓜實黃葉大冒赤日蔓延上新篁懸蒂影直直及晨露瀼瀼每資伊蒲饌齒舌有潔香疑傳青門種藝此招提房我摘非不惜恐其秋忽霜凡物不虛生利用乃為臧當美不飫人過時徒自傷君看映階草不栽亦自長青青交春夏殊省撫視忙所因無致用任之委爨傍曝書伊誰於古初巧製此文字賢哲去千載心精儼相示目擊不容聲蕩默立天地賴以正衆情多聞未為至何哉蠹魚癡咀嚼競從事飽腹而已矣寧達作者意我生輕外物自期行古志負之為遠遊未嘗窮途棄晤對樂無時膠漆投不異於今久彌敬朝夕發幽祕秋陽以暴之古人端在是任彼老斫輪乃以糟粕視觀帖曾聞古之人有工臨池筆灑墨不苟然落紙皆有律末學怪膚甚各信手腕出深觀凝其思默默增恂栗何乃風格殊何乃點畫一六書稱一藝古為童子恤何乃及其至作者亦憚述擬似神已死脫法豈終吉縱橫得體間其妙難意必欲速敢窺奧手拙徒費日所以入道門種性許超逸矜式惟苦心臻化能事畢觀魚小池良不寬中有數尾魚莫知其誰饋畜之傍我廬魚躍時洋洋豫覺日于于相忘不知樂各自遂厥初微物信亦神呼吸波光舒曉窗騰竹霧恆疑其巨噓尾赬曾無勞水清行自如悠然非江湖潛處歲月餘鯨鯢沉巨浸任竿難放渠衆鱗在他水往往登庖廚皆因身味厚自致戕全軀所以達生士掩材類山㯉一龍復一蛇世罟不能漁隱見終天年淡漠神明居得非其慮遠所適為之殊納涼九月霜露降無衣悲歲窮六月日酷甚把扇思清風有生雖云衆極其體則同感觸以自遣端苦寒暑攻何如息心士煩熱消胸中三伏坐竹院有時吟孤桐大汗豈不流微涼時覺通鳴磬及午飯火雲正燒空自喜得閒暇解衣忘蘊隆晚來簷前踞久焉盻蒼穹依徊二三子語話隨其衷殿戶闃寂寞河漢高昭融微蚊揚輕扇小鳥伏蒿蓬四體喜無倦深更惜餘功匏葉露涓滴竹陰月朦朧臥去室生白覺來窗日紅爽心良在茲遺世非所崇緬思天地運循環何時終又觀魚近水多見魚在山多見鳥見鳥羡高飛見魚欣伏沼魚鳥本無機人情自為杳華亭古都會煙水亦渺渺朱涇古船子風儀超世表披緇把釣竿垂絲向紅蓼跡疏鳧鷗親眼曠佛祖小衆漁殊不識鼓枻乃相嬲蓑笠送春秋蓬窗臥昏曉尋常傍釣來他魚不為少躍躍雖可人俯視何其眇錦鱗洪波得生平事則了吁嗟祖庭秋先烈誰克紹浩歌留此情一解世紛擾將登天台寄王言遠孝廉宇內多名山越中聞天台梵宮出雲漢林壑千重回古息大乘士渡水嗤浮杯于今無其人神丘成死灰吾師天童老頂髮如霜堆曳杖坐耽耽法鼓從空雷龍象遠騰踏山光一時開今也實不幸泰山忽焉頽初聞心神亂踊跳罹大災向無兒女情忽作孩提哀懷香拾溪藻隕涕流海苔病軀將一奔敢曰陟崔嵬及門亦多士某也愧匪材既與爐錘問冥頑蒙化裁正眼悲即滅寸心盡如摧惻惻難告人中宵自低回疾思凌赤城遂乃步瓊臺藉以散鬱憂因之觀九垓到時秋正中月色無纖埃千里或不隔清光當飛來錢塘值雨掣電轟雷過海門孤舟煙雨一時昏越中山色無看處獨見天邊白鳥翻過棗樹灣雞鳴犬吠古山家曲曲溪光抱遠沙鼓枻浩歌誰氏子溯流乘興夕陽斜
