body:
  text: 東吳毛晉子晉編閲鄂州記室智時較訂詩戊之一興福時開法破山酬徐白雨見贈二首好音無日不懷西卻怪城南戰馬嘶願學象龍能負物何辭泥水一拖犁斯文未棄貽蘭蕙有道分明在藿藜三笑虎溪徵故事高風千載醒塵迷二經行古殿迹非遐舊有高僧轉法華松下相將隨白鶴澗中猶記拾朱砂潭虛夜影招玄度燈散寒光照釋迦坐喜幽林無法説是誰空際雨香花酬毛子晉見贈吾宗單傳事西來求俊賢安心仍得髓騎鶴兼腰纏五葉特地分所唱彌高玄其終匪牆壁鑽研一何堅真機鮮能搆庭草日芊芊吾師起臨濟霹靂轟青天風顛在昔記針芥投今緣愧余魯鈍資亦許一燈然深山願棲息其敢出人前夕惕作三省恐孤胡僧傳未全窺正令黽勉握化權憶我古招提開自齊梁年夙昔當剃染四宿儼臨筵行腳走千里芒鞋踏頻穿忽承金湯詔宗風命茲宣高林伐鐘鼓古殿生香煙籃輿從空下佳句浩如川把臂知雖新獲心良已先金鱗樂我釣駑駘藉君鞭洗耳慕清音期聽山水絃瓶梅一枝插向小窗傍不得春風也自香曉起山僧兩相對從他樹上壓濃霜初春示憨崖上人兀然百不知萬古空中立春風拂寒蘿草根亦解碧臥疾吟八章有序余向疏拙丁亥冬還故山事繁責重夙夜黽勉入春不覺精神大疲肢節若墮藥不即靈因暫謝人事專務靜默為養痾計適小閣初成山雨忽至爰有感觸寫懷自解有雨山窗暗無人版閣幽瘦梅香半落小杏葉初抽獨枕聽泉長孤行與石儔松風嘗所愛今怕冷吹頭二墻角樹何老山根草自青引泉歸石沼開牖望巖屏一榻臥亦好三門久不經有誰來問疾隔澗大須聽三春鳥呼群至相將樹底鳴餘生完飲啄介性懼逢迎坐月豈無念看雲殊有情一丘同幻寄何更傲滄瀛四編籬取殘竹拾石砌新臺間許病軀適喧防雜足來蕙香欣在几茶味欲生杯蟄戶天將啓南山盡打雷五自類鷦鷯鳥於茲借半簷北窗初不大西嶺卻容瞻桃李原無語煙霞自足恬春風吹碧柳此意向誰拈六頑石生花秀枯椿吐葉香物靈知法幻我靜見他忙松鼠時踰樹山厖忽跳墻從來眼前境間味覺深長七抱病非遺世偷間且避人鼓鐘雖在寺雞犬隔諸鄰枯坐每終日幽吟當半春野梅風落瓣次第已成塵八秉燭黃昏後空山但寂然于心無少事即夢乃安禪鶴唳聲何越鴉棲影不遷衲寒松露滴巖月正孤圓重過藿園看海棠小艇維高岸分明又一春花原如舊好樹覺比前皴佳興牽紅藥間情撫緑筠晚來雷忽動疏雨欲迷津謝倪伯屏見過荒院春深雨積苔平疇風暖菜花開喫茶猶記山中別放艇何期溪上來半日清談看緑竹百年大夢感黃槐鍾情最愛廬山遠蓮社曾欣五柳栽藿園牡丹盛開漫紀二首爰有園中約因成野外遊名花春盡見孤策晚來投側笑能留客先開解起樓葉穠香不淺坐賞一庭幽二午日憑移影春雲為作陰養花天氣好銜草燕巢深奇種宜分土香風忽透襟洛陽今不貴朱紫重相尋從王侶石乞圖章在昔生民始何因混沌分龜龍呈大數金石兆斯文靈祕既潛泄精奇今願聞論交在千古不異佩三墳重過秋亭溪落桃花水欲溫村遮楊柳路猶存自欣野步因扶策未是舟行不到門四壁空香人意靜半庭蒼竹鳥聲繁舊年記喫佳園李今日來看手愛捫病起有懷蝴蝶莊周總夢身世間無法可相親生餘自覺人情冷病極方知佛語真坐檻消間隨筆硯移笻散步喜桑筠白雲有路名山遠鴻雁何時到水濱坐西軒作二首形役悲多纍心怡愛得間不時來小榭遐想入深山春老紅花褪村幽緑樹環曠然情志放天際鳥孤還二香茗供雙眼桑麻隔一牆遣情無過此消日以為常釀蜜蜂群醉成巢燕子忙杖藜經小圃剩有菜花黃早秋還虞山舟過松陵宿承天寺松陵煙水盡蒹葭一棹秋風落日斜法侶相逢如故舊夜分齋罷更煎茶留別白露初零夜氣涼扁舟曉發問官塘道情一種難為別只看秋花架上黃蘇州無量寺懷舊三首齊女門開去路頻草年行腳太艱辛重來古寺間房坐目對秋陰憶友生香積廚邊盡種菱山門猶自待人興一株銀杏還如昔碧葉秋空布幾層悠悠世事太生忙鴻雁南飛露結霜記得北風吹水夜故人攜我宿慈莊雨泊虎丘小武當二首山水古今靜笙歌日夜尋倦來思石坐飯後繞溪吟白雨生涼色碧梧垂好陰喜無相識者散步暢幽襟二舟繫林何僻雲開塔可登堤邊逢圃者閣上有棋僧山淺亦生稻溪灣滿種菱廢興何處問漁父晚懸罾偶過溪菴即事橋斷行人隔門開別徑斜桂香幽砌出竹色短墻遮鄰叟看鋤菜頭陀自煮茶得間聊此坐末路事如麻吳門曉發碧水無停棹清秋最好天重來多病客不盡故山緣紅蓼低晨露白楊開夕煙吾生誰共適鵝鴨野塘邊舟次華蕩青山看漸近秀色迓孤舟鳥語安知午松聲自起秋歲寒心獨抱日暮路何投病骨西風冷滄波懶下鉤悼崑山高靜之文學齒豁欣談道身貧久樂天恨來相會晚別後忽經年香國應前邁泉臺何所牽秋深籬菊綻悵望玉峰巔過勺菴偶意西莊舊遊垂楊數樹繞孤菴壞納清修住也堪野鴨出波窺影立殘荷仆水帶秋憨誰留空曠當吾眼未覺棲遲長客貪因憶舊遊如此夜冷然霜月起東南晤陸平叔擊磬空樓鳥雀聽儼如山衲稿其形法緣夙結瞿曇氏世相全空般若經秋養芙蓉高過屋霜滋蘭蕙秀于庭幅巾笑殺陶彭澤五柳雖栽醉不醒贈張季鴻水田寒漠漠煙樹幾叢叢仁里來經過道風能一同相期參向上自信在其中有句臨行贈青山霜葉紅憩陸哉生西閣望雨竹木心知野蒼黃擬在山快登高閣坐自覺此身間妙供來香國詼談透祖關有禽窗外噪暮雨送舟還贈李小隱故土雖辭久相聞實有年偶歸承遠訪晤面覺歡然黑白同君髮山村共此天無妨那一著下手白雲邊過陸子念書齋即事輕舟停水次訪道散幽襟得此一日樂何求百鎰金竹陰開晚照松曲瀉清音月上思歸也蘆花期重尋又贈書法華靈山何載別仙苑若親隨隻手云書寫全身是法師冰花開臘際異鳥立肩時居士書經感有二瑞心印全彰也空香散碧漪答子念水邊荒屋類山龕遠樹參差結翠嵐西舍暫遊開異景東林久憶遇同參孤燈晚坐何其靜疏雨空來亦自甘道話不憎疏野性方舟時過響寒潭憩陸顯文書室別館原依宅居然動靜分竹簾交野色紙帳蕩波紋鷺影堪常狎鷗心自不群文餘有間暇倚檻看流雲衆香菴值雨野外多流水村邊又遇菴戒香薰杖錫古佛現優曇短菊孤情繫嘉禾比屋擔晚雷何忽震客思已如酣晚泛過慈雲菴孤菴尋不遠亦在水之涯草屋今翻瓦村雲忽染霞秋場多稻實夏岸有荷花鐘鼓西鄰接青山夢不遐偕殷元長李小隱泛月二首有月不能睡傍溪仍放舟寂然天地外恍惚見寒流霜落漁竿隱秋空雁字收輕雲殊自幻幾點過沙洲二有月不能睡傍溪仍放舟遠村環可數殘葦臥無收語笑對佳客浮遊忘老秋清寒著衣領緩棹在中流問戈莊樂居士疾不遇慨然有思遙村流水曲來訪臥維摩有示身非疾無言口太多琴書成眷屬筆硯近如何相見形骸外夕陽鳴棹歌瞿願中過晤勺菴同舟至衆香菴別春風曾一晤相見又深秋世事黃花冷山情白石雨小菴容促膝遠水歎分舟歲月真如駛吾生善自求西舍歸舟有懷毛子晉青山已許著間身白社猶欣一問津道路不長慵寄字秋光欲老只懷人扣舷雙塔風鈴近轉棹孤城水鳥親去去杖藜多眷戀夕陽深樹有垂綸勺菴訪舊陸子念重以篇什見貽還山報之兼寄平叔諸同道七首溪菴聊作寓有句寫胸襟遐契方投漆平交只論金菰蘆窺隱迹鐘磬想餘音近日山楓好應憐獨自尋二緇素何緣集崇朝密邇隨所慚窮釋子稱是大宗師揮麈登樓際移笻説法時雨晴剛遇巧一葉泊寒漪三秋蟾生靜夜法味喜相分舌上尋無語眉間笑有紋池魚潛不躍沙鴈宿成群物性難容晦清光透水雲四曳杖欣臨水歸舟記出山秋將遲我冷天竟使人間落葉封苔徑鳴禽候竹關有懷元亮宅詩債未酬還五窗竹蕭蕭報曉寒溪逢玄度喜盤桓雪軒石丈饒幽致瓦鉢山僧愧素餐虛閣久憑忘有倦新詩疊出可無歡鄰雞午過聲猶唱隨寓枯懷得自安六遠水孤蟾照佛龕疏籬叢菊抹溪嵐薄遊在野思晨起多病于山罷晚參几有名香衣得染盤餘新果齒生甘書燈隔岸頻來往不負垂絲向碧潭七襆被連宵宿草菴蕭疏風味主賓堪已隨孤騖秋行遠忽聽歸鴻夜夢憨世路不親因得懶煙波有戀尚餘貪空山月出長松冷相憶君家斗柄南酬李明遠文學五秩見贈受命當秋令懸弧愧此時無生原順世有訓敢忘師小院金蟬噪高梧玉露垂憑軒思寡過先聖不吾欺壽貝葉齋培風師是歲臘同五旬也天涯蹤迹久如雲搔首中林每憶君貝葉燈傳堂搆美蓮花心淨梵鐘聞六時望古曾何遠百歲今秋嘉共分無著天親兄與弟名香一瓣夜深焚偶作冬來黃葉滿虛庭小閣霜濃曉夢醒獨坐竹窗無箇事幽禽來去語堪聽勺菴度歲書懷二首同雲漠漠暗山頭雪霰將零點布裘舊谷梅花雖好看新年人事不勝酬孤村何處能安懶遠水無波且縱遊諸子謾勞橋口送吾生天地一虛舟二一年月日又云徂燈火青熒照客無紙帳怕寒添草褥竹房留歲想松爐夢安溪犬從他吠迹遠山鐘不我呼童子相隨頻致問明朝何處看桃符除夕寓勺菴同無關上人泛舟南湖一年茲日盡擾擾惜塵寰舉世豈皆寐無人自肯間爆聲驚野鴨舟影逐溪鷴此樂欣同得滄洲暮未還和除夕只因霜雪鬢毛侵翻怪年華長一旬天地已看同逆旅形骸欲就識真人鳥聲帶澀猶啼臘草色含青已覺春大化無偏居處異自應把酒對芳辰己丑元日穩睡梅花帳翻身是五更樹頭天未曙枝上鵲先鳴化日隨年長和風近畫生山僧心事喜舉筆一詩成新正二日陸氏昆仲招集平叔園亭四首清溪宛轉帶微波令改衡門喜氣多為挹幽香梅下立欲摹霜節竹邊過薔薇芽綻新吟得棠棣花翩舊雅歌我是間僧君逸叟正堪山水共婆娑二叢竹蕭蕭作短籬出營山意在溪湄東風欲捲葡萄架南岸先青楊柳枝無事村雞啼白晝依人野鴨浴清池石橋欹仄通幽徑拄杖乘春不倦移三戶庭灑掃淨無埃剛喜山僧杖到來高榭護蘭風不入幽窗近水暖方開斑斕莫辨多年竹紅白分明雨樣梅清供滿前心已醉溪禽群噪晚齋回四春風滿座笑言投喬木嚶鳴此際求一種平懷真道氣十分率意懶禪流欣看貝葉橫書几似有空香雨佛樓誰謂文人無慧業丹鉛水乳在青眸時案有手摘宗鏡語題畫松下高樓搆幾年濤聲日落響雲煙山僧亦有工支習借得幽窗讀古編贈報國寺萃間老師城南草木藹春光古寺冰融濾水囊階樹與梅爭秀潔和風滿院度幽香仲春放舟過謁毛子晉信宿寶月堂兼晤顧麟士殷介平馬退山時見刻大藏將竣賦言為贈春水溶溶抱遠村春雷送雨過山根舟維古岸魚兒躍杖入高堂燕子言盡日焚香心隱几深更剪燭膝容軒多君友尚皆千古檀悉猶欣罄法源水月菴詢隱峰疾海山攜遠出險患念同嘗子疾久未醒余心遙不忘片帆春雨濕深院瓦爐香覿體空諸病應期妙藥王謝古南衆護法十載梅溪把釣竿絲綸舒卷意間間偶嗟殿角花千片欲別溪頭水一灣天外孤雲流不定林邊飛鳥倦知還道情膠漆彌增感千里依然咫尺間過蔣蕙仙孝廉菴幹字居士所自撰其義未詳似別有所寄者曾請其音云如申字呼衡門經歲似秋澄春老薔薇發舊藤野鳥或群非欲異匏瓜不食自欣能窗臨流水清堪濯戶見南山近可登君性素恬增隱築為高因想就丘陵海印菴午睡有夢忽來春殘花事付微茫原上依依緑女桑幽鳥一聲何處去北窗高枕臥羲皇戒香居即事三年不到又重來斗室依然絶點埃餘有戒香薰杖錫孤舟且泊月明回海塘吟海塘行不盡風浪打危巒漁網斜陽挂蛟龍直下蟠毗盧菴明幻開士五秩入夏薰風至禪房水際涼階前盈忍草屋後起新篁衣鉢荷香染軒窗柳色藏相過如問訊日月靜中長贈仲寅初澤國稱遺隱幽村久卜居割田開佛土投策話僧廬耳順人胥慶心安樂始餘清溪臨暑月尊酒看英蕖贈金陵彭師水有生居大塊著姓古賢人命向尼山問年當伯玉鄰秦淮于柳碧吳苑萬花春隨化能觀妙心齋不受塵水鏡菴小憩亭亭蒼竹繞方池長夏炎蒸似不知坐久小軒無事做摘將桐葉寫新詩顧敬修居士見過山中緑陰如幄碧山深白日間聽黃鳥音抱病比來聊自適高軒卻愧遠相尋空堂夜語燈頻剪古寺朝參磬未沉坐對雨窗看道卷長松煙外節森森紀舊示顧君暗客歲緑陰稠城隅早放舟在筵皆上善盡日作清遊衣拂千人石風生一虎丘可中庭子在坐見石點頭煙知墩準提菴樹近千家市菴開一小山天高僧眼曠秋靜客心間烽火空為舉江流逝不還何如鳴古磬壞衲坐林間勝法寺沙阜高低傍鐵河寺左有塘舊名鐵將軍施第昔何多寺為宋高將軍所捨宅潭來白足鉢常洗池冷丹心劍不磨洗鉢潭磨劍池皆寺舊迹殿古卻嗟陵谷變地靈應有鬼神呵填然法鼓清秋擊龍象欣看四野過從勝法寺過黃莊菴肩輿辭古寺斜日向東行銀杏遙相見金風冷送程到門菱葉滿入室桂香清一宿孤村寂秋吟夢寐生黃莊菴同道侶夜話杖出未云遠秋行亦易寒話言忘夜永趺坐覺衣單法集信非偶客遊良足歡明朝欲分手青嶂待君看瞿願中過訪野外涼颸滿山中著屐宜聯床風雨夜促膝笑談時樹底泉來急煙邊鳥去遲晨鐘何愛聽蓮社舊曾期華一嶽為子寫照賦謝二首虛室坐生白秋光落小屏巧將遊戲筆幻出贏衰形憫世心何熱看他眼只青歲華知去幾卻怪鬢毛星二道生天地後名絶太初先突出身無狀傳來筆有仙隨方留幻迹何處問生緣一笑涼風發秋山破曉煙詩部戊之二興化時初過昭陽答孤峰上人佛性非南北人煙有不同風高黃葦偃秋盡緑楊空錫影隨間鶴珠光奪睡龍朗公投好句清夜燭花紅酬李平菴文學丈室賢非遠三生道許同斯文深入奧外物付諸空霧變山多豹雲興澤有龍草菴聊寓影睡起日頭紅酬李艾山文學棹入蘆花深呈橈覓好手忽逢河上公相對兩忘口奉和賀疏林邑侯見貽空劫有何佛靈臺唯此心政餘庭鳥近道廣野僧尋化國開談笑高吟見古今昭陽城畔水東望碧煙深奉酬吳鹿翁相公澤國蘆叢偶借棲慚無祖意可言西傅巖簡在能調鼎彭澤歸歟樂釣溪雪夜山陰呼艇好桃源春水問津迷新詩製就神情滿揮麈分明對撰藜平菴以石刻七佛偈見貽乃黃山谷筆鐫廬山巖石者賦此為謝山谷以元祐六年大寒日書是石而平菴持帖來亦大寒日懸巖有字阿誰刊七佛傳心見筆端怪石昔人能作供舊碑今日尚留殘名賢揮灑當元祐時節流通恰大寒林下百年遺勝迹曹溪滴水未曾乾和夜坐二首眼開誰作夢心醉或忘醒吾我猶雙見浮沉總一形家中人自在路上客無停冰雪梅花放疏枝透幾櫺二方庭猶未雪多少覓心安何有塵為礙皆因眼自瞞三登良是苦十日未為寒何似木頭老真機覿面看西軒即事二首西菴寒月盡四望見冰圍時有蘆花起心疑雪點飛風中雷若震雲上日無輝衰病年來甚終朝擁衲衣二土階卑帶潤柴牖小容光展卷聊娛意臨池一寫狂水仙花自白楊柳葉無黃因憶懶殘老爐煨芋子香和大山知藏誕辰二首長空日月去無休風冷滄江水不流客夢片時行萬里塵心一點挂千愁怪無青嶂堪留足喜得黃茅此蓋頭間誦南華欣快論人間至樂只骷髏二江關客路未甘休一曲滄浪歲月流大野多風鴻陳急寒空欲雪雀群愁曾臨秋水能青眼無奈蘆花早白頭遲暮對君搔兩鬢世間出世此骷髏除夕和平菴作二首天外冰霜客裏身歲殘攜手見交新不凝摩詰安禪榻猶愛淵明漉酒巾擁褐爐頭將遼旦劇談座上自生春重簾放下嚴寒結夢寐詩成若有神二役役勞生共此身何堪日月又懸新三車自願攜諸子六結誰將解一巾梅插銅瓶香永夜柑傳茅室味先春村翁咸樂升平世爆竹家家競賽神辛卯二日同朱天乳諸君子散步池上春城如見暖雲飛爆響隨風拂凍暉君子相攜池上立笑看童稚踏冰歸晚雪有懷平菴大雪下無聲菴前白路生庭柯多烏聚野岸絶人行地結重寒色天垂不夜明茅堂懷謝眺凍筆獨娛情人日寫懷四首月令寅初建年華卯又添忽聞過七日不覺撚雙髯物外心將寄塵中迹久淹生平勞景仰幸見雪山尖二此日風光淡如何定説人曆傳應自古物換又維新率土欣同遇吾衰恐未真前村梅柳上鳥語已先春三是日墮雙齒簾外煙初暖階前雪未融短鬚辭暮盥敗齒落晨風倩筆書心事尋方去眼蒙死生交謝態豈待百年逢四解帶憎開戶然松愛近床江皋猶白雪天地已青陽靜聽孤鴻度間看二鼠忙浮生真似夢老大孰悲傷徐同甫為余篆古圖章賦贈鴻荒文字杳君子得何師金石相投處蒼籀會意時獨娛冰雪案傳玩水煙湄緬想天人理羲皇盡一奇酬楊廉甫進士偶著袈裟寄此生也知天地始無名青蓑近買學鷗泛白拂間拈隨鶴行江月明時孤棹穩水風微處一波輕雲堂晚臥思君子隱隱清機發磬聲立春後甲子日偕平菴登土山午飯林中訖晴光野外生人思聽法聚我愛看燈行洲隔心常遠帆來眼自明好春傳甲子泛泛緑波平寄祥光上人相聚初於太白嶺相從又入武康山多年別了無消息一旦逢時生喜顏靜慧園中龍象集昭陽城畔鼓鐘間經過隨喜拼旬日看畢瓊花買棹還謝朱天乳惠藥無身不是遭僧打有面初非學佛黃老大自知枯血氣少年多半費思量厭尋苓木山中草懶覓神仙海上方只望先生與間藥從頭去我一生忙將還江南別鑒師君住昭陽年已久我來極樂日無多相見難來相別易此情其忍對滄波書扇與蕭道人偶然到江北選佛又開場孝齋蕭道人為我一冬忙夜歸常把火朝來必踏霜對衆語鑿鑿見我喜洋洋今我欲南去道人心不忘書扇以謝之炎時作清涼謝潘道人造法衣我有一匹紗道人為我裁舉目顧我體便將刀尺開長短不失度分毫絶疑猜製巧針細密月餘才送來我欲謝道人道人辭百回再拜稽首去霜階凍莓苔衣披等金襴真紅映雙腮一切聖凡衆瞻我光明臺我思末世中豈曰無栽培道人心在道我何誘其財唯以清涼風扇彼煩熱埃衆庶務財用道人亦賢哉別黎太沖長者晤言方歲暮話別又春時節令已如是行藏不再思途中梅柳放菴畔水雲遲高誼難分手殷勤一致詞極樂解制寄謝吳鹿翁相公淤潭西四首西菴池水緑粼粼間步東風照影頻伐輻河干隱君子考槃天際想真人只緣芳草催行腳未是空山欲老身滿篋新詩皆妙絶片帆南渡不嫌貧二菰蒲歷亂起寒煙中有幽人水一天文思久安尼聖學慧心兼得祖師禪音書偶寄如金玉蹤迹從教在野田應是遭他先佛記能將法句析微玄三漁網悠然薄暮來扁舟亦擬向晨開岸邀春色先分柳園護晴雲未放梅曾記秦風歌宛在直尋魯語誦賢哉江關臘盡猶冰雪何得膏霖潤九垓四遐心不入鹿門山採藥龐公去不還柳葉欲遮漁父宅桃花半照老人顏心齋白自生虛室身隱文無到世間歸去野僧聊問訊間雲依舊把潭關留別平菴春氣微微動遠林殘冰猶自帶河心隔江相見不恨晚放策獨行難在今詩句舊耽終寫志禪鋒新出老知音青山乘興能攜屐莫謂雲深不我尋別吳北海昆仲慷慨青雲黽聯翩丹鳳毛不疑真佛遠能致野僧高鐘鼓無虛日香華重見勞臨岐多戀戀春色滿江皋舟發昭陽春風送行客遠去無定程何以悅吾目溪邊芳草生寓廣陵靜慧閣送天鼓法姪之江西我在廣陵為過客忽逢吾姪上廬山江邊芳草春初緑京口梅花早破顏得眺瀑流千萬丈且尋茅屋兩三間開荒種芋因緣就一信吳門好寄還雪後登平山堂野外雲猶凍林中鳥一鳴樓尋隋帝迹堂得宋賢名隄水從東逝村驢向北行江南山自好剩雪萬山明丹陽道中南北天涯路萬程客帆商舶古今行地多藝麥村何少河曲通潮水不清高岸兩分間鷺影長松孤立帶鴉聲春來草色青青起坐見兒童拾野萍間來居二首歲月磨雙足乾坤老一身喜茲幽寂處暫養病衰人雉堞雲霞變墻垣水竹親中庭芳樹在花葉正垂春二眼底天何曠風前口自歌梅花吾地有松色比鄰多野徑無如僻高軒不易過考槃真受用不羡碧山阿舟次崑山萬井寒煙裏孤城積水邊山間如向客塔近欲迎船雉堞元依地巖崖別有天望中情自遠暝色杖頭懸西城晚眺寄葛瑞五風雨杏花愁溪光冷白鷗半春淹客路薄暮上城樓歸鳥群方下山煙濕未收垂楊居士宅指點隔平疇悼李子曉令八首有序庚寅中秋夜曉令李子別余南去余于重陽北遊京口遂結冬昭陽道路悠阻每念不得便鴻一信思亦長矣辛卯上元後從廣陵渡江留連京口復彌月買舟東來意謂漸近嘉禾可詢其遊況大雨中艤舟鹿城忽聞李子已作故人五內悽然舊交有來驚問口不忍道嗚呼曉令之遊曉令之死豈非天乎念數年把臂情有不能已者作詩八章達其舊居臨風而誦之曉令雖在萬里魂必有知其翩然而來耶碧水春江滿片帆東望遲如何天外信卻向客中遺世夢真無緒人生良足悲靜言憑短牖脈脈動吾思二憶自投緇社軒然意氣揚豈徒尊几杖亦自篤文章執手曾無間論心極有方斯人何可遠然諾未相忘三竹下招頻坐花開賞必同深知塵世夢細究主人公河水清環宅梧陰碧覆空每看諸子俊勸讀在其中四我法能深信人言或浪評胸因多塊磊趾若傲生平小案詩篇積方庭草樹盈素帷窺弔唁粲粲士中英五庭梅無少恙階草可憐芳不謂交千古翻餘泣數行長途隨畫鷁久雨斷春光役役窮簷下愁看燕子忙六客程方萬里靈櫬倩誰扶危嶺雲端矗炎風地下呼竟違霜髮母不念藐諸孤可歎生浮甚人何作遠圖七苦寒霜落月僮僕幾人俱總為尊親在卻將桑梓疏榮名何處問身世頓成虛涕淚難為讀苕城一紙書八臨岐多繾綣歸路遠相期猶記中秋夕辭余竹院時酒樽良友勸心事月明知一去成千古人生恨別離同葛端五諸子登東山謝公丘壑在城東春日遲遲景物融青雀乘流仙侶並白雲飛閣洞天通冢疑松下人猶哭屋置巖邊客未窮歸望西山巖石好桃花高出女牆紅詩部戊之三鶴林時初夏寄日章舊友古寺深深衆木鄰小山雖淺隔風塵緑陰如幄開軒坐曲肘支頤憶故人杜鵑樓小坐消暑登高閣長空舉目收青松千樹直黃鳥一聲幽間砌餘天竹荒園帶石榴紫薇花更好爛熳倚墻頭解夏送自明知浴歸昭陽迢遞來江北從容入社中盤稽先聖訓人有日新功竹色行將染松聲聽未窮不堪言聚散芒履躡秋風曉步殘月涼雲碧嶂幽鸛聲步聽小橋頭垂楊一樹猶飄緑樵擔西來白露秋喜李平菴渡江貽詩步韻奉迓二首一夏薰風裏思君意惘然久為南岸客喜到北來船山色江邊遠秋光竹下全幽期方在此相共惜流年二古寺門常掃秋林葉始黃舊懷方欲展佳句喜先將江闊雲霞靜山空草木長晚來阡陌上攜策可徜羊平菴到山一別歲方半相思秋獨深山中攜屐至江上扣舷吟白日開新況青燈話夙心西風黃葉下幽鳥度餘音同平菴觀寺中古碑凡物古難得斯文良不輕相攜從殿出不厭繞廊行石壁精神滿山林氣象清幾回遭劫火作者未湮名贈瓜洲默如懿範二上人二首瓜洲渡口緑粼粼京口看來是比鄰日日風帆江面過不知津濟幾多人楊子江心鷺作群金山頂上塔生雲眼前好景看無厭野鶴一聲天際聞小窗小窗看大樹大樹落窗中夏葉高垂緑秋陽少見紅自欣消永日殊快度微風間坐耽幽句爐煙晚篆空雨後登杜鵑樓古路泉能沒遠山松欲遮因看棲鳳竹想到杜鵑花謝張元囪問疾積雨傷秋草空庭漲碧苔我方欹枕臥君得過山來白髮頻相慰丹經一取材上池能洞鑑肝膽自應開漫興多慵久已交書絶有興元來得句新間對秋窗喚童子清泉烹出紫茸春睡起丈室間多瞌睡來避人雙戶未曾開兒童怪煞能相惱出入山頭亂拾柴九日三首細雨重陽日西風白露天登高何處去籬畔菊花鮮二雲冷山俱暗風高樹盡鳴塞鴻來已半客路未遑征三寺門久不出山徑長深蘿薄暮斜陽裡何人把酒歌舟行口占荻蘆花發重陽後鴻雁聲高九月天莫道連朝風不順好看霜葉滿晴川坐興濟菴東窗草有吉祥竹鳳尾青青相倚在階前一株榆樹何高聳枝葉經秋濕曉煙贈周東溪老翁紅日東邊走似車緑楊溪上老情賒風光説向兒孫道九月年年有菊花綸如禪子畫菜供余喜而賦之道人生滁陽云是宥家子慕法入緇林落魄無相似雖然工筆墨非為拾青紫有技進乎道有道出乎指遊戲小窗間學圃攤一紙須臾五菜生離立孤根起谷風遠來吹葉葉青搖几不煩一鋤力能使地種美造物笑無權晨露疑浥彼根中滋味全咬嚼殊有以芳潔佐伊蒲乃在山僧齒寄語鐘鼎家胡為不種此贈夏秀巖老翁人生七十古來稀相對茲翁面目輝松下石床能獨坐海邊鷗鳥近忘飛十洲方朔曾為記六合蒙莊未肯歸敝屣世間遊物外遼人咸有出塵機西華禮塔詩二首有序崇禎戊寅余度夏銅井聞西華山有佛智破菴二祖塔在焉因渡湖一禮塔尖仆草池水無梁徘徊久之至辛卯仲冬自京口下吳門復一瞻禮時瑋首座結屋于荒址撫今懷古記以短章秀峰山下祖燈傳水色山光塔影邊纍石好經千百劫懷香又隔十三年東山松柏宜重長南浦雲霞只舊鮮收得沙盆貽厥後天龍應衛一牛眠二滄桑陵谷古何常佛印禪燈久愈光兩塔並湮榛莽密一峰獨秀水雲蒼舉頭胡雁衝寒度拜手天花間雪香固是兒孫慚烜赫摩挲石碣幾倣徨秀峰山曉起空樓曉愈寒窗外日三竿村向湖邊失山宜雪後看出門風似劍呼棹浪如磐掩戶誰相對爐中火一團辛卯除夕歸自京口神情既衰僕僕有感茫茫觀大化蹇蹇涉長途日月非真逝年華實告徂小童譁伐鼓老態恥當壚深谷梅花放青簑在五湖壬辰元旦好鳥先傳語陽鳥漸起東燭邊開夜色漏下動春風玩世求身健居村祝歲豐曉窗雲靉靆小雨潤青菘悼素園黃暗齋參政靈山佛法付王臣像季干城有幾人世外早培優鉢種人間特現宰官身等觀宗子風神爽握手師門道義親流水行雲何去也佳園又見老梅春過祖燈菴用舊韻墟落尋幽寂心知不是山鳥啼春戶扃僧定衲衣斑依約燈元火玲瓏杖有環臨川聊一詠古道自茲還過間間居春水緑生波寒塘路不多扁舟誰共放間屋我能過役役既無味芒芒將若何漣兮清徹底堪此聽漁歌甘窯寒突孤村接春煙幾處高永為風雨庇願學海濱陶古聖皆無逸民生敢計勞靜言思覆載化理適相遭寫懷曲曲溪光遠荒荒山日低市聲吹向北塘影舊名西一葉從吾泛三椽偶寄棲客懷何所適春半老梅齊獨坐小閣見流水幽軒面兩松把茅差足勝擇木更何從習我煨鐺法尊他钁地宗捲簾門外看春色不知重仲春隨喜本覺寺讀坡公三過堂詩步韻畫鷁輕移碧水中長風鼓浪駭兒童山開萬壽鐘聲遠堂記三過鶴影空短塔垂頭蒼竹護新詩炙口古碑功夜來倚杖僧窗寂初月流光到殿東奉酬遁翁先生見寄有引黃坡遁翁先生舊所稱蔡子穀居士也金湯法門不遺餘力即一金粟先師及門皆沐維護余以疏懶別二十年矣未致一辭而先生不棄陽和春風惠然肯來且貽二詩益感高誼敬步來韻投瑤報木余有恥焉惠扇出世同門盡不遲蓬根自愧後於期十年白鳥曾看泛金粟山鈴記白陽泛水一簡青猿未獲馳丘壑藏春尋舊誼池塘生草寄新詩快哉拈起犀牛扇穆穆清風掌上隨敘懷寒梅疏柳放長堙抵掌掀髯滿座春無垢宗風為近里東坡文字不同塵一回傾倒歡如昨久辱交知樂且新顧我匪材肩祖任疏慵有負法門身永哀詩有序遁翁先生天性孝友其先慈之生誕與嚴君之諱忌適同清和四日是則月日同矣而寅之時又同但其年不同耳先生念之二十年來感傷不已寄箋乞言慰以七言二律詩書孝友羡傳家不道君親歲有涯痛在死生同月日思深屺岵閲年華忽驚緑樹啼黃鳥又見長溪漾落花著取萊衣還醉舞高堂老眼或無遮二曆日翻來只記寅草餘年淚灑芳辰老焉猶慕終天恨哀也忘過六尺身掩卷蓼莪蓬鬢雪薦觴松柏草廬春九原靈爽應無死一撫趨庭骨肉親壽屠暗伯文學母王孺人初度時文學以疾辭試事孝淑鍾天性桃夭悵別深敬緘遺恨語曲盡事親心白髮床第變青銅歲月沉帨期登甲子君子錫住音二作合奇男子終成女丈夫戶庭尊狙豆機杼撫璉瑚奇疾寧非福貞名共不誣賢哉舌孟母無愧聖人徒寄郭千仞春初攜策過君家庭下疏梅正放葩分得寒香歸院後又看溪上醉桃花寄郭清安三箇年頭兩過君香爐茗碗謝殷勤門前老樹春禽囀好句何妨側耳聞病中一月不出戶三春忽已徂薔薇嗟放盡梅子日看粗偃僂思藤杖支離近藥爐故人勞慰問頭面似非吾遣懷斗室循環走空階彳亍行間看泥下筍忽地向天生出門花事隨春盡濃陰入夏多出門吾亦適溪上問輕舸久疾初愈過硤石山白水菴五首半日間難得扁舟近可移紫山涵白水緑樹語黃鸝到此安吾懶行將笑世馳萆門清晝掩新竹影離離二夜月看將上春風去莫留崔嵬方畏陟清寂自相投樹茂疑無夏山寒直是秋吾衰應未甚襆被得天遊三磊磊山根石霏霏谷口煙丹雞無弋慕黃犢有人牽安步朝光淡微吟落照園一抔誰氏冢老樹緑參天四西硤曾遊處南風喜再過共知山路淺自覺鳥聲多梅影能高屋泉香恰在窩一丘吾素願不厭久婆娑五北牖開來爽西軒一樣涼客來參古佛人臥傲羲皇避世今知策藏身向覓方夜分鐘磬寂山月轉虛廊遊硤石悔園和陳復菴乩仙永日縱間遊新詩不易酬煙熏千柳醉雲挾兩山浮春舫巢玄燕苔磯近白鷗仙風吹席上塵夢更誰留題放菴山不高兮樹且多緑陰飄拂覆層坡最堪結下三間屋明月清風一放歌俞言如招同范中昭文學坐潔古齋納涼紀事桂棹尋三徑松陰隔一溪地偏丘壑小人韻竹林齊幽檻堪容與虛廊待品題素磁傳未已風靜夕陽西又題麻杖四首落落丘中有修修莫掩藏以能高骨格致我略玄黃扶老秋無畏投人夜有光就中新用處初不類諸方二七月星流火秋光到水邊魚驚紅蓼雨鳥散碧蘿煙重想三條篾輕拈一指禪集雲峰下客好把話頭圓三莖草金身用全機總付渠尺尋眉上見風味掌中餘展握欣無滯行藏試與俱衲僧多未會相問意何如四卓地非金錫猶然佛祖模古風吹未已正道得全扶六月鶤鵬化千秋睡夢呼蒿枝臨濟令自古記行吳挽嘉善錢塞菴相國四首臘月層溪竹萬竿春風吹起野梅寒法筵握手情如昨柳岸貽詩墨未乾新疏一經明佛頂舊崇百祖薦幽瀾妙心常住含香海乘願閻浮現宰官二翁曾亟稱子淨土十詠調從來淨土詩中得未曾有武水漣兮想七年春流小泛剡溪船畫堂豈異維摩室香飯奠過化樂天十詠懷西稱席上一燈傳北契樽前靈山記囑分明在舟楫應還濟大川三傅巖霖雨潤蒼生世外因緣有夙盟妙法夢中誰見授高僧都下舊知名素箋赤字符先語一雨三根長大莖提起腳頭親切句翛然常在佛光行四蒼蒼相去幾由旬高閣中棲大士身十載讖開金地古六時空雨寶花新丘山誰謂非堅固法界由來總一真敝屣萬緣渾放下清秋涼月照階頻翁未第時夢達觀大師投經七卷皆赤血所書徐叩以功名事師曰你底事我做我底事你做次日遇經肆問何經有七卷肆中曰惟法華耳隨取以示如夢中問所書曰達觀大師又達觀大師掩關大勝寺月夜步至幽澗見大悲像露立而開廢圮向韋馱卜其因緣乃出古觀音像一軸授住僧云十年後有見而取供者問事始成翁如識然與大師素不相識事亦奇矣小窗多間為商尊首座題菜洛陽城中少喫菜洛陽花邊得一芥菜好道人留長薹花鮮一任時人賣秋日偶成秋色滿庭中絺衣受冷風芭蕉還自緑相向海棠紅山居曉作涓涓秋露滴花根小鳥枝頭故自喧最好涼風吹面頰倚笻無事出松門
