body:
  text: 東吳毛晉子晉編閲鄂州記室智時較訂詩丙之一古南時之餘一秋行癸未七月下浣歸海虞破山寺掃洞聞和尚塔舟發梅溪即事長溪秋水正漫漫擬放扁舟曉月殘竹院鐘聲猶未歇板橋人影獨相看稻花隔岸香何遠桑葉誰家露不乾日照高林懷古寺百城回望在眉端舟次松陵值當湖馬遠之同泊船窗出香氣水際得知音訝我非塵侶果諧談夙心漏聲傳夜渚帆影下秋陰憶在西林寺初逢話已深尹山道中來往舟何競其如橋不喧一山低少樹幾屋冷成村北望金城固西來白水渾文身懷至德感慨獨相存宿石家濱入港不一里石梁何自高繫舟墟落暮倚杖客程勞佛火出神廟蘋風吹布袍燭殘鄉夢斷永夜水滔滔過華蕩官塘來往慣此水一何清煙淨天都寫風微浪欲平雲山排晚色蘆荻到秋聲小鳥從西去低飛不敢停舟中望維摩洞聞和尚晚年自號雪柏老人戊午歲于維摩度夏為余剃落虞山望在近凹處雲溶溶古樹團煙色蔚然如小峰憶我著袈裟龐眉於此逢今也樹不改悵焉聞山鐘雨中歸破山寺肩輿直直望前投不畏高林雨色浮松下二幢元壁立寺前一水向通流雲堂洗鉢方過午竹徑支笻獨感秋相見同條驚且喜衲衣和濕坐床頭自虞山過江陰訪黃介子居士舟泊長涇青山層疊對官塘山盡輕舟入渺茫遠野風香聞桂子平湖波定印秋光日斜纜繫村煙宿市靜燈懸草岸涼江上潮聲猶未接雞鳴撥棹露蒼蒼登君山諸道侶偶集座中拈句五首晨步君山草露晞蒼茫江色冷依依何從一陳天風起遠近輕帆不定飛二荒冢山前似浪堆江聲八月響于雷危樓足倦聊支枕恰好峰頭看雨來三好好晴波若鏡平無端大浪忽然生江靈想亦呈奇幻慰我初來遠眺情四變態都來瞬息中白頭飛浪打飛篷虯松似與蛟龍鬥瞥起濤聲在半空五隔岸浮圖插半天江根草樹緑芊芊相逢萍水原無約茗碗爐熏一日緣經春申君墓作五首翩翩珠履客三千楚國尊君爵上賢歿後何人尋葬地君山之下古祠前二觀兵函谷卻強秦椎將持符義救鄰君始何功屏楚社名班公子曰春申三滔滔漢水日東流有國無君是可憂天道豈知難少昧殺身只為有嘉謀四骨瘞山梁土不高榮華今古易為消風帆倘見湖湘下不必懸思楚國祧五邯鄲奇貨有人窺笑煞當年呂不韋以我為贏誠快事不知彈指更存誰晚泊前路趁不及此間聊繫舟橋名初未識村語自相酬草長潮聲落煙寒夜色流欲眠還一望星斗在船頭舟行口占五首不在山邊即水邊衲僧受用只清緣緑楊煙下看山影兩眼空濛別有天二日日舟行見岸移眼前之幻少人知穩伸雙足篷窗臥不管人間路險夷三湖邊岸曲草萋萋一往看來津欲迷倚棹中流問漁子煙村白晝正啼雞四一重煙樹一重波村裏人家轉眼過茅屋低低雞犬吠桃源莫怪問津多五茭蘆處處老秋霜臥起悠然天一方池塘野鴨誰家放迎棹群飛不亂行返棹虞山過南湖值雨湖上扁舟稱野情秋風總不計行程菰萍蕩漾隨流寓鴻雁翻飛看宿鳴縱使當晴煙亦滿偶然著雨荻俱橫青山幸在空濛裡來去船頭似送迎破山寺夜坐二首鐘定不能寐詩成信口來林端棲鳥伏霜月在高臺二松風吹古塔溪月滿空庭此際深山裡何人夜轉經留別山中法屬山院夜深坐燭花寒照人不堪明發去又作野雲身辭墓時先慈已訖葬事墓門佳氣日氤氳決決溪流到壟聞萬古丘原同一體百年父母且相分蕭蕭風木來秋響漠漠煙蘿挂晚曛此去他鄉懷罔極祗應陟岵遠瞻雲別兄二首落日城濠泊依依夜已關天涯難即聚燈下有餘歡孝友性誠篤詩書業苦寒北山親骨在努力且加餐二在昔親猶健年高白髮饒非兄視晨夕而我敢雲霄心事傷秋日人情惜後凋幸存塵外志展卷讀逍遙答示倪閬民嗟余虞山産少小塵勞牽忽忽似醉夢日月送百千望洋每自嘆渡苦悲無船輕生為遠遊性命微絲懸孤燈照靜夜豈不懷鄉園人生信難定聚散莫非緣往歲或一歸萱草北堂妍茲來不忍道慈骨封山煙痛以有情淚默灑秋風邊正於崩迫際乃接瓊瑤篇嘖嘖成過譽吾敢忘其天要之死生事閲來非等間疑關苟未破自性宜茫然古聖踐斯道不礙形骸全觀身即實相欲誰來現前覺斯西祖意自徹子輿言幾希不慎思於此分愚賢其情可為善非敢曰陶甄過陸葆初先生齋書贈蒼蒼落日滿城頭歸鳥群飛向客舟來扣衡門方薄暮坐看籬落盡清秋婆娑席上談鋒迅傾倒燈前法味投蹤迹天涯良會在固窮夫子老忘憂過顧園名園緑水繫扁舟嫋嫋垂楊影弄秋齋罷更登高閣上斜陽縱目看平疇六菴曉作曉露如霜冷秋花著色開客行無毳擁縮手坐高臺寄吳伯明蒹葭載露已為霜所謂伊人水一方籬菊正開重九色湖山曾接舊時光高吟貽我孤雲意青眼看他熱世忙何日故山尋小隱時攜茗碗過柴桑過貝葉齋晤培風師兼隨喜西方懺儀且志久別不記多年別故知重來舊路恍如疑依垣樹色高秋響入戶雲陰向客垂如昔大田開野望自西蓮土結玄思夜分一榻餘燈火未忍風帆又遠吹過孫冶堂半是山居石徑逶迤有幾盤梧桐葉落打欄杆坐來忽覺衣裳薄未必深山似此寒過毗盧菴次韻答周貞可文學青松勵節歲寒扶王土何偏歎一隅志士不磨窗下筆道人長物手中盂橫塘雨細敲荷葉野岸霜多染荻蘆古佛現前無背面英材好自擇精粗毗盧菴紀興十八首毗盧菴在盛川西往往來尋畏隔溪清磬數聲傳北岸盈盈一水莫生迷二菴前粳稻入秋翻菴後蓮花夏一灣隨順四時顏不改毗盧古佛在中間三幽軒趺坐兩眉間覺得湖光几案間一陳雨來煙樹黑面前突出米家山四低低湖石草中蹲叢菊經霜有數根雖則臨軒無大樹宛然丘壑在當門五偶出桑林步一回村帆湖面趁風來間情自怪難收拾細聽漁舟欸乃開六疏籬時見鳥低飛荷鍤村翁薄暮歸春看菜花秋看稻不須更築短墻園七室內間焚一炷香晡時直坐到斜陽村童籬外來窺我也道山僧別有長八自覺胸中沒點塵一回沐浴更精神快哉不倦通宵話只為燈前有故人九爐火熒熒夜煮泉秋燈頻剔主人賢枯懷圖寫眼前句月落三更未得眠十樹頭棲鳥語綿蠻好夢無端打破關起坐匡床摩兩眼團團紅日小窗間十一近灘蘆葦忽垂頭霜氣初濃不自繇輸與簷前幾竿竹亭亭玉立自春秋十二誰説他山有洞天棲遲莖草已仙仙薰風北牖應還好竹色荷香到枕邊十三水次村菴各把疆偶乘舟便破滄浪歸來抵掌評幽勝更覺斯廬是上方十四檀家胡餅帶星緘笑看人人齒被粘愧我比來傷胃氣攢眉怕煞口頭甜十五緇素團圞自偶諧座中茶話不安排卷簾散去生臺烏空腹師僧謝飽齋十六菴中雲物觸天機有語何妨把筆揮野老來看心亦喜點頭叉手夜忘歸十七芒鞋隨寓即為家愛此孤村靜不譁一到流速成信宿法緣非偶對燈花十八一聲解纜曉舟開翹首河干復幾回寄語菴中主人道荷花放了定還來詩部丙之二古南時之餘二折蘆序曰昔白樂天著池上篇事境真率意趣天然自得之懷陶詠具見相傳其深造玄機蓋非度泥之後無此俊快矣牧師長夏林居臨流成賦池上之名與樂天符觸興寄情要其旨歸亦何異同可論哉嘗憶古德微言如熏風殿閣諸句皆可拈參彼詩人之何知偶然文字獲此勝緣柏子草頭寧艱著韻池上之作猶此意也諸經偈言流傳甚古拈頌諸什唐以來多有之是雖詩體不殊而理趣各別偈頌之深談或不如詩之玄寄若將景物會差之毫釐堯夫非愛吟此情何獨儒者或曰是疑於池上有取也若何不林之下堂之中乎水哉水哉長水王庭言遠題池上來三十五首有序甲申春余患疾得愈倦飛知還謝事古南欲入山去值時擾擾道信勸止乃退居于盛湖之折蘆菴休夏坐臥多間因作池上來章用寫水居幽致感物起興初不忘橫擔楖栗之意云火雲蒸竹院病骨厭香臺不得山中去漫從池上來水深涼可掬村靜懶堪隈倚棹蘋風起煩襟一掃開二出水荷千朵臨池屋兩楹憶初曾一寓且復試經行敻絶仙人島光華帝子京蘧廬天地意達者見深情三徑草青隨剪園桑緑又濃一燈仍照夜古佛喜間容已作眠雲計宜忘面壁宗垂絲千尺許格外釣獰龍四喬木藏南岸叢篁擁北隄藩籬雖自設天水了無迷堪以消長夏深為愜隱棲興來穿仄徑一似入山蹊五村斷橋還接林偏港復斜桑麻見鄰圃雞犬隔人家青嶂行姑緩滄洲興亦賒長風吹永日搖曳響蒹葭六丈室空如昔清池久不乾晨興無別事宵夢有餘安對雨茶三啜臨風書一攤夕陽猶在樹蒼翠撲衣寒七古池深不測爽氣逼人眸葭菼曾窺月軒窗早得秋輕鷴梳羽立野鴨領雛遊相對機情息何妨九夏留八何處松風好能如水竹涼偶來成獨步一擊已相忘把釣真幽事鳴椎討熱忙錦鱗三點首蹤迹更何藏九清露荷香遠明霞水色鮮賞心隨白鳥叉手對青天末路誰同濟間情已若仙垂藤風裊裊百尺樹頭懸十竟日依蒲坐無時卻扇吟書空聊寓意擊壞亦成音飛雉穿桑影鳴蟬遍柳陰時哉推物理各有一胸襟十一漁網晚來集菱歌月上聞童間知野趣農老識天文久旱能無雨高山定出雲中宵看斗柄螢火正紛紛十二日日清池上間間步幾遭客嘗新豆莢佛供野葡萄水乳隨人味家風已自高前溪涼月滿有興放輕舠十三洗鉢晨齋過支笻午睡醒檻邊秋瑟瑟門外水泠泠驟雨打頭濕長空落眼青一行疑雁字遐舉入冥冥十四雷後日還出雨邊鴉亂飛彩虹空忽幻碧落路何歸野望晚逾好天機信亦微青山茅舍在且自製荷衣十五斬藤編竹凳剪荻覆荷軒但覺清風至都無市語喧春秋成任運天地欲何言有客來山外烹茶問水源十六一陳立秋雨兼來薄暮風氣清騰蟋蟀葉落記梧桐盡覺衣衫整懸知血氣同憑欄看稚子浮盎采蓮蓬十七箕踞且欹笠行歌懶著鞋人無求禮貌我已外形骸冷露茭才喫中秋月亦佳涼風來陳陳時節不安排十八瓜熟堆間地蘭開對小窗愛香時獨近摘瓞戲相扛山鵲曉先噪溪鐘夜半撞不堪間姓字遠去落湖江十九荒澳人無到卑枝鳥即巢突前驚水獺疾走類山貓營窟杳難見逢人氣甚烋因懷住山老蛇虎總平交二十樹底風煙曠園中鎖鑰無生桃笑有竊紫芋力教扶思共懶殘友行將鈍钁俱深山寒必早榾柮火先圖二十一懷古呼牛扇隨時換葛衫濕煙朝抹柳晴月夜浮杉落地聞新葉摩空見遠帆青青庭畔草尚有幾回芟二十二矮橘開花密老梅留斡疏踟蹰草木際憶想色聲初鹿趁終非水荷翻定有魚祖師關捩破不必問安居二十三廣莫此疑野棲遲我若憨木樨留客嗅柏子笑僧參玄燕商回北秋陽忽過南歲華思莫駐抱膝坐耽耽二十四秋岸半居葦芙蓉種不多花將開冷露葉已覆清波碧映繞籬竹香分隔水荷溪菴慵説法指以謝經過二十五露地好看月疏籬不隔風敲來新棗白結就小桃紅目擊無餘法心安頓絶功黃瓜與茄子一線古人通二十六良苗方翼翼野老望陳陳鄉鼓不停打方舟共接神緣溪安饌潔徹曉獻歌頻余夢仍疏放聞來一倍親二十七愁見青苗稿欣聞秋水添蓬蓬風作陳颯颯雨消炎哀雁似曾叫神魚其久潛滂沱千里潤池卉得餘霑二十八蟲聲何唧唧林色已蕭蕭天地更時令山林詢路謠溪行憑桂楫澗飲托茄瓢南望白雲外天台高石橋二十九遠情惟淡淡瘦骨覺稜稜懶作夢中佛從呼雲外僧間多只有睡病久百無能料理浮生事青山買未曾三十客自何方至書能寄一緘盛稱煨芋樂使挂住山銜感激深為契綢繆乃不凡紙衾清夢熟芒屩在千巖三十一傍舍竹環立盤溪路轉灣乍尋多見水久住自疑山夜雨來泉響秋風老樹顏頡頏雲外鳥向夕盡知還三十二凡禽多擇木野鶴脫羈縻寒水留空雁秋雲駐遠湄自憎生骨弱豈厭入山遲一味隨緣法從來古佛規三十三世上人何限溪邊我試居情知近村野得以玩耕漁戽水夜塘急灌蔬秋岸餘北窗高臥者為問意何如三十四最可清池上悠然野意深無峰雲亦宿有樹鳥能尋自覺居無俗何爭地布金魚龍知性命碧水自浮沉三十五坦率真吾性拘攣苦俗情退身因疾病謝事懶逢迎樹茂坐終日河清快此生芙蕖香國在淨域不勞征天地間事一時感觸過眼遂成陳迹池上來作初不知為何等語也好事者勒之梨板得非以衲僧面目索之紙墨間耶然出門不認貨亦聽之而已余又安能更理陳迹人耶境耶其在賞音者渙翁跋詩部丙之三古南時之餘三雲在初秋過崑山雲在菴朱近修李曉令屠暗伯相期放棹錢聖月以詩為贐越水吳山久倦遊自甘長病臥林丘龍蛇活眼諸方辨鷗鳥間情一釣收思向蘆花尋皓月漫隨萍梗放扁舟同心更有諸君子期看孤峰石點頭雲在菴送李曉令秋露垂珠點玉峰初蟾隱樹燭花紅送君今夜不勝感明日燈前語笑空寄朱子近修曾約尋秋過別峰夕陽飛鳥半山紅拄笻溪上遙相憶一榻高懸莫使空中秋日從雲在菴放舟至西莊生平佳興在扶搖煙水東南喜客招桂棹初開風腳順石橋才轉浪聲高千墩一塔空中立雙目孤鴻野外飄指點垂楊舟到岸間庭秋色正寥寥宿西莊偕陳畦之諸道侶泛月輕雲幻作玉山浮東望冰輪起樹頭荻岸不寒俱載雪稻田多水亦通舟孤村幽賞良朋共萬里清光一衲收此夕鐘殘欲無寐杖藜煙際自淹留雲在菴作八首去郭甚不遠結廬欣遂幽村長微見路溪小亦容舟散步斜陽外間吟秋水頭綸竿從是捲將謝海天遊二有竹能消暑無秋可出林疏籬環野色老樹落溪陰午坐堪成夢宵眠亦快心干戈今塞路何必買山深三板橋人自渡草徑客來稀落日漁翁出秋風燕子飛良苗經露實叢菊待霜肥安此從吾好無求野性違四世幻地何擇僧間室自寬齋時諸鳥下定起一鐘寒以病方耽懶於心只討安窗西有佳樹常帶晚霞看五仄徑大不吠垂楊蟬獨鳴間來竹下坐亦復溪邊行青青指陵柏泛泛拾秋萍世事未足問吾將達此生六粉堞藏煙足青山出樹頭眼中如見畫天外更無秋雁過雲無響人行水不流薄遊良自得日暮倚層丘七方庭遲夜月圓牖入朝暾拂座風無迹爭枝鳥故喧放情空六合抱影息孤園烈墓知何代如屏護竹根八好是阿蘭若經營心亦遐門藏楊柳葉窗對海棠花清梵流平野孤燈送落霞往來饒野趣老圃兩三家贈沈君如黃葉西風正作寒高齋邂逅話心安中秋好月重陽菊相對隨時且盡歡登玉峰上一峰來又一峰更登高閣倚虛空平湖百里晴煙滿笑指他山在望中彌勒閣城裏青山也不高登來秋雨正蕭蕭閣名彌勒雖然小飛鳥孤雲晚見朝劉公洞陟磴緣梯路已窮怪來一洞與天通當初誰記劉公鑿三字淋漓石上紅一線天兩眼貪看一線天懸崖有樹喜蒼然城頭落日催人轉多少村鴉過稻田從葛瑞五書齋飯訖遂登玉峰絶頂竹門寂寂向晨開苔徑間間自掃埃樹底炊將佳茗熟屋頭推出好山來在筵恰喜無他客把臂深期養聖胎一策孤峰乘興上大觀天外亦悠哉飯後見村南楓葉策杖微行因過葛氏園亭逸駒上人留晚餉口占四首間坐秋將盡隔溪楓葉丹野情方眷此村路不知寬熱鬧經東郭孤危念北巒凄風吹兩袖白日亦生寒二孤城隨足轉荒路有人行負重將何適尋幽自稱情河梁高迥迥田野曠平平溪面無舟濟垂楊影獨橫三城下見頽屋孤笻投此中版扉因我啓竹徑許僧通斜日炫楓葉幽軒森桂叢天香熏佛座不與篆煙同四竹密多臨水城高半似山行人峰頂過飛鳥樹頭還片石坐亦可老梅攀自間吾生無箇事飽腹便開顏詩部丙之四古南時之餘四鴈峰九盤嶺海門煙浪日漫漫欲上高山路九盤好是間雲扶竹杖孤危直作坦夷看獅子巖長風松際自飂飂短策孤峰也快遊雄石忽前當我伏盡言獅子此回頭合掌石當年點首對生公合掌今知近梵宮珍重登臨青眼客莫將頑石認渠儂南湖一帶長堤隔海潮天留深澤養嘉苗茭蘆刈去波光出我欲其間放小舠北湖湖心有地未為亭越嶂千重隔海青卻憶西湖無此好為多蕭鼓駭山靈潮音閣法運東流貝葉傳山頭高閣敞雲天要知佛口何時説太守題來墨尚鮮出生幢生臺鳥啄石痕深歲久藤蘿四面侵好在山僧慵剪伐齋時坐見滴涼陰望湖臺松色重重古墓遮雙雙白鳥下蒹葭晚來步此湖煙冷燈火垂楊見幾家鳴玉澗珠瀑珊珊雨後來石潭小注水光開巖根磐礡寒侵骨幸有斜陽下草萊鷹棲頂臥石縱橫莫可扶洪濤下撼一峰孤異鷹來宿雙眸疾日月偕生見也無黃沙塢兩峰峙起塢深藏沙上漁罾各自忙松舍青青明佛火秋來應見稻花黃白雲菴蒼蒼松竹滿山坳長夏清風日日交菴在白雲雲不覺去來時見宿林梢珠花泉甘涼自有齒牙知一勺山泉草際遺智者無將高下品渴來誰個不相宜石帆山海門風作石帆張好手如何置一檣只為埋根千丈許中流指顧笑漁郎澉城渺渺孤城海嶼分松多徑節鶴超群三更古寺行人少遙聽鐘聲到白雲秦駐山萬世君臨志亦雄東觀滄海御飛龍詩書一燼咸陽火唯見青山浪拍空角里堰濁港滔滔水半醒一瓢須挹上流清商山白髮終歸漢此地猶存古隱名丹井煉藥曾期白日升丹成羽化或無憑至今遺下山頭井不照仙人照野僧高陽峰海上青山此獨尊峰頭日月自朝昏杖藜欲上芒鞋倦留待秋風看化鯤下蓋山孤圓如蓋覆蒼波黯黯山根樹不多何事浮沉無定相片帆南望起悲歌六月三日遊澉湖遂登吳公祠飽稚仙伊蒲復過悟空古寺不辭三伏節言作兩湖遊小艇依山轉孤笻遇樹留採菱呼白鳥乞食過丹丘古佛桑陰裏蒹葭欲報秋和屠暗伯三作同晚眺也滄海信無極長風助起瀾吳帆悲似沒越嶂杳難看遠近涵秋氣喧闐戰暮湍上方精舍好歸路嗅栴檀二獨立望歸雲諸峰水面分漁樵迷往處日夕盡氤氳鐘打禪房靜夜涼詩思紛松枝垂積露滴瀝不時聞三漁火蒼茫望甚微浮沉竊歎海鷗機赤龍臥水春秋冷白馬乘潮日夜飛石上無塵聊一坐松間有路且同歸自來避暑山中好謖謖涼風動葛衣下雲岫菴海色湖光一樣低峰頭數箇雨凄迷回看松影僧行腳你向東兮我向西詩部丙之五古南時之餘五梅溪梅溪八詠梅溪月印疏枝蘸水愈精神喜得冰輪為寫真定起霜空諸籟靜暗香脈脈卻撩人仄徑疏籬竹外疏籬一徑斜寥寥精舍似村家深秋葉落憑堆尺卻笑難容長者車三峰插翠浮屠三面插空寒日月東西跳兩九疏柳斜陽曾露頂扶藜便作好峰看兩湖暮泛兩湖秋水一般清小艇頻移傍月行最是蘆花環得好半藏鷗鳥起秋聲曲流垂釣釣魚磯上靜風波手把絲綸再一歌村鳥自飛魚自躍溪流深處野情多竹裏茶煙深深竹色冒霜簷時有幽情使客淹茶熟瓦鐺煙帶緑老僧箕踞對疏簾西爽晴雲去住無心高復低隨風曳曳過林西渡頭秋霽明霞燦牧笛冷看牛背吹蘇橋積雪古岸溪聲凍不流茫茫平野少人遊呼童擁衲聊停策一片虛明在兩眸柬素園黃暗齋總憲佳園只在水之湄門外清風蕩碧漪慧業獨修嘉客謝佛心久淨野僧宜小山日涉能留足疏柳春來欲放眉樂國香光誠不遠定餘獨聽鳥聲怡送吳翠屏還金華山中六尺堂堂好道顏眉稜挺特鬢無斑剛才把手來精舍又欲揮鞭返故山佛法腳頭明歷歷功名世上已間間羊裘五月思前隱一弔嚴陵碧水灣同諸子遊普明廢寺山門草蓋磬聲殘寺外平橋走碧湍怪矣鬼燈爭照夜多年禪將不登檀杖尋煙隴烏鴉喜風起霜畦白盡寒在昔人牛何必問菜根同嚼坐團團從長水塘泛舟至梅溪驟水平川急下篙野田何事浪滔滔岸行畏見崩泥阪舟放愁難過石橋暖日漸長花影薄好春莫挽鳥聲勞今年筍學前年竹放葉抽梢一樣高溪上遇一生上人彼此不相知忽然成邂逅袖扇上船來大家喫蠶豆即事花落枝頭水滿川村家正是養蠶天道人坐此間難過日日溪頭自放船題畫種梅莫種泥春去梅剩葉何如素壁上時時落香雪題孝貞李氏傳十年不字女何貞願老閨中愛可旌一本認清真父母三從別樹好風聲時當混沌疑無偶世在鴻荒亦有情千載簡編環讀過為鄰獨得北宮名養痾梅溪答呂幼安明經惠詩火雲三伏燒阡陌留得梅溪一泓碧輕舠獨泛自南來何期居士先雙屐相看一笑竹風清鳴鳩正午柴門寂快哉晤對舊交知語語開心相悅懌主人清供出家常李實雖黃花本白古論儒釋道匪同今竟相忘無仲伯偕來一叟詞壇雄側聆玄論風生席伊余夙幸遘斯文不臥茲林且奚適馳驅六載走他山徒使庭前草痕積宿疾纏綿身已衰藥草甘辛苦嘗析忽聞玄度惠高吟滿院荷香清露滴送胡濤公之雲間溪上新梅種又成草年重過古人情正堪竹裏聽秋坐乃遽雲間苦熱行此夕聯床燈黯黯何山伐木鳥嚶嚶曉鐘百八雞聲亂遙盻孤帆野岸橫次六月大風雲氣吹教盡天心豈好殘已乾溪曲曲不見雨漫漫冷暖何從辨艱難此際看新禾能不死萬戶得心寬瓶中白蓮步韻佛手曾拈出風前一笑觀春泥分種子夏屋貯清寒幻色輕雲剪空香靜士餐對之煩熱解無用扇為紈喜雨二首秋逼空雷動無疑魃鬼徂涸淵天再見夢境物重蘇歡語皆相合人心亦易扶茅亭還獨坐不厭對高梧二涓滴兒童喜況乎聞沛然朝來階砌下亦自走新泉風作樹頭躍雷停溪面鮮甫田龜兆隱農子放歌旋立秋日作紅蓼立清秋間庭一雨收有香焚亦好兀坐看雲流詠秋色點綴階前久仍能庇緑苔不隨凡草沒有待秋風來顏色豈云老蕭疏亦見材高軒能暫過相向一低徊七夕與諸子分賦二首幽期難遂邁良晤入秋同河漢無愆水星槎信可通窺螢飛竹外留月坐墻東白社吾將老深談怯露風二暗竹蟬聲歇高枝宿鳥驚月生剛五夜露下未三更良友青山遠殘燈古屋明坐觀牛斗際相隔水盈盈題此君伯仲圖贈胡濤公粵惟此君君子所式育秀兩間中通外直寒梢拂空曰居其長其仲猗猗大節方養盤根階前搖戛清風詢其所從歸之濤公麻杖八首寥落河濱遇歸歟亦自奇遠情隨步履老骨共清贏倚壁月生影下階風可吹蓬根多不及欲立仗扶持二造物驅筋力老非年少同挾山憎舊杖拈草動新衷拂拭方晞露憑依若御風每當參請罷拄出笑兒童三剝膚何愛甚濯水庶相應謾以枯薪視當于忍草徵心空諸礙盡身捨外緣冰自合阿蘭若隨行事老僧四落日桑榆立清秋感歎頻自疑看竹叟有似折蘆人草木初無必居諸乃覺親因知古賢聖時與物交神五握手自今始秋陰仄徑移有材天不棄無用老方知所向常從坦斯須敢蹈危鷦鷯矰繳遠莫笑一枝癡六學稼何人請桑麻問老農直方如養竹輕便或勝笻晚岫明霞簇秋汀碧漲溶相攜無一語指點自重重七世路務趨走人生悲有涯吾將惜晚景杖亦愛秋花製作何須古裁成自一家茅堂朝復暮不見事如麻八一室秋林掩滄桑幾度遷葛陂龍既化麻媼久聞仙圖作逍遙夢因觀秋水篇茫茫常見外異事少人傳
