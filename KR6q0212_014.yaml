body:
  text: 東吳毛晉子晉編閲鄂州記室智時較訂詩部巳天童時七月十九姚廣若以畫扇洋布賀余生辰賦此答謝舴艋緣溪枉竹林久知玄度信根深青山黯淡藏諸袖白㲲光明得此心客定不聞秋葉響僧齋自識午鐘音片時良晤清風襲石上梅花記後尋贈魯魯山竹史魯山家有松魯山卻愛竹高節歲寒同心空此君獨不知老將至自覺神理肅松耶與竹耶清風出空谷贈項孔彰畫松八月十八潮頭生奔騰海上銀山橫項子來溪畫僧壁秋空忽落寒濤聲虯枝撑拏針葉密卻喜懸弧同此日雲堂佛火青熒熒常照幽人亦貞吉劉開旭鐫余草書梅溪石上其法甚精口占贈之涼風西來拂林翠余將入山去打睡有客持箋索我書乃是鳧山開旭氏軒然大笑向秋空水藻野芹誠有嗜我書落筆甚潦草淋漓滿幅何奇異開旭腕中有精技變化潦草成遒媚出余之手入余眼芒乎未辨斯真偽乃知君巧得天機刻畫飄飄極風致鋒稜轉折亦蒼然再四撫摩心眼醉吁嗟古人去已遠天地茫茫神理祕懷素智永僧之尤二家書法徒能記我非少壯不學書學佛將祛生死纍歲華荏苒白髮生無力重新治文字所恐流傳陷石中其時出脫良不易惟君能善護瑕疵書此葛藤留古意壬辰春余病甚卜一枝投隱而卦辭甚迂及秋天童使三至曰命矣夫偶記短章示公貞周子本欲偷間去如何占此辭行藏天已定去就我無私驥足空千里鷦身安一枝反常余莫解笑問大宗師將之天童寄鍾雪緣迢遞青山路秋來欲再登柏松廬墓近魚鼓梵宮層甘雨滋三草西風吹一藤病懷何以遣龍象笑翻騰寄徐忠可黃菊經秋綻青山入夢勞錫杯將涉遠風俗説登高挂席因聞雁持竿欲釣鰲鴛湖何淡淡白社有英豪寄別朱子近修落葉朝來漸見重間雲自在養高峰因懷廬墓修香火會見叢林伐鼓鐘霜竹豈忘君子節秋山應惜病僧容明年倘健登山屐好向深雲問鶴蹤酬范子遵甫數載交知握手中慚無妙軌繼支公亂離共走他山月幽爽仍分古院風深夜蟲聲剛在戶清秋雁字已排空一葦又渡錢塘去遙憶登高悵海東別秋亭鄭子子康兼諸道侶日日作東想秋亭往來熟今我欲南行秋亭秋正肅籬花帶晚紅霜竹生新緑明年復歸來良會期再續初主天童送法幢幟姪還雪竇永嘉昔日到曹溪振錫三下剛一宿君為同里間氣生乳竇高登繼芳躅選佛何如與選官曩步玉堂今椹服乃知將相真丈夫世出世間轉轆轆一華五葉天下聞臨濟宗風在河北峨峨太白祖燈傳衆角雖多一麟足小春望夜宿南山塔院二首微雨斜陽掩輕雷遠岫聞出門心在塔曳杖足穿雲紅葉溪頭滿青山戶外群松杉饒景致夾道自相分二一宿巾瓶側燈光夜更清電雷何驟至照用一時行不睡生依戀無言對几楹穹碑清曉讀相應有泉聲山泉山寺泉聲日在門佇看觸石怒濤噴老僧斫竹來為筧抹過重巖去討源龍潭白雲杳杳接青峰峰上寒潭拜老松縱是晴空常起霧為霖此處有神龍松寮山水留人最有情松寮夜靜話無生鐘殘鳥宿星河淡相對熒熒佛火明和雪竇和尚韻贈法幢老姪生辰出身金紫叢悟心青蓮宇巧將尼山鐸併入釋迦譜衆中長老稱鬚眉自高古笑問懸弧辰山鐘恰鳴午初春喜錢聖月入山夜話片石孤峰舊有心春風芒履剩寒侵齒敲雪句真堪筆鬢點霜花豈待簪謾托菰蘆埋歲月須拼燈火老山林地爐芋子天然味深夜煨來供苦吟送景星巖湛菴法姪相別玲瓏已十春重來會面舊時人景星巖在雲深處卻喜清風動八垠老我無能擔楖栗輸公有福放心身一燈河北傳將去流水桃花隔世塵蘇州貝葉齋培風師寄箋索題道影素箋一幅自何來想見吳門貝葉齋好友溪山頻寄字掩關苔蘚欲封階雲興佛事緇林仰筏濟迷津樂國懷老我住山無用處冬寒向火拾枯柴登招寶山天外何多水山巔更有城雲霞僧眼過風浪客心驚虎嶼今銷氣相傳海上諸山王氣所鍾為信國公鑿斷蛟門古受名滄桑知幾換煙際一帆橫過半山菴短策登砠久凌然想御風海沙春鳥白江岸夕陽紅汗漫遊荒外棲遲逗島中依菴餘古墓石獸狀猶雄登定海城樓杳杳山根斷茫茫海色渾蜃腥將駭鶴羊角欲扶鯤誰者司盈縮長年見吐吞馮夷難致問天地久相存總持寺方池涵水碧香剎古城依佛聖能無仰鐘靈亦解飛傳昔鐘樓將崩鐘先出外若有神挈杖攜春日暖鉢淨晚雲歸德必有鄰也學官何式微學官密通寺右海雲菴開山為無能律師今海衆盈百矩範肅然山寶城隅採菴雲海上來老僧遺律範古佛現華臺夜息繩床穩朝參蘭若開數竿庭後竹幽翠問誰栽永福菴開山為雲棲老人弟子號無徑肩輿隨澗入山趾鬱松林梵宇何年闢鐘聲此日尋虛廊容緩步間坐恣開襟蓮漏分來久天香繞玉岑阿育王寺古稱殊勝地常放吉祥光法鼓分明擊佛身何處藏泉名留妙喜閣記載奎章感昔穹碑在扶藜步夕陽草堂相傳為大慧禪師退休書扃則元泰不華草堂依鄮嶺篆額乃元人以一招提境而分上下鄰鐘聞當靜夜屐過自清晨差喜僧房僻投間亦養神懷雪竇和尚春雨濛濛阻客程春風花柳自分明萬工池面漚珠走千丈巖頭瀑布聲路實不遙天已暖地猶相隔夢先行亂鐘敲斷青山曉一片間雲谷口橫登玲瓏巖八首山洞何時鑿巖崖不記層樹深難見日壑轉一呼僧百尺捫蒼壁千年挂古藤最高吾直上誰謂老無能二寂寂二三侶行行亂草邊不辭衣盡汗秪欲杖居先眺遠遺人世馮虛想洞天隔峰聞活活何處有流泉三曲折投榛莽幽深絶採樵忽驚山鳥度時覺野香飄虎豹疑蹲穴風煙自捲瓢數禪何好事踵至未曾招四崖徑危如線誰能造次行側身防棘蔓傾耳醉松聲卵塔依空住塔中載先老人爪髮香臺若砥平隈巖看海日共有結茅情五陟彼崔嵬上悠然得大觀穿松童子健憑石老僧安野火村邊赤春雲天外寒十年重到此莫怪久盤桓六悄悄尋巖寶從遊不數人大家拋楖栗皆愛坐嶙峋炊茗日方午看花谷正春草鞋乘興返濡墨擬傳神七歸路從空下回眸記淺深一泓池內水幾曲寺前林忽忽寒生衲行行翠滿襟前峰猶未轉不易度鐘音八丘壑從來好山川未改常玲瓏名已久奇古筆難彰懶衲嫌其峻村樵幸彼荒桃源流水在浮世自忙忙謝徐心聿侍御見訪空山寂寂晝鳴鐘喜見籃興入萬松巖壑舊遊盟不替竹杉新長路如重杖停晚睡花香淨簾捲春風草色濃趺坐清宵餘道味地爐相向話從容送無等友人高蹤記別十餘年彼此生涯各一天此日春山重晤面梅花點雪柳含煙鬢毛覺白音無改道路云長足尚便夜雨疏鐘聊坐坐西興時有渡江船山居寒食二首山花漸發近清明山筍將生土縫橫擁衲空樓無所事枝頭啼鳥一聲聲二春雨濛濛灑一旬青山疊疊阻遊人經行西澗呼童子攜杖相隨伴老身獨步飯後步空池春風揚緑漪出坡人去盡白鷺冷相窺答范子攬鏡頽然已暮年如何疲馬使行千久拋席帽安吾懶重插山花取客憐溪上憶將尋舊社世間間得是真仙接君佳句從容讀自笑無籌一囅然贈聞季次乞戒皤然鬚鬢叟特地入深山信列緇衣裡緣生碧嶂間爰遵心地戒直透利名關佞佛非徒爾歡情動老顏寄懷龍池萬如和尚春風相送兩來舟記別松陵又五秋荊谷祖燈分照遠齊河法棒接人優臘登耳順摩霜頂偈説心空點石頭總是誕生時節好碧山深處放葵溜初夏巖花已落盡山鳥鳴不休憑欄看新篁放緑遮屋頭漫作八首太白天外望峨峨難遂登野火從空來燒盡間葛藤秋餘鶴巢雪夏解龍潭冰海霞多變幻一問巖中僧二空山時雨作日日峰生雲崖畔稚竹壯枕邊新泉聞萬木堆濃陰樵徑不可分散步成獨樂幽吟當晚曛三種田博飯喫古宿留宗猷每從山梁過竊喜秧針稠決決度勝水濕我草鞋頭微笑語禪子勤看水牯牛四空樓朝及暮疊疊望遙山花事已寂寞鳥聲獨關關偶上別峰菴喜得半日間夕陽墮池水幽亭杖方還五經時不出門出門有所思溪南無縫塔幾換春風吹石臺染妙香虛廊讀古碑衆峰環若髻入眼青纍纍六經時不出門出門山色鮮高下燒痕沒白晝飛蒼煙鄉村急耕稼民以食為天桃源何處問流水聲涓涓七經時不出門出門散幽襟蜂鬚花蕊薄牛足水泥深造物真小兒橐籥何能尋日入聽蛙鼓異口方同音八經時不出門出門天已暄山深無客至事懶少趨奔松杉蔽長道殿閣開重門寂寂對巖石鐘聲自朝昏寄隱湖毛子晉青山燕子語碧水桃花流湖上一回別屈指非三秋萍根南北轉歲月空悠悠何時渡錢塘故里旋虛舟毛公詩法古請讀高齋頭懷顧敬修昨歲在葑溪僻居類荒谷有翁訪柴門杏子樹正熟相對忘主賓談快歸不速南風今又吹雲山抱幽獨懷藝居玄若師憶昔辭故鄉欲作千里行藝居忽邂逅之子頗同聲別來三十年彌敦故舊情日月傷竟邁早晚修前盟答泯巖空林大師梅子熟青林枝頭囀夏禽何山浮黛色得似四明深老去思良晤交真慰好音衲僧雙足健採杖定應尋秋興五首湖上金風至山中玉露零歲華隨橐籥雲物變圖經舊燕巢依屋飛鴻字寫汀六橋秋漸好一望眼堪青二秋霖常晚注入夜亂山晴牛斗明河轉蒹葭白露橫遣懷歌宛在埋迹謝將迎獨愛長空月清光慰野情三西山來爽氣喜得夜新長螢火窺虛室蛩音近短床海棠階下媚巖桂月中香丹壑聊收足相將歲月忘四八月江潮大驚看萬馬騰有懷登北固先夢渡西興白鷺飛千樹青天布一層湖山開晚照恰稱坐間僧五造物真兒戲雙丸驅不休初將黃木葉暗又白人頭欹枕涼雲過開軒驟雨流因知泉石外客夢又驚秋晚步口占三首經旬霖雨阻看山謖謖松風透竹關木葉新黃山亦老鏡中誰箇惜朱顏二百戰沙場為立功古今天地幾英雄何如一衲秋林下臥看重巖海日紅三隱蓋亭前暮靄橫相攜諸子晚經行偶逢三叟來山外夜對禪燈問道情寄近修朱子杖錫來東海山中草木群衰顏情自慰舊社信稀聞寂寂俄臨澗悠悠獨看雲天高秋氣下庭葉又紛紛寄屠暗伯蟋蟀鳴中夜疏鐘動石床客心驚歲月山色見青黃來雁秋千里伊人水一方含情松際月皎皎對清光遣病三首編竹為屏界小庭不容野草近秋櫺鳳仙紅白雞冠紫能引山僧眼亦明二窗外秋雲淡碧天階前秋色鬥紅鮮看花卻有好顏色可惜人無老少年三簷蔔林中少衆花一株茉莉妙香奢野禪山外尋奇供老眼風前數嫩芽悼范子遵甫四首磊落斯人歎絶奇道腴文髓寸心知一廛晚賣韓康藥四壁春吟謝眺詩久擬竹林添鑿齒不堪蓮社少攢眉故交零落吾衰甚搔首西風鴈影遲二去年庭菊正垂英贈我新詩慰遠行病骨支離終在想哲人迢遞豈寒盟雲邊聞訃衣裳倒溪上觀身蝶夢成煙水梅花春又放白鷗何解語深情三大范英聲四海流君家種性衍箕裘固窮不墜冰霜志好古常懷鬢髮憂六尺夢魂徂此日一杯宅兆寄何丘蕭條遺櫬荒林下悽愴其誰助麥舟四盜跖縱橫日食雞首陽天獨餓夷齊才遺草澤評何衆學究衣冠理弗迷蹈海他山曾採蕨習禪蕭寺共嘗虀春殘疊嶂花如錦猶憶論心晚照低感舊二首昔感區中纍因投世外門衣冠非所戀瓶錫自為尊孤骨青山寄幽懷白石論臨風思往事惆悵對盤飧二少年曾落魄言念舊情深繾綣開親誼提攜慰稚襟未云他日報不負此生心鄉夢何迢遞悠悠獨至今病歎四首數日病來磨努力不加餐西風吹何急黃葉飛屋端二山葉日見黃人面不知瘦嗟嗟夜壑舟冷地誰牽走三兀坐情不開落筆亦乘興寂寂窗外雲底事間奔競四墨多恐狼籍手倦不自惜寫此秋風吟寄與舊相識興福鶴師兄五秩寄言寫懷六朝遺搆近山城初日高林宿鳥鳴古柏客來多問臘空潭雲過竟忘名弄泉昔笑皆童子對菊今成老弟兄鴻雁南飛人北望秋風不斷故鄉情知命偈贈鄭子子康淤泥三尺托蓮根相彼蓮根種獨存一念佛心開佛國五旬天命篤天倫龐公風範家嘗習鄭谷詩篇步履遵我贈此詩時節好耐霜黃菊傲泥盆壽泯嵒空大師龍澗談心後飄飄日月流山知四明好臘喜一花周末法同奔馬何人學飲牛典型欣有在世外仰巢由柬錢福先民部憶昔衣緇衣乃在山之阿高林照初日空潭鳥聲和諸天妙香華紛散殷藤蘿朝梵而夜禪白雲久婆娑念茲意不忘結愛三生多彼美西方人超然適無何贈田文蔚夙下菩提種今班將佐材深溪騎馬過大雨入山來智果重重結心花朵朵開曉窗相對面紅日照高臺再雪寒向中宵結飛同十日前山藏天影合樹惑鳥聲傳擁衲爐餘火烹茶砌有泉村翁談二瑞來歲定豐年示君蘭道友開春山路暖拾得草中芳葉本雖幽冷聞來几案香甲午修褉徐心韋御史六秩以園亭奉普門大士延僧焚掃之居然寶王剎也賦祝丘壑王臣尚鐘魚佛土隆喜當修褉日快挹考槃風几杖浮雲外鬚眉古宿中春禽鳴指下林卉正爭紅贈定海張前川總臺公遊太白宿寺中夢數老僧相謁凌晨過小天童見諸祖像恍如夢中因捐資復山産新像高懸金印海之濱天大將軍是現身塔廟因中曾許護祖師夢裏更傳神滄波萬里魚龍肅碧嶂千重草木春把定四明三佛地年年舍利放光新甬東古稱三佛地謂阿育王釋迦舍利維衛示迹彌勒布袋也韋聲玉刺史見訪居官還入佛一貫道深該末世興悲援靈山授記來古帆今挂渡明鏡久當臺把手春風裏巖花喜盛開奉贈王念尼道臺二首憶自秋江繫短蓬衙齋晚謁燭花紅薝香細繞維摩榻蓮社重追慧遠風片石孤峰懷保異蒼生赤子頌聲同行旌遄發當炎月有眷棠陰覆海東錢塘瀰瀰未揚舲早耳君侯德政馨博大擬儕周柱史風流不減晉蘭亭十洲記讀仙蹤遠三佛光生道眼青此去妙莊嚴路上快聞木鐸發人醒贈劉大宗邑侯德望高千仞仁風著一方民懷真父母僧頌大金湯鏡水秋逾湛冰蟾夜乃光口碑行道載今古見甘棠畫葡萄行老藤上盤不由架纍纍紫賁看無眼一顆能嘗解止渴多來欲售無酬價海蠡兒禪競神販滋味元來總成假山儂無事坐山中只合種此當秋榭學取西乾造酒法蔗槳勻和同時醡醉倒茫茫大地人鼾然枕上觀物化無懷葛天何代民莊周蝴蝶卑王霸法門今亦見滔滔何妨酩酊消長夏醒來再四覓藤樁枝節離奇眼光射驚風驟雨打青山託根何地能無怕曉露瀼瀼葉湑兮不松不柏清陰潟鳥雀爭窺也道奇胡為此果吞難下山磴崎嶇摘者稀甘鮮肯自投金斝未可天生悅口物從他爛壞堆泥罅不若卷而懷之吾袖中新條更待生春風搗釀真能作旨酒管取衰年兩頰紅登白雲山訊鹿門大師崱屴緣山磴崎嶇歷澗陰望來青嶂杳真個白雲深幽鳥晴呼谷疏鐘畫出林上方花雨淨一話十年心大梅山前案古稱琴山當禪師歿虎銜卵石成塔昔傳梅子熟今望尚青青松食誰偕隱荷衣可著銘采藤僧自去纍塔虎何靈流水高山在登臨請細聽無雨三首天道茫茫不可知山川滌滌颰風吹神龍何處淹頭角不見雲中雨腳垂長空望去久無雲山外青禾葉似焚乞士種田將博飯空雷共喜定中聞僧衆同音咒吉祥只求物阜與民康老龍須發慈悲力清冷雲中降雨漿雪竇和尚貽雁宕山圖展玩偶書畫師具有神通力千里雁山移面前老大久因無足力層崖一望意驚然贈雪竇山下余子太千丈崖前瀑布寒君家得近往來看過水埠頭僧過水不知溪水可曾乾止山戒徒來自海虞有懷孫廷侯老友荏苒年華去衰贏百不能霜添鏡裏髮身作越中僧念子來千里看余倚一藤喜聞蓮社長足健愛山登贈破浪上人仙山難遽即禪水試浮杯境界風都息森羅印忽開浪聲隨岸伏鳥影自天來獨立何人也胡僧笑滿腮過東谷庵即事四首經旬懼炎威不得過東岡立秋喜三日思來拂木床悠然雙蝴蝶翩翩入我房以無瓶花繞掠取瓦罏香萬物抱靈智資生咸有方小窗欣洞開節候知初涼去來一無語慰余情自長二小室僅容膝每來生遠心傍有老梅樹下有修竹林開窗見諸峰螺髻青森森日高露未晞階樹垂濃陰寂然無客過山徑殊自深空亭有銘碑細讀開吾襟歲月已久邁古人光未沉顧盻語諸子茲辰可無吟攜杖出門前坐聽秋鳥音三六合在我目浮雲去無已宴坐無所思但覺風日美艱難念前月草木焚欲死靡村不請龍靡山不竭水雲霓無入望亦莫知所以今也蒙沛然下民足生理枯禾有生色青青在田底山梨挂樹頭高下何纍纍四兩僧肩一輿隱隱隔林叫恐余歸步遲知余足力少入門山雨至相顧同一笑野貌不外飾山語亦臻妙呼茗與之啜草鞋各緊峭魚鳴午飯訖無復事遠眺殘雨若霧飛日光隱而照栖遲望村原深谷何窈窕先覺未忍忘三塔重一弔隰州在其中凌然仰高調塔塵手自拭層石使畢耀憶初少林燈猶之任公釣五宗何時分混沌嗟鑿竅歸途山更靜淙颸滿林徼前峰抹煙雲佳處時領要贈魏太生行針法微針元鈍鐵巧製解司權病向三秋卻功居百藥先竅中神鬼暗指上扁倉全生息相關際丹經古祕傳郁素修惠圖章此道從何授于斯見古人石文參造化鐵筆寫精神疏雨秋窗掩清燈夜榻親區區刻畫者把玩詎知津趙氏三喪得舉謝陸葆初道丈六尺于天地飄零愧不材恩從瓜葛起感自麥舟來白骨欣安土青山笑舉杯主盟誠大澤言念倚巖臺寄殷佩所往歲隨冬舫沿溪過晚齋孤村生遠夢靜夜愜幽懷近水竹連屋經霜菊滿階高年餘道味語笑佛心諧賦得疏雨滴梧桐五首夜靜天如霽山煙牛未收清音時一下涼砌倍生幽隔樹螢分火棲枝鳥帶秋鳳兮衰已甚坐詠數星流二暮山諸品淨欹枕未深更他樹亦餘響卻無如此清孤吟燈喜照幽坐磬忘聲嘒嘒高岡上秋蟬底事鳴三入夏陰常滿經秋葉尚存碧枝留雨氣清夜肅心魂灑袖階前爽霑笻谷口昏最宜松際月相照露微痕四幽獨中林臥凄清下點微睡夫空著耳靜士快霑衣山月晴仍吐溪雲濕未飛孤桐誰共據返聽學忘機五涼風初到樹一葉井欄看得潤顏猶澤驚秋骨未寒將疑下威鳳因念托翔鸞指點朝陽處題詩墨未乾詩部巳之二天童時之餘題甬東錢聖月歸來閣有序五首甲午秋余謝太白事錢子適浪遊弗遇也及歸遺箋索書歸來閣三字及詩感彼此異蹤而同情乃於一時率吟五章以寄役役人生事遑遑何日休恰當辭廣座聞亦謝貂裘對鏡顏俱老登樓思共悠故園松菊在知不廢賡酬二市井機難測山林網更深知還安鳥性出岫淡雲心交在音書杳名飛歲月沉居恆頻內照古道大非今三祗樹悲秋響嵒居有所思朱涇垂釣日彭澤去官時古尚須尋菊餘間或聽鸝回看當局者鬨閲太生癡四努力不加飯是身寧久嵒雲山樵子徑煙水野人廬萬事方芻狗一經存蠹魚梁塵隨案積欹枕到華胥五獨立塵埃外驅馳笑兩丸到窗山個個出檻路漫漫雁度明河迥螢飛舊井寒活埋真面目潦倒任人看乙未春日有僧自桐城來聞元白和尚領衆清泉寺蓋別十三年矣賦懷寄之泐潭初起馬駒家法窟江西自古誇偶爾春風傳好信依然芳草隔天涯青山笑弟終無買白髮如兄也日加廣坐又移投子近油油公案問應賒舟過松陵吳端公文學來謁自道生平所存展箋索語端公舊字梅之春水蒹葭路梅翁遇水邊語開三代直名允四方賢雅好心空法將登耳順年生平卑貨殖端木笑忘天仲夏寄懷沈爾任文學一盞尋生計清秋九月天相逢猶昨日為別已多年君子道方長山僧病只眠薰風聊問訊書幌芰荷邊過觀瀾庵二首桑陌路猶濕竹扉涼自封片懷臨曲水獨宿羡孤峰荷萼含香足桃根得蔭濃蟬聲隨斷續箕踞愜疏慵二盛夏正流暑幽軒且息勞蘭衰猶帶馥松小亦生濤得句書蕉卷圖涼解苧袍有生何役役無事屬吾曹寄周貞可二首樹上新蟬噪不停翩然過我話無生方舟別去誰家宿坐見一天星斗橫冬軒抵掌共談玄彈指薰風又隔年肺腑洞然能盡見輸君薦得指頭禪秋日奉酬李平庵見寄白社推玄度金蘭夙契君微蹤雖獨往此道未相分江上尋秋月山中學凍雲佳音懷正始五載得重聞
