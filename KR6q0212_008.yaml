body:
  text: 東吳毛晉子晉編閲鄂州記室智時較訂偈戊寅初住銅井山勝露居士伯明吳先生以四偈貽岫于有林下風味援筆次韻閒山隔乎鬧市頽房帶以疏楞翻憶古人樹下安然坐臥經行行非行絶定相住無住豈思惟但能心淨土淨一任雲居水居雪山家風冷淡黃檗佛法無多鉢盂大家有個試看擎展如何一燈遙績靈峰扣擊本無所有時拈楖栗橫肩衫破莫嫌露肘山中吟為僧宜居山山靜人事少倚杖立松門終朝聽啼鳥二徘徊古澗曲跣足弄潺湲石冷苔花滑松蘿時復攀三樵斧入深谷忽聞聲丁丁因之思好友把臂談無生四青山終古青片雲何來白縱觀大化外峰頂嘗獨立五飯後經行慣步入深松裏忽思煮春泉拈杖打松子六人心肯放下立地便成佛優游藤蘿下那個求解脫七幽香滿山路空谷俱梅花肩輿風塵客亦自愛煙霞八山梅未落盡間有桃花開物情各知候代謝休相猜九青山不盡處又有那山高法源苟未徹覺物徒為勞十在山採薪易下山持鉢艱大梅松為食清風今復還正月十日大雪春來飛雪一何奇深夜凝寒客未知點破山河成一色望窮天地忽如遺巢禽偶出空音落松火頻燒過衲遲敗屋數間峰頂上家風無愧老楊岐歲暮至上元夜紀述十首初住窮山屋數椽日持一鉢走松煙現成受用真難得千畝梅花在目前二冬山怯冷早關門洗鉢攤書日易昏幸有團圞二三子火爐頭話不空論三年窮歲盡客途艱贏得住山心較閒趺坐一燈深夜靜遙聞村犬吠人還四古人分歲宰耕牛話落叢林播不休我送窮冬秪隨分也令一衆飽齁齁五新年佛法只如嘗紅日三竿枕木床古廟峰頭最靈感雞鳴早有客燒香六多年想就住山緣半載剛逢不雨天喜是交春來雨雪方池積得有新泉七去秋天旱地生蟲園菜無根可御冬因課道流須著力快鋤雪土種青菘八疏疏春雨送餘寒殘雪依稀點別巒佳客不來啼鳥靜開簾自把遠山看九山河一片化為雲折竹無端夢裏聞未看梅花先看雪松柴斫得帶煙焚十雪霽千山潤氣騰簷頭雨滴又相承元宵煙火杳何見點起法門無盡燈庚辰冬開法古南入春偶成八首新正人意爽匝地皆和風踏青者為誰相攜陌上翁二春來荒院裏亦有梅花妍枯坐偶不覺清香來鼻尖三山川寒氣盡籬落梅花開遊蜂亦有鼻悄地隔墻來四村院入新年遊人日來看可憐衣內珠拋撒無能管五殘雪點茅屋和風拂柳堤西來祖師意覿面為人提六孟春氣猶寒爐炭少不得偶撥一星火燒著柴頭赤七春風亦自寒蒙衲坐終朝萬物資暖氣籬間長新條八方池久枯竭雪消春水來昭回見雲漢天宇地中開穀日唐祈遠居士以登天目八詩手書緘寄步韻卻答幅巾居士任斯文毛穎宵眠夢吐芬已自胸中具丘壑卻登絶頂飽看雲二巖松奇崛甚年栽雲網重重午未開不得僧房閒打坐肩輿豈易下山來三衣添亭畔御天風石鋸峰頭見鬼工姑射仙人遺世立古今憑眺自無窮四嵐霧晨飛點滴聲下方疑雨上方晴平懷無事嗤山衲垂涕方煨折腳鐺五巋然劫火自能存石骨蒼青沒燒痕坐飲天池豁天眼壺中信有別乾坤六千聖從來喚不回橫擔楖栗白雲堆鐵蛇入海須彌倒咄咄西峰早晚來七行腳心頭已悄然不禁放曠好林泉松風水月終何物結我多生聚首緣八在欲行禪古不妨無人空裏架高堂如何獅子峰頭臥覺得風塵夢不涼示楚萍天地一逆旅浮蹤信如萍吳楚曷為定子當觀其生又一燈虛室懸雙樹空庭緑緬懷古之人恆于樹下宿示慈舟二首往來無住相援溺何其多佛祖無緣慈不忘生死河又生死海未渡誰為濟人舟要行船子慈一橈打人頭溪院言懷七首孤峰不住足曳杖來荒村村荒煙水闊信手一拋綸二先佛之遺式隨緣即道場相聚喫莖虀佛法謾商量三三莖四莖斜多福一叢竹空庭亦有栽蕭蕭戛寒玉四上客禪床見下客山門接同塵憶趙州相逢憑拜揖五曉晴縱野望煙村緑柔桑桃花滿前溪誰歇靈雲狂六勺水大海味寸草黃金身入荒田不揀拈來示其人七本來無一物心佛兩俱非突出人難辨從呼上上機獨坐秋日當軒坐庭前竹色濃客來無秖待禮拜且從容癸未八月朔日禮洞聞和尚塔有感六首微風細雨半秋天合掌山南禮石筵短塔摩挲封碧蘚長松攀仰落蒼煙躊躇古磴神如往顧盻晴峰步不前拈罷瓣香思告語百城蹤跡已茫然歷代簪纓亦自尊胡為塵網草年昏雄音善啓諸迷戶小子何知大法門深夜月明曾授偈西風葉落定歸根白雲滿握清晨供愧向人前說報恩余初投維摩老人一夕喚入方丈示云出家如桑間蟲食青則青食黃則黃在自知所向耳余從是鋭志參禪珠墮泥中實所悲煢煢弱喪竟安之座中默識還他父門外求傭未可見金翅攫龍窺命盡頻伽在殼出音奇等閒拔置稠人上咄咄婆心為我癡余初剃落執役爨下老人見之語衆曰此子如珠在泥中又余侍老人嘗效作偈語老人見之曰多年鳥子殼中先老頷之良久住山不記歲華深一味平懷坦腹襟怕殺鼓鐘登寶座直從談笑度金針五羊曾踏曹溪脈雙目高垂濟北陰潭影山光今坐斷分明末後句難尋老人行腳單丁過南粵初住山於天目中雲庵投老高林頂髮皤西巖獅子古頭陀一峰兀傲榮名遠千偈瀾翻手眼多擇乳鵝王應旦遇點頭頑石敢誰何長吟猶記摩庭柏雪夜寒聲出薜蘿老人居天目時追跡高峰自號西巖獅子化後牧齊錢宗伯狀師云所至住山誅苑皆其徒雪庵拮据庀治師惟飲泉石而蔭松柏不汲汲於榮名利養又塔銘云登堂說法千偈瀾翻說禪浩浩競諸方密用潛行笑世忙獨步有時偕竹杖見人曾不下繩床至今面目堪相憶疇昔巾瓶所未忘海岸歸來重問訊清風匝匝在龍岡老人嘗自書方丈壁云便宜為得三分瀨折木空隨一世時武康駱沆瀣先生訪師見之大稱賞蒲庵二首贈慎獨師有序唐睦州陳尊宿既明祖意母老乃奉之古寺閒房織履為贍一時緇輩傳稱為陳蒲鞋慎師有母年亦高名庵曰蒲志古也自古生民念厥初異哉睦老獨編蒲高風百世堪懷想荒境荒庵德不孤母子相依二六時天倫攸敘在吾緇直拈法喜充甘旨慚愧當年考叔兒武塘周西玄居士有喪明之戚寄慰天道無親與善人每于顏冉不相成團圞良以因緣幻父子聊云骨肉情舍愛維摩弘不二耽禪龐老話無生曾知個事安行久不若西河為喪明新正四日答李曉令醉後句附原偈醉裏茫然無見聞如何此際更紛紛幾時識得我是我留伴青天一片雲聲色叢中立見聞新年好事日紛紛醉鄉爬起尋真我半入江風半入雲春日走筆六首早春天氣好思想出門遊無人知我意自去覓孤舟二春草出門緑春風吹袂寒一般好時節途路莫相謾三梅花落片片春過幾多時丈室空空坐人來求我詩四詩成秪五字費卻許多心分付幽人看無文意自深五紅日半窗影白雲千壑心共來天際轉著眼幾知音六簷頭滴滴響春雪未曾消有興書山偈梅花一瓣飄天童山久雨有持扇乞偈者連日空山不住雨層溪深夜長新泉茅堂坐索驚人句忽聽奔雷不得眠偕高原石幢同人三公夜出石筍峰霏微山雨暗山扉石筍峰頭路欲迷把火夜行誰共我笑看腳板不沾泥宿天竺三生石飛來十萬程向此介然立生前事如何我睡忘所答李明遠居士乞悼兒詩四首嘉爾孩提子沖然夙慧成胡為天見奪幾致父傷明至性元無死常情且吊生四齡通浩劫誰為錫殤名二死生關透去父子念無忘繞膝行三步歌詩記幾行生天休合掌見佛且燒香長壽從何得仁慈第一方三世界非真實彭殤盡可哀苦從違覺得身屬愛纏來佛日恆依仰迷雲定掃開法華談火宅為度汝嬰孩四百歲不知佛一齡能了之古偈有生一即解諸佛推利智未敢薄嬰兒氣盡豈終沒靈歸應在茲西河休墮淚自有過庭時重晤雲峨先生當年共有出塵心別後參商直至今我病忽衰君老大歸根一句好參尋題秋亭天地分明一旅亭何須紅紫鬥窗櫺淡然宴坐秋光裏木落西風眼自聽丁承清齊夜談二首南湖霜月夜來明桑陌何妨把臂行歸到幽齊重秉燭雞鳴待看一陽生二君家孝友原天性會晤曾無有墮容明發別來何所贈白雲遙指在前峰示玄谷二首呼之隨我至放之還自然蒙莊品天籟未必將此傳二杳然入更深清響空何度歷歷山中音欲尋且無路新正十八日壽虎丘本如老師可中庭畔老梅開雪頂龐眉步石臺記得元宵十五夜山前花鼓打如雷病起三首歲晚天多雨春初喜得晴雙眸只如舊水洗覺分明二春風忽過半林卉尚無開兀兀當軒坐其誰問法來三風寒時閉戶庭霽一扶笻有友來相訪皆言瘦道容乙酉春大雪破石一念二禪人聚彌勒佛像于中庭衲子競觀悚然增敬以幻修幻無是過也戲拈四偈春寒料峭凍梅花相向紅爐且喫茶聞道雪中彌勒降卻疑時節是龍華二衝寒掃雪手忙忙古佛分明應念彰莫道捏成同幻化聚沙童子證金剛三謾疑彌勒是天生也要當人肯做成拈起雪花全體現衲僧遊戲出常情四石破好將彌勒補雪多堆得法身高都來一念無今古不怕扶桑日出消鰲魚燈三首春夜無燈覺寂寥不勞針線引鯨鰲龍門險峻能衝過火焰憑伊噴雪濤二眼似銅鈴口大開騰身空界鼓雲雷昏衢引導人無數滄海茫茫未肯回三通身鱗甲一般明頭角年深已養成口似血盆牙似劍放伊天外試橫行走馬燈三首烽火相爭值上元銜枚疾走一無喧但持劍戟軍方進莫辨疆圉日已昏決勝真于帷幄裏鳴金直待曉星繁驍騰恐是昆陽戰鷹虎從空牙爪翻二陳雲忽起夜難收平地干戈戰不休各戴兜鍪行塞外全無生死掛心頭三軍何日方旋凱千里其誰密運籌關捩洞然閒覷破燈前一笑也風流三走馬虛空了不停輪刀上陳太忙生步趨不覺飛塵起隊伍皆欣用火征鬥狠共拼無性命情癡決欲見輸贏老僧白棒中間打眉目看伊那個明火爆頂門迸開眼毒氣放光明爆地一聲響分身遍界行竹扇犀牛扇子古時名這個分明竹製成莫道鹽官能善用等閒拈起便風生乙酉孟夏天童南山禮先師塔有感四首膜拜蒼山雨忽開思量往事不勝哀命根斷盡深遭毒爐鞴無端幾換胎矮柏森森當墓拱肩輿特特渡江來反場築室情何限搔首薰風愧不材九上三登太白巔忙忙空費草鞋錢了無佛法巾瓶得堪笑追隨二十年逆性未甘稱的授婆心難免喫粗拳父南子北冤難訴贏得虛名四海傳白棒逢人便打頭中興臨濟有來繇雷霆霜雪無非教五位三玄盡結讎面目那能描紙墨典刑自可配春秋升堂入室誰真子滿目青山笑不休自揣生平最鈍根擔簦亦得及師門狂狷所賴裁成力草木能辭化育恩縱遇三周三轉語難忘一棒一條痕兒孫腳下繩繩也認取全身在處尊梧山十七詠高梧峰志名鳳山其上有梧桐生焉世傳日升則梧影東注地名桐照日落則梧影西注地名桐照四市至今兩村人煙稠密地名仍舊丹鳳何年到碧巒高梧千尺老根蟠日輪為寫東西照直得分身兩處看龜山為梧山左小支首尾儼然望嶺而上當年洛水把書呈泥土今看亦最靈七十二鑽無下手高高山頂任渠行道場山在龜山前為寺左護草木清秋盡發光分明海印目前彰道場信足原非遠乘興時時上短岡碶頭山與道場山相連北轉向寺其外則海矣洪濤澎湃潑天狂永作金隄鎮寺傍亦有人家三四五山頭日日放牛羊鷂子磯即四明圖記所云棲鳳碶也有石俯瞰江流方平如削可憑清玩俗名鷂巖鷂子磯邊鷂子飛秋空萬里迥無依閒來散步沙洲晚頻見村翁負擔歸棲鳳村為梧山左大支元末吳之賢士沈芊仕於楚避亂因移家海上卜此村居焉子孫今大暮衍按古碑寺之地名棲鳳亦名赤砂村蓋本此炊煙百道揚朝曛開戶家家見海雲嘉遁昔賢來卜此悠哉理亂竟無聞天門山亦梧山左支落脈蜿蜒將逾數里回抱鳳村而西與寧海之山相峙漁帆商舶必從此門而入實亦本山之遠讀出外即大海雲濤接天渺焉無際矣茫茫滄海望無涯冷地天山出盡遮剩得一門容出入夕陽隱隱過帆斜石門在梧峰後有石壁立流泉中瀉當水漲時無譏名山瀑布其下有石橫亙數丈噴沫撮鬣儼若神魚志載石龍湫疑即此處也磊石如門匪疊成到來殊愜野人情懸崖白日飛寒瀑信有神龍此處行護帶山從梧峰而下向右第一支也山澗盤旋若帶俗呼為杜搭訛也松煙竹霧午難乾絶壑深深眼界寬滄海在前雲在足幽蹤卒歲可盤桓桃花坑梧峰衍脈至于護帶其間坑坎幽深曲折而多桃樹花落澗紅無異桃源仙窟旁有精舍今亦頽圮千樹桃花滿澗紅深山春色許誰逢無端一瓣隨流去盡道茅庵有路通鶴山為梧峰右支與龜山相對桃花坑在其上問津者從是緣溪而入巢居亦自解知風毛羽而今盡短松一棒打伊呼老鸛也教直下頂門紅北澗梧峰之右支山數重高者如屏列自北而西深奧幽邃澗原發于此不一而下尋者莫測出至寺傍合流向西朝宗于海潺潺流出白雲堆寺後清聲特送來到海也知無別味一憑飲者口門開赤砂廟此山甚卑其脈與梧峰俱從北來向西而止與鶴山隔一澗道為寺外護恰與碶頭山相對廟在山址村民歲時祀之名赤砂者古碑云住持所居之室東西菴砂土間金星小砂與土相雜則廟固寺之所攝歟老樹濃陰秋未凋低山古廟有人朝怪來地脈連蕭寺赤土金星也自饒一木亭去寺里許相接海塘村民入市多于是憩息相傳初搆時棟梁椽柱秪用一樹而就以此知寺在古昔生材亦大矣一株大樹架空亭郢匠裁來不日成遍作陰涼途路上炎風赫日有人行蟠龍山為寺坐山從梧峰中脈迤邐而下凡四五折若斷過峽復起狀其屈曲來至殿後又微分小支左行而西其右忽平伏凡若干步更起小峰與外道場山相對今法堂坐其下佛殿在其前而脈勢過西益悠綬又若干步乃南折焉與左行小支相接名蟠龍克肖也海岸蟠潛已露身非同尺蠖欲求伸法雷茲若春雷震頭角看伊亦斬新又聞之鄰宿言昔寺僧于法堂左鑿山造石土去石露是後深夜山常鳴不止噓氣成雲下鳳岑屈將首尾護祗林曉來忽起千山霧聞道潛龍夜半吟古寺今寺乃元至正間重建坐北小峰向道場山缺耆老云在初古寺西向海田胸襟極開闊因志之寒露芙蓉開菊先西風桂子落墻邊偶逢人說前朝寺開卻山門見海田大峒山與高梧對峙嵐翠可掬為梧峰之正案雖隔海潮落可褰裳徑往者山望見那山高賓主分明不隔毫秋雨連朝當牖坐一條白練下滔滔天童木和尚送被東謝二首出汗叢林借被無古人真個好規模霜風劈面今愁冷自笑儂家不丈夫二棲真借被于天童大義全彰徹骨窮一種便宜親討著三冬贏得暖烘烘和南源大師山居二首廚無餘粟甕無虀乞食山鄰恐見疏衲子過門爭一飽卻嫌鹽醬太空虛二心花明發即傳燈稱性優游遠世情折腳鐺兒攜海上青山同作野盤僧早春寄訊錢塞庵相國二首新年佛法問如何溪上梅花開已多向上一機言外契風前遙憶老維摩二柳眼新新陌上看海山桃實貯金盤本來身喜先天地一吸西江口自寬寄謝虞潛陽給諫高林萬竹點徵霜佛法乘時一舉揚得晤毗耶老居士幅巾杖履映溪光酬空林大師見寄兒時曾讀古人詩花木禪房歎絶奇竟喜尋師從是吉未占投老此相宜空潭再照非前影古柏重摩只舊姿布衲牛子雲外集恰同歸鳥共依枝七夕鄭子康初來參偈贈相逢語語出肝腸竹院幽涼坐一方志鋭徑期探法髓機鮮祗可接禪床玄珠在水曾無象花雨彌空或有香七夕果然同遇巧分明腦後佩圓光贈陸子念羡爾水邊居士宅悠然物外道人家不嫌耕稼妨時禮能令禽魚聽法華志在青雲空萬卷身修白業洞三車樂天知命冰霜際飯罷伊蒲自點茶病中謝客四體居嘗癢即抓誰知癢處有難消防微失術遂成毒經事知幾豈見遭因借大千為一榻時拈木枕作新交空齊問疾多明眼莫謂藏身太寂寥雪彌勒二首閻浮昨夜打三更慈氏無端忽下生宮殿隨身同一色天龍禮足寂無聲珠林瓦礫祥光現大地山河古鏡明三會龍華收拾罷雲堂添得冷惺惺二橫挨布袋當家珍玉殿瓊樓轉法輪鼻孔遭誰生扭捏眉毛已自證純真嚴寒徹骨肩猶袒旭日當軒笑轉新敢請慈尊常住世時時垂手示諸人答李曉令來偈有直待石獅吼方來對師說之句居士忽作石獅吼底事不妨盡底說何待將來重措詞遍界明明廣長舌贈形家李同春山嶽鍾靈古到今白雲為蓋水為琴收來佛法無多子放去峰巒幾萬尋發祕堂堂須正眼抽奇的的在神針多君此道生平踐華髮肩輿日笑吟寄題錢聖月𠁼丆輕輕下筆點三點非縱非橫梵字成莫以聰明嫌有象須從一悟無生青山啼鳥聲偏好靜夜孤蟾眼倍明聖遠乎哉其在是瞿曇千古見深情禾中重建真如寶塔鴛鴦湖畔水溶溶寶塔分明在目中雲落簷楹彰異色風敲鈴鐸醒群蒙滄桑變幻尋常事瓦礫神奇起倒同曾記法華童子戲聚沙成佛不虛功峽石山慧力寺修鐘樓有鐘必有樓無樓鐘無居扣之雖一音千睡醒斯須耳根既圓證不隨聲塵趨奇哉古觀音處處得逢渠子康鄭子清修梵行攝入法系命之曰恬作二偈貽之桑麻隱隱小橋偏清梵孤村日夕傳謝卻紛譁何所悅佛心天爵已深研二衡門之下可棲遲流水經年漾緑漪種得芙蕖香滿室悠哉未許比鄰知贈范夢覺森羅萬象強名模夢裏崢嶸醒後無只此身心同古佛收來天地入洪爐鼠肝蟲臂何從勘寶樹仙禽待價沽行到水窮雲起處廬山面目似冰壺示陳宣其文學魚躍鳶飛天地間溪聲山色更何宣個中一字原無有空劫家風在眼前示陸咫顏文學尋常運筆寫文章母未生前面已彰何必論尋兼論尺從來遍界不曾藏示王臨玉文學生死臨頭也大難直須身命一回拼果然是玉何妨得縱歷秦庭保汝完題崑山戈玄淨先生略傳後世鮮信佛法謂無靈驗處驗處豈果無力行人罕遇我觀戈先生學佛忘寒暑所以臨終時撒手灑然異如酪出乳中初非人所與自性與法界清淨口中注此乃現前事推之可風世生也從何來死也終何去分付天下人透脫此圈繢示丁方流法名行嘉讀書正心術學佛徹心印世間出世間法門了無剩示吳彥正書中有聖賢書外無衣冠少年惜白日莫取斯須安贈丁和卿文學獨坐村庵擁毳袍春光依約上梅梢真人誰謂邈河漢默飲高風已獲交贈丁長卿文學二月春風花柳妍恰聞居士耳根圓延齡不必長生術面目分明太古先偶成桃李芳菲菜麥稠春光絶好在溪頭廬陵米價時拈起衲子茫茫到處游達本上座乞題墨蘭老僧乞題竹展開卻是蘭蘭竹欲誰辨驗取自鼻端題徑山雪老人畫扇此畫仔細看徑山老人底今在居士手雲林好生持壽朱近修母慈淵查孺人閨閣藏身有令名家門鍾孝在鄉評也知事佛已多劫偶見行慈當此生道路饑寒躬自濟兒曹艱苦念俱并晚年更究西來意碧沼蓮華出水馨書嚴髻珠米單文後二首衲僧腳下無寸土粒米問從何處來幸是隨門總檀施饑愈飽處覺花開二同人之道沒親疏迦葉空生會也無發意圓成衆功德等慈一著是良圖和海鹽劉霜崖邑侯持鉢偈附原偈帶水拖泥說化緣霜崖居士兩空拳饒伊餓得乾成鱉猶向山門索飯錢佛祖家風展化緣難為居士助空拳山僧粒米未嘗咬不識其誰還飯錢酬髻珠居士二首附原偈居士宿山中因談行起解絶後歸寄豫二偈云解絶即行起轉我不轉你子歸而求之天眼被底裏趙州茶點中邊味擎向邛州沒縫磁不是故人情分重宵分頻擲夜光珠解絶即行起覿面分我你撒手便歸家瞳人在眼裏二趙州茶是山中味聊獻邛州白淨磁報玉投桃何可喻直看雙手撒明珠贈丁韓雲文學二首洙泗高風在明新學脈真吾無隱乎爾入水見長人二文章載道器山偈談何事君子觀吾機落紙元無句曲肱而枕之示吳子進自體自受用任運靜而安樂天尼聖旨春在杏花壇雪窗獨坐迥禪展紙索書上天忽同雲雨雪正交并袖手坐空樓捉筆亦怕冷茶後發清興書偈恐失韻大風簷前作來自西北境待看夜雪積成堆大地山河光迥迥示夏禹公梅子黃時杏子肥枇杷甜味世間稀又看桃子紅來也信手拈來便療飢示張兩如空山時雨落綿綿鐵鼓遙來破澗煙一句伽陀寫將去要君腳下自流傳竹窗偶成直截西來意奇哉觸處通倦來兩眼合睡起一茶濃燕語茅簷下鶯啼柳圃中分明無隔線窗竹引清風題李曉令草亭小亭軒窗空客來皆喜步大勝維摩室化現千獅座題風竹圖蕭蕭兩竿竹葉葉從空下天風何時歇使伊挺身罷題王宣遠南詢畫冊腳跟掀起半空中打著鄉談各不同掇轉船頭歸去也至今流水盡朝東二居士畫時無錯筆山僧題處有淆訛毛錐一點虛空落好手丹青沒奈何寶晉齊閲仇十洲臨李龍眠畫佛嘗隨衆卷法界幻為體聖凡總遊戲奇哉換人眼在此一張紙祇園諸應真一朝與相對面目未必真圍繞殊有意識破指頭禪去佛不遠矣梅里鎮重修東塔千年寶塔一回新多少香花結勝因清曉登來看六合出頭天外想奇人禮夾山林皋和尚塔夾山和尚與豫剃落皆依興福洞聞老人後嗣法又同龍池一脈曾經大嚼過屠門愧我初終辱弟昆花木禪房蕭寺古竹林清磬甕城尊全身示入山中定好手還扶向上根觸目生機誰薦去江心白浪向空翻悼黃介老有序八首介子雖儒深入禪觀鼎革之際抱義下獄末由致問己丑春莫傳聞坐脫江寧得大自在永訣時手書一扇囑門人鄧生者相寄至七月中浣始得見之於是就破山丈室中莫一茗詠歎其詩如見其人不覺悲惋中來因次其韻為偈八章所寄詩云劍樹刀山掉臂過長伸兩腳自為摩三千善逝原非佛百萬波旬豈是魔潦倒不妨天亦醉掀翻一任水生波夜來夢作修羅手其奈雙丸忽跳何閻浮樹下暫經過授記靈山頂再摩慈忍牖民唯有佛嗔癡退舍已平魔勞生且共眠長夜世事從來等逝波留取菩提真種子人間天上敢誰何二太白峰高幾度過塔尖雲霧日為摩真宗有授能超佛堅甲無須乃入魔紫燕識巢歸社日白鷗顧影泛春波寄來一詠驚長歎奈此題邊姓氏何三芳草春江不得過遙思獨把管城摩青雲幸作文章佛白髮能空生死魔身世信然皆石火乾坤無處問風波炎炎六月山如炙一扇清涼意在何四憶昔江城冒曉過人肩鬧市正相摩師門握手投膠漆法句當鋒折外魔百劫肝腸藏碧血三年流寓隔滄波好音末後終相及生死同條誼若何五乾明古寺客秋過殿角風鈴日夕摩丈室花紛方論道法堂草長不為魔潮平山閣僧眠石雨過江帆鳥掠波白露蒹葭時又至伊人宛在欲從何六五濁人生未可過一笻瀟灑手常摩戰爭蠻觸誰為長心醉榮名亦是魔寂莫青山堪閲世深沉古澗自無波分茅定鼎昭前代墳典相傳又若何七有土於西莫是過金繩覺路入三摩口憑樹鳥同歌佛身長蓮華不見魔寶閣天空香自雨玉池水滿靜無波利根直證無生忍壁立常光孰奈何八鐵樹花開少客過瞿曇拈起手親摩聖凡齊掃非名佛賓主同時要揀魔惶恐灘頭戈倒地滹沱河畔棒興波中原一寶君賚得爭奈無人著價何書徐虞求先生讀語録二偈冊二首相逢滾滾利談鋒林下何人入我宗時節到來能撒手空山六月打霜鐘卸下儒冠付老天干戈叢裏且逃禪世心灰盡靈根長應起東林學種蓮莖虀偈有引辛卯歲暮錢子聖月寄書云近榜所居曰莖虀欲得數言光寵余乃思祖家垂示有大家相聚喫莖虀喚作一莖虀入地獄如箭射錢子取義或於此耶余因下一注腳錢子愛禪者也其不輕視莖虀作遊戲乎指頭十個最難齊錢子參禪又割雞未至竟酣千日酒如何敢喚一莖虀祖師不是言枯淡君子從來嗜藿藜道路兩條行得到春山好聽杜鵑啼宣城詹曰至其生世之月日即其母氏去世之月日也寄箋須語以偈報之因生念死孝思長生死同時母在堂請以摩耶師母氏現身塵世作舟航鶴林詠古十三首宋武帝樵採青山枕擔眠鶴翎捧日下遙天鑿來一井何甘洌千載緇流飲此泉群鶴庇日帝微時事寺中有井名寄奴泉相傳帝所浚甚甘洌大旱不竭唐玄素禪師僧來何處把門敲祖意分明直下拋堪惜此僧門外立不知身入鳳凰巢師為牛頭之裔住鶴林僧來敲門師云莫道僧佛來亦不著李涉人生擾擾在塵寰方寸常年未得閒獨愛李公真實語琅玕千個靜空山寺在昔多談竹亦名竹林李詩因過竹院逢僧話又得浮生半日閒蓋本此宋壽涯禪師洪蒙未判絶町畦道器分來物本齊不識老僧山裏坐更將何旨授濂溪寺志周夫子學淵源于壽涯周濂溪先生聖學研幾百代宗高山仰止禮宜崇清池六月荷香滿時有風吹入梵宮祠在寺右按祠記先生依舅氏鄭龍園居瀾讀書寺側銀青元章米公風流文字出塵姿交契雲堂說法師願作伽藍護名勝山中松石至今奇鶴林志藏公聽法于石門聽禪師詐護寺卒後如其言蘇子瞻文忠公竹院曾遊一品題端明學士醉如泥長廊古碣知多少讀到公詩價不低公愛寺竹有詠又有醉後是刁景純詩宋高宗南渡匆匆馬不遲中原為問此何時卻拈古偈親揮灑七佛全身現七碑志稱帝南渡時駐驆於此書七佛偈勒石今存陸秀夫忠節公滄海茫茫正氣存鯨波萬里孰招魂高宗過後臨池在香剎因來共曉昏公祠初在金山見夢鶴林寺僧因還山門之左圓悟勤禪師筆語諄諄不幾行道情法訓藹然彰西湖長老人雖遠片石摩挲久愈光石刻云西湖然禪師都下相別能自奮忠竟繼佛性住持甚慈甚慈凡百日慎一日久之果熟自馨香也收書敘致殊殷勤值冗附此相勉領剎作粥飯心平直以身先之謙和人乃皈向要潔淨口行然後隨以己所得以開示於人過為矜衒便是守本分也圓悟禪師克勤示後有跋云懌氏所以久長者正以能作善言警悟不肖今覲圓悟禪師遺墨字字真實讀之森然加敬但患有不能終身行之者爾紹興癸丑穀雨日章騆仲駿書按佛性即佛果嗣録載其住德山大溈西湖禪師繼席不知於何地顧於佛果為晚出而示語首稱禪師末署以名古人風度可想見也書法遒與天童示隆公知藏石刻正頓此則録中不載不知鶴林何緣有此石戒佛果當年偶值遊此而作是書耶抑然禪師後或曾主此耶然皆不可考矣元中峰本禪師鶴林殿主能求法臨濟僧堂不學禪天目山高千萬丈重新寫出話頭看石刻昔王嘗侍訪臨濟至僧掌問曰此一堂僧在此作麼濟曰不看經不坐禪總教他成佛去此話流落叢林舊矣鶴林定殿主要向不看經不坐禪處長伸化喙極力扶持使臨濟家聲千古不墜過門露語因合掌告之曰願觀盛作西天目山幻住道者明本書按此條中未載明紫柏尊者大明國裏丈夫僧傑出叢林照夜燈是處道場俱振刷入門一棒焰騰騰師嘗過寺慨祖庭淪落必留連浹旬後囑五臺公恢復侵地陸五臺莊簡公祖庭秋晚阿誰扶想見當年陸大夫佛地賢祠還舊觀靈山付囑語非無見濂溪祠碑寄青蓮同參法華山畔相尋後屈指於今又九年聞道頭顱如我白何時再晤話生緣送道場山曉音知客五月芒鞋特地行榴花京口照人明道場山頂重回去好作金雞報曉聲謝事衰病難堪住鶴林紛紛雲水不勞尋飢餐渴飲無餘事只可閒眠聽竹禽贈顧聖復業醫賢哉君子用於世得其宜周孔詩書牖軒岐草木昆帝心無待簡民命亦堪醫懷保躋仁壽巖廊任不卑答王雲來文學憶昔昌黎謁大顛玄珠曾索入重淵開門何更煩敲瓦入社相將引種蓮刪定詩書夫子道直空文字祖師禪雲門扇子今安在臘月冰霜到腳邊答陳復庵乩仙三首大事因緣本自然半生轆轆苦參禪而今衰病身無用白日清宵只打眠嘉客翩翩向晚來飛飛小鳥啄生臺偶登山寺渾忘返竹下裁詩韻自猜世外蕭然喚作僧古今紅日自東升十洲三島俱為幻覷破何曾有寸繩過葑溪周雪巖道侶靜室傍廛精舍一燈明數版低墻隔世情橙橘兩分階下樹鐘魚互答佛前聲山高欲仰人皆譽男大無婚話已成伯屏倪公贈以甘龐貽范扁故及喜我杖藜頻過此南薰北牖晚涼生天童送蘭若上人出山滿覺菴中賢主人青山看我意何親話中記起杭州景一片西湖絶點塵寄聚周上人去秋曾訂過君菴冒雨江船遂向南八月潮頭千古在山中無事即來探示曹雲海百行從來孝是先事親事佛兩無偏雞鳴起到黃昏後體取無生出世纏讀新桂瞿公臨難諸作二首惟人有性性有德仁義禮智仁為長殺身成仁性德完萬古斯人在天壤二白刃臨頭可畏哉深情縷縷筆端開生平面目元無損長笑一聲歸去來示吳萃凡逐色隨聲念念非回頭猛省即真機子規樹上流鮮血無限春光喚客歸示吳永侯紅紅紫紫滿山坡青嶂無情面似酡一點真機親說破清明過後野花多寄秋亭三子一身學佛一身當男大須婚也不妨參得老龐公案熟秋亭湘水姓俱香子康長水塘邊放一舟溪山兩地各悠悠道情幸是俱無隔秋月春風話不休念碩百歲年華等逝波樹凋木落問如何分明體露金風裏一句佳音寄薜蘿薇垣臘雪二見一般時節兩番寒指示諸人仔細看大地沉來山睡穩虛空混去火爐寬羚羊掛角蹤難覓獵犬迷家眼被瞞乘興空樓書短偈硯池才蘸又冰乾送麗中大德一夏安居日杜門客來相訪少寒溫闍黎過我天還暑露地烹茶月滿村送駿機大德金井梧桐已報秋火雲猶自照山頭途中佛法最親切動步通身雨汗流送祗園老禪回閩緣幹好大哥福建子行腳區區老不止客秋參我入天童草鞋緊峭多歡喜燕語乍談人不解細聽方才知所以今年回嶺明年出往還途路誰遑恤身心拼供十方僧一任秋風冷蕭瑟上前行休放逸祖師公案腳頭提遇境逢緣無打失楊岐驢子腳曾三趙州牙齒元來一聲前句為君述仙霞嶺上月明時黯淡灘頭浪汩汩咄示慈帆上人憶在十年前天童一相見于今十年後重來呈舊面佛法本無言有言乃方便老婆心太慈與汝通一線人生如張帆所在隨之轉業風四面吹船在波心戰線索縱牢牽終亦有時倦須臾失照顧生死一時變同舟已胡越父子空眷戀何如奮勇猛大事期親薦回頭上岸來直入空王殿輕生日悠悠乾城眼方眩誰知四山逼等閒無貴賤業海既沉浮魚龍心不善金翅高回翔命盡中他咽此語報君知會時當喜忭碧峰禪人病中求示枯腸本無物詩偈何有新秪宜隨筆寫筆底見精神是句終疏韻非言卻動人碧峰能點首病骨不同塵和宋慈受深禪師登披雲臺十詠有序附原詠併跋宋慈受深禪師投老秀峰有登披雲臺十詠蓋懷藥山月下披雲嘯一聲而作其詩優游自在令人深味得古尊宿住山受用非息躁競大休歇者不能退身三步守雌牧卑若余者或所謂懷慈受如懷藥山者乎聊抒企慕非敢謂即古人也附原詠林底常懷老藥山皮膚脫盡萬機閒披雲月下時長嘯千古風流滿世間戲鐫崖石號披雲且欲朝昏見古人折腳鐺中聊自足世間憂喜不關身拄筇臺畔自騰騰野草閒花照眼明緑水青山皆舊物鳥啼猿嘯別無聲春暖崖花處處紅住山境界樂無窮勞生奔競何時已說與還如耳畔風當年吳越日相攻蟻國蝸爭不少容范蠡西施伎倆盡青山依舊白雲中兀坐雲根懶舉頭更無言句示禪流森羅萬象分明說有口何妨掛壁休老來差懶出人前秪欲隈崖傍水邊多謝洞庭峰頂月夜來向我十分圓禪門難覓好兒孫逐句尋言總失真山是山兮水是水莫將閒解鬥尖新透過無心種種休松間石上自悠悠田園不用爭疆界大地都來一指頭莫笈山僧語句粗真情何處著工夫世人用盡精神討緣木何曾覓得魚道無古今而人有古今人無古今而時有古今道苟同矣雖歷世千古如出乎其時如見乎其人不爾雖合堂共席邈乎千里遙也慈受深禪師住秀峰日登披雲臺懷老藥山見之十詠遂使澧陽遺韻照煥異代可謂無間然矣噫以古驗今以今視昔安知異時不有懷吾慈受如慈受之懷藥山者乎語云道不同不相為謀此特為有道者言之若夫下士聞知不大笑而不棄之者幾希矣丁巳仲秋下浣真慶叟孫觀跋宣和元年五月嗣法壽庵上石慈受當年老住山身心真箇到安閒藥山月下披雲嘯相憶清風在兩間山中何有但多雲去住無心近野人側笠看雲雲滿袖大千沙界一閒身世緣隨順任騰騰老去雙眸喜帶明看遍山花緘卻口谷風臺畔起松聲扶桑日出碧天紅歲月人間轉不窮世自奔忙我閒坐箇中消息付春風蠻觸安然苦見攻霸心何事少相容姑蘇臺下遊麋鹿今古興亡一歎中雲臥無端白了頭山藏水逝不停流有般演若迷何甚牛外尋牛走未休鳥銜花落碧岩前祖意分明在那邊舉向禪曹言不會話頭還待幾時圓老胡遺下衆兒孫血脈通來始算真吹滅紙燈開卻眼生機突出一番新豎拂拈槌直下休白雲紅日兩悠悠祖翁田地收來穩鼾睡重巖不轉頭禪門語句莫嫌粗透得方名是丈夫飛躍是人云是道到頭誰箇識鳶魚和宋虛堂愚禪師虎丘十詠附原詠劍池石壁千尋勢嶮巇下臨寒玉浸蟾輝古今多少憑欄者親見干將到底稀原詠絶頂香臺帶嶮巇轆轤聲裡劍光輝禪燈一照遊人醉來試干將政不稀和生公臺鱗皴瘦石籠寒蘚千古遺蹤意轉新縱使天花來墮席何如緘口過殘春生公說法身已去留得石臺公案新弔古何人重指點一杯特薦雨前春雨花臺昔人曾此談空有花雨繽紛繞座寒堪笑空生無伎倆不曾開口被人顢長松落落碧陰繁寂歷空山六月寒說到此臺花雨散古今多被石頭顢千人座蒼崖險處坦然平萬指曾來聽此經若謂生公消息遠一聲啼鳥共誰聽寥寥谷口暮雲平月上僧完未了經試問虛空終日講千人座有幾人聽點頭石大包才剖礙人問日炙風吹轉放頑見說聽經曾肯首更須來透鐵門關囫圇無縫白雲間佛性雖靈又至頑奇甚當機頭一點浮生穿鑿不相關憨憨泉憨泉一掬清無底暗與曹源正脈通陸羽若教知此味定應天下水無功甘泉鑿出山根破水性元來到處通若與曹溪無二味渴禪須記古人功試劍石雲骨深埋草莽中竟傳秦主試靈鋒舊痕尚帶春苔緑一罅能生偃草風頽然不墮劫灰中政也無端躍劍鋒千載客來看此石人間空有戰爭風吳王墓海湧通幽一徑深怪來時作老龍吟闔問覿面無回跡休向空山斷處尋墓門無覓意深深顧盻雄圖植杖吟誰謂闔閭生氣盡管絃日夜虎丘尋白蓮池靈沼天成非禹鑿玉華時向此中開遊人只愛池中底不覺香風天外來曾愛芙蕖泥裏種更嬿朱紫粲然開當年老宿渾如鶴池側看花大步來小吳軒結茅初不為孤峰秪愛登臨眼底空風淡雲收見天末始知吳在一毫中一點青青指別峰坐來身世曠然空此軒不特觀吳小領取空生大覺中
