body:
  text: 東吳毛晉子晉編閲鄂州記室智時較訂文己雜牘與唯一禪師與兄湖頭一別又見秋風落木矣聞于爾時天龍啓請開演唯識名稱普聞遠近崇信流出無量如來正于兄謦咳間耳中秋左右擬過法會一談契闊與鹽梅禪師舊歲覓一茅不就病日甚遂爾下蘇至今家舍猶在途中四月渡江值雨不便走晤聞道履安和三門雖清冷然正見住山家風彼圖熱鬧啾啾亂鳴者何耶答友壽木已成承惠心銘與山中友人西風作寒秋山變色病足不能遠陟領此深意霜葉紅于二月花不又蹉過耶聞有天童之行果否古者道生死事大若果則為君賀與婁江歐沖谷文學足下高年知有宗門事期于打徹此非夙薰般若者不能蓋尋常人多好作有為事説個明心見性了生脫死彼以為迂語皆望望然去之故須有根器者乃能直下信取古宿云但辦肯心必不相賺別來半載有所契入否乞寄示復崑山諸千如文學新正望後過無量始見足下書述令先尊眷念之意一旦千秋心為惻然然足下道骨聳秀將來成就世出世法克振家聲令先尊誰云亡乎又病衲投迹深雲與足下經歲疏闊春仲曳策過天池撫令先尊窣堵波恍然增我遐思還琴川省親聞足下邇來謝事讀書歡喜無量願足下千萬自重千萬勇往佛法世法驀忽一槌打就向塵勞中垂手佛頂上打眠非分外事也簡嘉善周君謨入春來雨雪連綿僦居村庵人迹斷絶衲被蒙頭烘爐打坐不異在孤峰頂上遙想故園老梅當不止一枝開也但此時曼殊不過無與對談居士亦未免嘴盧都耳一笑簡馮荃升文學入山而得足下為鄰玄度在咫尺矣愧山衲非放鶴之儔耳幸蒙過存道誼何如哉暫下峰頂言念伊人草此奉報簡吳伯明承盛暑枉顧一彈指頃天朗氣清山川又一面目矣松陵煙水邊偶有未了公案因而出山聞左右在城未遑待晤緬惟尊志遊方之外而能隨順世緣不即不離成己成物妙用有如此較之孤峰兀坐飽飯過日理亂不聞者真如散㯉耳復張靜垣來諭自期此生徹證乃休誠鐵石心志也但謂山僧掃盡葛藤只以本分接人殊不知作如是説正葛藤也且如何是無葛藤柬周西玄領翰知冬底不能接晤矣荒院內外人情頗安唯嘗忍飢説法聞之當一笑也有同參燭公者聚首天童老人會中非一日住靜陽文山復四五年一鉢千家殊自高潔邇因蝗災曳杖出山欲窮水村之致聞貴縣有荻秋精舍虛無主人其檀越為吳姓座下必知其詳故敢通其情于左右燭師特謁可否惟命之與吳君訥有情世間起倒如因時當秋風落木樹樹秋聲良覺悽楚至于春日群葩吐艷紅緑又滿前矣聞足下春遭回祿夏背嚴君亦適丁悽楚之時也唯百憂放開致命遂志佑啓後人他日振家聲回春象嚴君如在堂矣勉之哉居常幸無戚戚柬王言遠近得一雨平疇交遠風良苗亦懷新想見柴桑之曠懷齋中想亦欣然而心得也令親蒙賜柬為法虔矣必得門下是日偕行此訂復兄前者解維五內悽哽不可告人五七之期承院中大衆設供轉經然皆身後事也子欲養而親不在古人親嘗苦境乃能吐出嗚呼痛哉與宋五陵煉師力扶教門乃所當為事但從上真人語不引亦妙所以告足下但明其道不必計釋計儒者乃其間有深旨也念相見時所陳尚有沾滯處異時徹證當知直言為不欺耳柬周西玄今歲秋成何薄之甚耶前月為庵中結制不過應個時節外來師僧所留無幾幸而私志安分不十分以得失關心頽然一室殊自得也想欲知近況此白與丁方流文學重陽住波庵一接言論不惟文品清勝猶見慧心開朗此非夙具大信根不能爾也所願從是增進克究其實蓋西方聖人垂教深資之則可窮理盡性實踐之則能修己正身前賢揄揚之諒非虛語也惟嘗置于懷他日當自見矣與李曉令自道履之之白門也不得時接晤言獻歲歸宅又聞抱疾不可以風今者緑楊三月時桃花紅菜花黃竹院虛無人乃不聞跫然足音不令人深長思乎又接尊札知近況林下枯稿之士古稱無事人用世者豈同此耶日用應酬不暇正當人分內事也所惠陳穀踰六十年直當以奇物視之或宿痾合愈而得此也謝謝與吳門玄若師某七八年來萍梗無定不接道範念與時積緬憶曩于藝居中分題坐夜跳笑縱談猶夢中也令孫雨新了然遠遊其志可嘉戎雷兄奄忽棄我往歲聞訃念彼研幾教海十餘年之苦辛不覺涕下且聞死無窆所更可傷焉培兄熱腸敦于友誼亦聞得奇恙天道報施亦何爽耶復吳伯明憶卑棲銅井時承道力加被飽看湖光山色中心藏之未嘗忘也鄙刻實天地問一種野話然非有山林泉石之情自當撫掌而擲矣乃門下迹寄寰中心遊方外不惟不棄且欲樂聞之何耶復李曉令昨慢去為歉三公子秀發豐厚信皆從福慧中來也佳句深味所謂醉裏惺惺識得識不得是不必論但于此信入奚止青天片雲十方早為居士坐斷矣寄靈章友人病中山中安靜舊恙想輕減也病況僕曾深嘗醫藥秪半功善調養者其要在胸中無一事健則放歌于青山白雲倦則高眠聽良朋知友三三兩兩快談劇論自則粧聾作啞飢則飲食隨意不必拘泥早暮幽獨則復間坐坐間聽聽間看看野鳥或飛或鳴時上時下忽來忽去山花紅紅白白自開自落不言不語各成其致乃至村樵負擔牧豎牽牛野步野貌不規不矩野情野話嘈嘈雜雜吞吐無倫若平常以有心揀別則見其鄙俗若無心領略則彼此無交涉試以間心一接自覺多味不必要吟詠偶然觸感有在口頭則寫之不必要讀書忽乎興起則讀一兩葉而止此外如憨如癡如百不解底人不計生不計死如是則真忘病真忘病則有真忘病之樂現前久久則病去而神復矣神得復大有為在我矣此藥頭乃軒岐所未嘗道破秦越人信無從知也僕曾經驗敢此寫上與李曉令尊親之變極為慘矣然既于封疆殉難死猶生也為之後者在彰其志而已苫塊毋過自哀毀與唐琪園久不得晤念與日積尊從來知于佳園謝事修持及見報恩復書不覺驚歎法門之變一至此耶然願門下以此斷文字之緣亦以此堅立雪之操務明己躬長揖外擾暇則箕踞孤松婆娑片岫但見花開落不聞人是非佛國之樂當不外是也與道侶山野之性惟道聚最樂亦惟道話不倦憶雲在庵篝燈相對豈多得耶夫子以剛毅木訥近仁吾宗亦以勇往誠篤為尚聞初意欲過我後以事阻嗟嗟白駒易馳晤緣難必急先務也莫過生死一關間忙動靜不置度外可坐斯道進毋忽毋忽與王言遠甬東回至莊蒲堰值門下舟侍者言遲交臂而失之怏怏至今都中聞有警北征又于何日與孫集公住村三年不見煙壑自詣高齋乃知平地亦有山林特恨拄杖子不得餘間時時晏坐其間耳近者接仲虞手帖忽聞宅內丙丁作祟吉人天相何應有此或足下夙昔曾索牛車來釋迦老子冥復以此為警惟作是觀珍重攝養與李曉令夏末聞徒跣寧海迎尊先君之櫬上臺具題得恤可謂忠孝著于一門山林之情亦為踊躍松傘甚為佳物又非菌可易致復天童木陳和尚承憫念賤體幸邇來可杖行第出門尚有小苦銘塔一事舊冬欠商遂成少不更事然為人後者發揚先人光明不一而足念是或可恕也寄江陰乾明寺元白禪師某生平意在巖壑苦為村僧如籠中鳥忽忽不樂君山憑眺風雨俱來放言抒懷同心在座嘉會豈易得耶又想古寺清秋長廊直入法堂前草深一丈行坐自得一任門外漢窺覷豈非真古宿高風哉與社友人生而靜天之性也不平者其有激焉何以治之其恕矣乎何以言之人性同也有激則不平若彼彼相激彼彼不平小則成隙大則成怨怨而不息則父子之間君臣朋友之際一旦不顧未有不至相戕相害者隙而至于相戕相害何所底止乎故莫若靜之以復其初也語云君子之過也如日月之食焉過也人皆見之更也人皆仰之今公情關骨肉理宜不平豈為過乎但望一靜則吾所仰者竹院無事清晨頗涼幸即移玉與沈傳中文學端陽別來瞬息秋中矣遙憶天門山色恍焉在目第不得共居士納涼橫山頂上如何如何答李曉令適喫午飯佳蔬忽及齒牙俱甘矣册葉像卷已為塗抹但非當行聊塞來命耳復諸千如前自敝里過貴邑應酬煩而精神倦故不告而行矣意者秋以為期復過雲在談衷話舊旦暮相對也惠履甚輕便步時恆念足下不既答葉嶽心來字山僧西遊居士東棹此即好與三十棒何故只為山僧不曾動步試問居士腳跟又且如何答錢聖月接佳作讀之甚快菴主亦欣然寶之所付紙聊以應命婁東歸尚圖竹下一坐與許白生文學玉峰聊寓適當搖落懷想君子殊深白露蒹葭之思恨不能溯遊從之耳與虎丘道侶五月一宿高齋殊覺快意恨無暇不得上生公可中亭領略晨霞曙色耳與諸合甫雲在逗留不過半月虞山不過一日程臨行能同到空潭之曲坐坐乎故里道俗信有為者多倘得一二有道激揚此事虞山玉峰雖曰齊魯不一變並幾于道耶與葛瑞五入鄉聞冒風今愈否木樨已開過獨西山幾片石似不能忘情出月若及門諸子來當率其向孤峰一坐足下當為導師一笑與葉嶽心來時汗流浹背今寒風凄其將吹人過他山矣足下其念之乎與嚴髻珠清燈靜夜娓娓談心追味玄言喜而不寐昨歸途晤鶴師又承畫安衆久遠之方聚流成河積土成山令有餘不足皆得向緇田植種惠而不費旨哉斯舉聞戴仲老有塤箎之應打鼓弄琵琶還他一會家靈山法筵儼然未散欣慰何如與葛瑞五月夕出山興之所乘殊覺幽曠獨歸室中未免深長思耳群陰已極一陽將來未審君子天心能復照于寒谷乎復松雨師還山冗冗未及造謁更承枉顧感佩感佩歲云暮矣空谷寂寥私擬新正人事完局徑抵高齋想其時庭梅試花或不置我于清香之外柬空林大師太陽傾倒忽又隔兩年頭生平知益思雖長而晤焉寡晚節苦境良在茲也荒山開自齊梁而山光潭影實見于唐詠或能乘興汗漫其遊雖曰百里一帆可即已囑愚侍辦舟倘能不棄真所謂從天降下也示靈嶼上人覽書知有志宗乘非一日矣古人云若也形于紙墨何有吾宗一紙頌皆岐路邊事確實處一字不著不知又如何通信來寄沈傳中文學棲真僻在東南清絶高曠于中間吟散步殊稱病軀不謂出山後天時人事遂有阻隔舊歲與朱近修商訂今春必同渡錢塘渠甚有意移家剡上作桃源隱者因犯傷寒一冬在床席今始起也慈恩來山野即思俶裝聞道路難行又復擔閣弘文出門久欲先歸故附手疏復姚江沈求如居士大陽話別日月易流回想深山晤對不能驟得為恨興福為脫俗之地檀命難卻暫歸一應然未免復熏俗氣長天孤鶴棲真時在夢想承諭入山唯恐不深非深相為何有此肝膈之語日下尚未能灑然擬在春深夏初過法海一禮妙兄塔兼圖促膝石上商巨細法門飲清涼之泉耳復鄭子康飢思食倦思眠近來真境此外無事矣得粉團喜甚前過敘作得二偈附上與李曉令連日大雨想花神亦隱身去矣院中無聊惟隔墻望桑葉耳復王侶石適捧二圖章不忍去手私意不滿更有索焉想博雅君子不吝此大布施也復李曉令雨雹之後繼此霖雨房屋濕蒸四肢困倦唯啜茶打盹而已圖章領訖然此筆法又未見也柬鶴師憶別河干緑楊紅杏殊快心目歸村院惟見菜花滿田而溪桃零落已盡春光如駛病骨不強兀坐室中浩然長歎與葉嶽心世相虛幻病軀倦贏孤峰把茅諒時不可深村數椽得以間坐困眠老我餘生復何求耶但得屋邊有樹牖外有竹門前有水可居數人足矣若曰此非知識局面不知三百五百鬧叢叢地自有大叢林在何必求靜乎與高靜之居士去秋雲在會晤非一衛法之誼見于辭色豈直金湯是稱直以緇流為骨肉矣不忘不忘然崑多君子又得有道引之向上行履則闤闠阡陌皆佛國也病軀將來謝院事必求仁里以處與雪丆首座棲真之行移在秋者其時以興福事未結局故也今則旦暮可行但不知途路如何僧是離鄉草遠則有香我力辭破山者以此久住則不美也公當以此籌之廣衆中是非雖有忍辱鎧何在我不十分強公在公當原其大者前進可也與印象知客好山好水其誰不愛然美膳中有毒自當棄之矣所以衲子住處人為上境為下聞在雲在過夏相宜否古聖惜寸陰百工必居肆況我病矣倦矣將謝事矣天各一方散時多而聚時少能不動心乎簡吳稚仙居士二首孤峰寥廓縱目八荒宿痾得以灑然更得有道相鄰歡喜增一倍矣齋頭有暇把臂白雲之上固所願也又兩湖名勝乘興一泛更得高樓縱目伊蒲飽腹真快遊也圓劑領訖服後當報其利益與吳仲木接教知近況雖彼此相去然登山頭見澉城恍若見君子道同而情真蓋不期然而然矣菴中殊自適菴主蕭散亦正合疏野第因破山僧來聐聒兩日覺牙疼亦不妨耳與陸哉生文學日者捧鉢高齋春風逼人如遊武陵桃源蒼黃滿眼又若登孤峰峻壑別後不無想念村上化士還傳稱道駕欲近日過山囑童子掃徑以俟與陸子念居士溪菴逗留承喬梓枉顧既醉既飽兼示瑤章所獲多矣竊聞初度與樗散相若欲申繾綣謹製山偈一幅嘉賓宴集華堂之上錦屏繡幢間插入巴下之音乃希有事然亦君子之優容也一笑柬陸葆翁歲聿云暮空谷無聊獨梅蕊含香橫斜窗外差可人耳然新年頭應接甚煩意欲向僻處避數日燈節後望惠然石上一看新泉與靈嶼上人久不面甚念聞病不能步履此正加功時也惟人有病他念俱息惟念生死最緊十方諸佛皆因念老病死而成道所以病在參學人分上最有利益也我與汝同鄉人又是舊相識故不以客語相告與香際上人扁舟偷間泛乎海濱復因夏期相逼撥欋即去念未及與上座一晤拙語一册寄覽少見惓惓與吳稚仙鷹峰葛藤竟被令姪流布狼籍狼籍在海虞尋秋過一溪菴又有拙語謹奉尊覽雲水之蹤晤期不定神往神往與徐非一紅塵而修白業古所難也緇服而舍紅塵尤所難也非善根熟時節到其能耶有作易想者又相似出塵而實在塵也我不勸公即出塵但與出塵之心相應即身不出塵可也復陸叔範居士衰病之軀厭煩喜靜天童之任力已辭卻偶來幽僻心所眷眷但以路遙蔣徑梅花徒神遊而已與陸藎臣法緣結聚固自不偶然非不偶既出于偶豈能常偶耶古人如貓捕鼠孜孜于是者亦以日月易流師友難遘求師于心吾何有隱念之念之二六時中精神當興起十倍水窮山盡得一轉身不移寸步不妨入室矣結冬懶東話西語無可相寄偶來殊僻難定即往直付之偶來而已與陸平叔人生知命之外血氣中衰縱金丹大藥莫能滋益以非本元豈能長固若能長固世當無老病或貧賤不能致秦皇漢武定南面萬世矣彼莫能之則可知世相無常乃先佛誠諦不易之訓也從無常而生厭離得道者如毛戀無常而欲出世得道者如角豈特如角我未之見也唯座下久研法味深得道腴病衰之魔必以此勝之也與范遵甫日來求間反被間役聞暗伯過我兩度皆出外不值人生良會亦自難得然人生之役役無已多半為居處飲食而然使居處飲食不謀而遂人亦何苦役役所可笑者方外之人無父母兄弟家室子女而亦役役不休何為其然也老子云吾有大患為吾有身信斯言也雨中無聊偶懷書上答鄭子康懶齋而得新詠懶亦能感人而新詩又能起豫懶懶相感懶之趣味非懶人不知也大士緣起經歷名公多矣其再摹時適同尊翁生齡此因緣非偶尊翁其再來人乎近詩得暇當録寄也又兩日來心想只在佳園李子上真所謂醉李也得三十枚不覺喜躍餘草枚欲我分諸左右恐不足要將佳者補之殊覺吝吝耳又前李珍藏日食四顆今復得二十枚意外之遇也又大雨不損香色益見護持念我所念矣然貪心不息又待來年聞之當一笑也與隱峰侍者今春雨水連綿欲看菜花阻我佳興至五月初始移棹從新城盛澤北麻一轉總遊戲三昧而已即欲撥棹至汾湖以出門日久院中有事逼歸不得如願也中秋邊擬過池上看月其時不識可抽身來一相聚乎與廣潤木陳和尚夏雨彌月蒸濕異常吳江道信歸自台嶺稔知法體康勝勤衆七月流火涼風徐來千巖萬壑之中爽氣先集秋色既佳遐想几杖又必悠然得其樂矣散步溪上胤靈過門因風寄候深冀慈原與梅溪庵主溽暑遽返得無勞乎梅詩快讀塵埃脫盡如坐冰壺非詩不泄梅之神非梅不發詩之韻詩乎梅乎殆莫可分矣刻完必先寄我一册使得坐遊于孤山之下與王侶石文學客歲中秋小山看月乃極快事惡知自今思之為極哀事耶曉令往矣小山依然至中秋夜月必仍來欲得曉令為展紙磨墨看山野寫詩其可得耶曉令之死蓋不忍言矣足下為心知誨此諸孤覽其庭囿其情亦必有不勝言不忍言者矣茲來自京口不得見曉令又復不得晤足下此中鬱噎紙墨所不能泄也悼詩八首附致靈所倘足下見之為一讀與諸子俾諸子對其尊公而誦之曉令非蒙蒙者其必踊然而聽余之詩毅然而登道之岸矣唯足下善勗其郎君即所以慰曉令也寄曉令諸郎君尊公溘焉棄世人事何如此耶茲來舊院不得過宅一弔悼詩八首一讀尊公前以見久交之誼書一緘可致之王先生逝者不可追今日之事願諸公子勤讀好學不墜書聲即尊公于冥冥之中亦歡然放懷矣薄儀附致以代漬酒與商尊法侄一春冗冗直至四月望後還山寺中雖淡泊而緑樹環繞濃陰蔽天又多修竹日夕涼風不搖扇亦快爽也且淨房浴室賴知浴皆就燈火無缺安居亦稱自在矣吾侄聞之必有快于心也寄極樂庵懶石監院佛訓比丘出世先修慈心大士度生全憑願力上座能安老病度異類此與慈心相應也未得如是必欲如是此願力也慈心普願力堅何事不可為何為而不成乎柬庉村浮石和尚丹陽舟中匆匆言別殊歉于心捧讀尊録自在説去文旨清徹不落近時濃抹之態真足垂世不朽弟何敢舉筆於其間耶承命不敢套辭繁處略刪幾段至於第三册碎栴檀片片皆香似不必去取矣復錢聖月歲晚得札不勝憮然念曰何錢子頻年所遇如此乎古南寂寞不減秋亭即於此送臘迎春想錢子未能即咬莖虀未免推向門外此為別也而其同者幸錢子有一莖虀在腹中將來可漸入佳境懶叟作是實語錢子覽之當一噴飯和介老詩并登金山作俱已披誦感吉人之永逝念嘉會之不常祗令人添牛山之悲耳藏墨甚佳弗敢輕用俟有新詠發其光也柬周公貞昨暮燈下忽成莖虀詩足下目之當一笑耶然天機所至不期然而然乞并前書緘寄聖月新年完一詩債甚為自得醜妍不知也呵呵與范遵甫二首昨敘甚歡夜來方雨天之隨人如此耶明欲出門四五日歸時再同看梅野外或棹湧蓮一看近修劇談半日皆樂事也又今日有意大梅恐早間雨妒減其神矣公能念之步至河干小舟候談也不敢多拉人惡不靜故與朱近修溪東有老梅一往觀之雖不甚奇諸梅當遜之也與范子留連移時惜公不與覺興短耳京口尚未去亦厭去業風所吹又不得不去也在遲遲耳望邊若舟回須拼一日桃柳下坐與法平書記開書知吳下氣象種種可觀此林下人之福也庭梅盛開須及時看好但心欲來而事有阻念之不覺此中搖搖耳大約清明邊可出門想梅花雖謝桃杏必能待我也柬木陳和尚古人弘法罹難何代無之如石門棲賢覺範皆英偉奇傑之人自經世患而光明愈赫赫難掩苟不經憂患又誰見其英偉奇傑也哉武林帶水一葦非不能杭因癤毒彌月未瘳步履拘攣致失躬候也柬報恩浮石和尚賤體正在困頓岫徒促入西華買舟復止步履實不便也況華山為舊遊之地含法師亦舊同參契闊已久亦思一晤然必待精神稍充始能往返盤桓聞佳園樹木蔥菁有閣有亭可以登眺此弟所甚喜臨風懷想不覺神飛與玄若禪師二首憶別又踰年矣南北馳鶩渴鹿野馬自笑狂癡乃入春來忽患癤毒經今未瘳人情形貌已失故吾攬鏡捫頭深生愧悔緬想道體耆年珍攝宴坐室中吉祥止止動靜攸分天壤莫喻大圓鏡中必生憐憫扇頭佳詠何過譽耶塵坌填胸未能唱喁報命在京口時粥飯之暇有懷三十年前故友如同戒二公今不多得用是描寫生平一申想慕今已付梓吾兄必樂聞之謹持數册呈覽或社中舊交見之二公雖化去而神情儼然夙昔之盟固未寒也又暮年受用無事為福聞禁足自怡餘間悟寂方寸未寧者豈同日而語耶神往神往蒙論正觀銘志厥旨高深學既蕪陋語又顛連恐不副來命幸長公一記索隱鉤深古今咀嚼倚墻靠壁或無誚焉及乎舉筆目眩神倦首尾不倫非真非草皆以意造想二王之必無我法也舉似左右當一噴飯復周青士周子固窮別來無恙深慰深慰衰朽雖在青山古寺中無日高未起之福役役如在市井周子居市井而心常如在山林之間靜我知之矣周子亦自知否耶知之亦足以自樂矣富貴浮雲不必相較也答王薇垣雲山千里經年不得相聚念之念之然居僧居俗各有家計此難免者但纏縛中緊緩微有不同耳今欲出離不必太著忙又不可全丟下但好事只管做去便是出離之法齋得一僧是好事不可不齋念得一佛是好事不可不念靜坐得一炷香是好事不可不坐記取記取不可丟開好事徒自著忙徒自煩惱無益于修行也與錢聖月相隔兩月晴日甚少中秋月色又付之烏有山中亦覺無興致令親楊君已惠一圖章極文極雅然念因公所致摩挲而復馳想耳茲初八夜見月生喜不覺多坐一時遂冒寒嘔泄纍日正無排悶處忽又得所寄佳鐫一方如對公面置之案頭不忍去手與朱近修嚴寒聿至雪霰紛飛一年又復告終神衰病集未免悒悒其懷耳公之所履又何如耶椒盤柏酒寓以詩文情懷庶幾可遣然來日苦短興盡悲來諒亦大同于我也柬鶴師兄嚴髻老親製圖章楊曰老以海王百谷類不肖皆莫大之惠也至于廣慧聞公法誼惓惓而五六年曠隔疏慵成性當必諒我湖州靈上座久約登臨乃匆匆不上前春風梅花幾度遭渠冷笑仲行純甫在山中承甚相愛纘先憶在垂髫時晨夕歡笑今亦成老友皆意中所念拙録粗扇乞分致之與陸葆翁月日住四明天童山苾芻某頓首不佞處方外與宗族鄉黨闊絶久矣凡婚喪之禮匪特不行亦不與聞也茲有所啓者情之有不得已也情之不得已則非道之所在然亦義之所在也願我翁詳聽使成其義不佞少失學家貧年十三寄食于舅氏益所公家我翁所知也公時無子欲子不佞而不察內政之苛忌暑無苧寒無絮衆僕皆欣欣然溫飽而不佞飢不敢啼寒不敢聲驅叱使令求等於廝僕不能得而公如弗聞見蓋名曰甥舅不啻如路人也于是病憤反舍年十七從舅君平入泮往拜之外叔祖季吳公見而喜留于家亦我翁所知也在季吳公家踰月從之出入一日忽命不佞稱君平舅為兄舅姆為嫂叔祖母黃氏所教亦然無異辭不佞不知所謂而口難之歸白先慈先慈曰此外公愛汝欲汝為子矣汝從之亦好但他人或有言後不便不佞奉先慈語在回遑間卒難改口間聞二老人私語謂君平舅既讀書已何暇理家業此郎識字警敏無外習勝我兩姪他日一專舉業一主家門如兄弟相依可也所言兩姪者蓋季吳公之兄子少孤皆賴公撫育及長有不合咸去故云季吳公因晨夕數四命不佞稱君平舅曰兄姆曰嫂焉不佞終以為難既而君平舅言于二老人謂不佞資性敏可讀書二老人又喜曰既有資性待他讀書也罷公之兄子果嘖有煩言不佞乃守先慈囑二老人知不佞意乃默前語然不佞恆處君平舅書齋相對怡然未嘗一日不如兄弟相語相樂而二老人愛撫又未嘗一日不以骨肉等視不若撫二姪之疏也即君平舅姆亦未嘗一日不如小叔敬待無履製履無襪製襪故不佞雖不順二老人過愛之言實未嘗不受二老人暨君平舅過愛之實三年在其家安心肆志如父母家然外祖母愛撫尤篤將出呼從者既醉恐飢睡至于冬夏浣濯靡不親視親朋宴會靡或見遺匪德其飲食也推其意無時不愛我立于其前也逮三年之後君平舅赴館季吳公入鄉應接家庭指揮僮僕盡囑于不佞而外祖母見不佞在側則喜有事他出則望焉思焉雖曰愛甥幾同真子矣從是季吳公定婚割産欲速成之媒妁到門矣行聘有日矣不佞終守先慈囑以他日未安為念然亦出塵時至有負二老人之心非二老人有始而不克終也惟此厚德已銜三十年餘一回思憶恍然如昨今二老人骸骨異處其孫飄落能忘情哉趙氏親枝唯益所舅有子然尚幼俟其長恐二柩不能待每與家兄商之曰此或以幼弟出名聯絡至親從旁贊助又必得至親中一老尊長坐照不佞初難之因念不佞兩番寄食外家皆我翁所知是以奉聞且我翁與趙氏戚誼無間默自揣摩必欣然許未議為義舉也其賻葬之資已豫為計尚有至親諒能竟事其要者必得縣尊批示公安雖不法死者無知古人有澤及枯骨傳于後世此有仗我翁精思以開陳密用而措置也昔魏客謂信陵君曰公子有德于人願公子忘之人有德于公子願公子勿忘哀哉今季吳公暨外祖母四人皆之九原其德不佞必相忘也其在不佞忍相忘耶德至于不能相忘既處方外則亦已矣何必必以安其骨是念蓋不佞推季吳公當日欲嗣立不佞之心有子義于君平舅有弟義親緣可棄此義不能泯沒仰惟仁鑒俯就而成其志寧獨某方外一人踊躍實與趙氏百世感且不朽某不勝懇切惶悚之至復陸葆翁翁年高神旺福履綏之某隈身空山搖搖如侍座側舊秋趙氏四柩未安陳情獻議正以道途修阻未能踵叩承慷慨許主其事九泉蒙德蓋無窮也且嘉獎之言溢於長箋詞嚴義正益令人歎服
