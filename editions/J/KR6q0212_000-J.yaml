線天從葛瑞五書參飯訖遂登玉峰絕頂飯後見村南楓葉策杖微行因過葛氏園亭逸駒上人留晚餉口占四首詩部丙之四古南時之餘四鷹峰九盤領師子巖合掌石南湖北湖潮音閣出生幢望湖臺鳴玉澗鷹樓頂黃沙塢白雲菴珠花泉石帆山澉城泰駐山舟里堰丹井高陽峰下蓋山六月三日游澉湖遂登吳公祠飽稚仙伊滿復過悟空古寺和屠闇伯三作同晚眺也下雲岫菴詩部丙之五古南時之餘五梅溪梅溪八詠柬素園黃闇齋總憲送吳翠屏還金華山中同諸子游普明廢寺長水塘泛舟至梅溪溪上遇一生上人即事題畫題孝貞李氏傳養痾梅溪答呂幼安明經惠詩送胡濤公之雲間次六月大風缾中白蓮步韻喜雨二首立秋日作詠秋色七夕與諸子分賦二首題此君伯仲圖贈濤公麻杖八首卷之十二詩部丁之一棲真時之一登雪竇山尋雪竇顯禪師塔蹟題珠木林西阬從下雪至上雪遊隱潭新霽登妙高臺當午坐千丈嵐看瀑布有五彩色自百步街至千丈崖底散步至御書亭新秋自雪竇山赴棲真即事九首棲鳳沈傳中文學中秋日招游天門山橫山菴作時同雪丆監院鑑機慈恩德明慧光南臺瑞明懋卿諸道侶過天門山上橫山菴從橫山乘月晚歸題棲真碑誌寄懷法海寶慶白雲三大師四首初冬送雪丆監院同顧虛谷邑侯遊天台開爐日酬示范遵甫除夕懷及門諸子初春寄懷空林大師于大陽山過甑篦山菴清明日沈傳中文學以詩惠艾餈步韻答謝登伏獅巖立夏前三日倪伯屏司李招遊柏香巖龍潭之勝登舒濱吾印心閣有序詩部丁之二棲真時之二海濱春來山行見新桃二首鷂子磯閒坐觀採苔者二首折古柏枝如劍菜花隔山見梨花如雪二首聞金聲二首范子為余述古澗奔流之勝因與同往幽澗坐就鄰菴乞茶綠楊垂絲颺風看野燒望桃花阬樵採海隄有數牛晚歸二鴉搏一鷹十五首前題詩部丁之三棲真時之三長夏吟九十四首詩部丁之四棲真時之餘梧山剩句初過棲真感懷二首七月望前二日風雨暴作竹樹倒拔屋廬震動古殿不崩為幸八月上浣復大雨不止炊煙幾息有感而志二首送范子下帷吳氏宅四首曉起山閣見白波連山有懷范子二首寄范子二首范子過山因懷屠閣伯于剡城二首答空林大師自大陽菴貽偈答沈傳中文學見寄宿明恩寺初夏古南僧來迎沈傳中文學以詩贈行有答別范子卷之十三詩部戊之一興福時開法破山酬徐白雨見贈二首酬毛子晉見贈缾梅初春示憨崖上人臥疾吟有序八首重過藿園看海棠謝倪伯屏見過藿園牡丹盛開漫紀二首從王侶石乞圖章重過秋亭病起有懷坐西軒作二首早秋還虞山舟過松陵宿承天寺留別蘇州無量寺懷舊三首雨泊虎丘小武當二首偶過溪菴即事吳門曉發舟次華蕩悼崑山高靜之文學過勺菴偶憶西莊舊遊晤陸平叔贈張季鴻憩陸哉生西閣望雨贈李小隱過陸子念書齋即事又贈書法華答子念憩陸顯文書室眾香菴值雨晚泛過慈雲菴偕殷元長李小隱泛月二首問戈莊樂居士疾不遇慨然有思瞿愿中過晤勺菴同舟至眾香菴別西舍歸舟有懷毛子晉勺菴訪舊陸子念重以篇什見貽還山報之兼寄平叔諸同道七首酬李明遠文學五秩見贈壽貝葉齋培風師偶作勺菴度歲書懷二首除歲寓勺菴同無關上人泛舟南湖和除夕己丑元日新正二日陸氏昆仲招集平叔園亭四首題畫贈報國寺萃閒老師仲春放舟過謁毛子晉信宿寶月堂兼晤顧麟士殷介平馬退山時補刻大藏將竣賦言為贈水月菴詢隱峰疾謝古南眾護法過蔣蕙仙孝廉菴海印菴午睡有夢忽來戒香居即事海塘吟毘盧菴明幻開士五秩贈仲寅初贈金陵彭師水水鏡菴小憩顧敬修居士見過山中紀舊示顧君闇煙知墩準提菴勝法寺從勝法寺過黃莊菴黃莊菴同道侶夜話瞿愿中過訪華一岳為余寫炤賦謝二首詩部戊之二興化時初過昭陽答孤峰上人酬李平菴文學酬李艾山文學奉和賀疏林邑侯見貽奉酬吳鹿翁相公平菴以石刻七佛偈見貽乃黃山谷筆鑴廬山巖石者賦此為謝和夜坐二首西軒即事二首和大山知藏誕辰二首除夕和平菴作二首辛卯二日同朱天乳諸君子散步池上晚雪有懷平菴人曰寫懷四首徐同甫為余篆古圖章賦贈酬楊廉甫進士立春後甲子日偕平菴登土山寄祥光上人謝朱天乳惠藥將還江南別鑒師書扇與蕭道人謝潘道人造法衣別黎太沖長者極樂解制寄謝吳鹿翁相公於潭西四首留別平菴別吳北海昆仲舟發昭陽寓廣陵靜慧園送天鼓法姪之江西雪後登平山堂丹陽道中閒來居二首舟次崑山西城晚眺寄葛瑞五悼李子曉令有序八首同葛瑞五諸子登東山詩部戊之三鶴林時初夏寄日章舊友杜鵑樓小坐解夏送自明知浴歸昭陽曉步喜李平菴渡江貽詩步韻奉迓二首平菴到山同平菴觀寺中古碑贈瓜洲默如懿範二上人二首小窗雨後登杜鵑樓謝張元囪問疾漫興睡起九日三首舟行口占坐興濟菴東窗贈周東谿老翁綸如禪子畫菜供余喜而賦之贈夏秀巖老翁西華禮塔詩有序二首秀峰山曉起辛卯除夕歸自京口神情既衰僕僕有感壬辰元旦悼素園黃闇齋參政過祖燈菴用舊韻過閒閒居甘窯寫懷獨坐仲春隨喜本覺寺讀坡公三過堂詩步韻奉酬遯翁先生見寄有序二首永哀詩有序二首壽屠闇伯文學母王孺人初度二首寄郭千仞寄郭清安病中遣懷出門久疾初愈過硤石山白水菴五首遊悔圓和陳復菴乩仙題放菴俞言如招同范中昭文學坐潔古參納涼紀事又題麻杖四首輓嘉善錢塞菴相公四首小窗多閒為商尊首座題菜秋日偶成山居曉作卷之十四詩部己之一天童時七月十九姚廣若以畫扇洋布賀余生辰賦此答謝贈魯魯山竹史贈項孔彰畫松劉開旭鑴余草書梅溪石上其法甚精口占贈之壬辰春余病甚卜一枝投隱而卦辭甚迂及秋天童使三至曰命矣夫偶記短章示公貞周子將之天童寄鍾雪緣寄徐忠可寄別朱子近修酬范子遵甫別秋亭鄭于子康兼諸道侶初主天童送法幢幟姪還雪竇小春望夜宿南山塔院二首山泉龍潭松寮和雪竇和尚韻贈法幢老姪生辰初春喜錢聖月入山夜話送景星巖湛菴法姪蘇州貝葉齋培風師寄箋索題道影登招寶山過半山菴登定海城樓總持寺海雲菴永福菴阿育王寺草堂懷雪竇和尚登玲瓏巖八首謝徐心韋侍御見訪送無等友人山居寒食二首獨步答范子贈聞季次乞戒寄懷龍池和尚初夏漫作八首寄隱湖毛子晉懷顧敬修懷芸居玄若禪師答泯巖空林大師秋興五首晚步口占三首寄近修朱子寄屠闍伯遣病悼范子遵甫四首感舊二首病歟四首興福鶴師兄五秩寄言寫懷知命偈贈鄭子子康壽泯巖空林大師簡錢福先民部贈田文蔚再雪示君蘭道友甲午修褉徐心韋御史六秩以園亭奉普門大士延僧焚掃居然寶王剎也賦祝贈定海張前川總臺韋聲玉刺史見訪奉贈王念尼道臺二首贈劉大宗邑侯畫葡萄行登白雲山訊鹿門大師大梅山無雨三首雪竇和尚貽雁蕩山圖展玩偶書贈雪竇山下余子太止山戒徒來自海虞有懷孫延侯老友贈破浪上人過東谷菴即事四首贈魏太生行鍼法郁素修惠圖章趙氏三喪得舉謝陸葆初道丈寄殷佩所賦得疏雨滴梧桐五首詩部己之二天童時之餘題甬東錢聖月歸來閣有序五首乙未春日有僧自桐城來聞元白和尚領眾清泉寺蓋別十三年矣賦懷寄之舟過松陵吳端公文學來謁自道生平所存展箋索語仲夏寄懷沈爾任文學過觀瀾菴二首寄周貞可二首秋日奉酬李平菴見寄嬾齋別集目錄終
