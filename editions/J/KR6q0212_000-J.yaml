body:
  text: 敘牧師出世以來住古南最先予咫尺里居從遊服教閱十餘年不才駑廢愧于本事少有請益師知予夙習所存每示作詩文相勸誘也逮後予自粵嶺東西鴻魚闊好師每吳門上下金玉嗣音繼予賚捧長安量移岷蜀往返京口尋師鶴林未期之間遂得三過一日霽雨秋涼登高杜鵑樓次供茗之暇繙帙巋然維師語錄而外別集種種具焉考夫單提拈頌從上相沿觸緒篇章諸方不乏維理絕于名言既殊本末苟情存乎藻繢奚當妍媸然而淺深之致見矣大小之數分矣世有讀斯集者以師為宗工將永明之錄覺範之傳寒山石屋之詩軌轍相方以師為文士亦陶王白蘇之間位置攸在予嘗聞世俗文章家有私議之者矣曰吾于牧師姑未言其他就其才多著述如此即不挾策應舉第閉門著書當澤永留名山也此則雖不知者之詬詈亦足以概見云欈李王庭言遠敬題序詩文之在天地爛然如芳樹之花也無此則天地寂寂矣然花不擇地而妍或在華堂或在名囿或在深山幽谷花於華堂者富貴人之詩文也花於名囿者才士之詩文也花於深山幽谷者高禪古德之詩文也如謂高禪古德不必以詩文見長將使華恒嵩岱諸名勝但有古榦蒼枝無夭喬嫣嫵之植也有是理哉余少時見蓮池憨山二公著作每為心折手之勿釋二公皆文優于詩近從牧老人遊留連子墨更為高禪古德之僅有間一唱酬往復不覺其膝之至於地也夫蓮池憨山法門導師擅長雅藻曷怪若老人則臨濟宗風以白棒喝天下之英靈語言已多安用文字然形上形下恃源而往有觸必應含毫伸紙忽詩忽文若山之出雲水之遭風層起疊生俱以自然入妙未嘗有意為詩文而詩文之至者出焉其近體王孟也古詩陶韋也無韻之文洋洋灑灑又白太傅蘇端明亞也雖汲汲揣摩日從事于詩與文之耑家未能或過嗚呼豈偶然哉端木氏曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也張無垢論語頌則謂天道文章未始有分然則讀老人別集非讀老人別集也能聞其所可聞而其所不可聞者亦思過半矣欠庵居士朱一是法名恒晦拜撰嬾齋別集總目文部七卷卷之一論序記銘卷之二說題跋雜著疏榜卷之三傳誌銘祭文卷之四書啟上卷之五書啟下卷之六雜牘卷之七頌像讚偈部一卷卷之八偈詩部六卷卷之九銅井時古南時上卷之十古南時下卷之十一古南時之餘秋行鷹峰折蘆梅溪雲在卷之十二棲真時之一棲真時之二海濱答詠棲真時之三長夏吟棲真時之餘卷之十三興福時興化時鶴林時卷之十四天童時天童時之餘嬾齋別集總目終嬾齋別集目錄卷之一文部甲論觀苦入道論序達澄昭公語偈序元白可公出山詩序鹽梅鼎公遊南嶽序木陳忞公回粵省親序魚喁艸序別刻古庭和尚拈頌序聽雲集序柴菴先生和池上來詩序宗鏡節錄序呂幼安詩草序永安聞慧堂世系序殼音草序竹杖序贈郁素修序鄭士敬先生六秩序以廬山摩崖石刻涪翁所書七佛偈為山翁和尚壽序贈丁虞卿序記雲浦上人書華嚴楞嚴二經記乾元菴圖冊記銘正觀堂銘震溪堂銘木樹根銘卷之二文部乙說衣說警學詩說墮蜘說桲立字說玄佩字說鄰仲字說古求字說題跋重刻洞聞和尚語錄跋跋吳門杜子紆先生所書華嚴經第四十卷跋一水上人書楞嚴經第五卷跋顧敬修居士書法華楞嚴二經書盂蘭盆經後跋王兆吉居士書華嚴經題蔣伯昌書華嚴經題雨新上人書法華經題惺中上人書華嚴經跋雲浦上人書華嚴楞嚴二經跋顧貞吉居士書法華經題朱明徵畫羅漢冊跋天童雲門永覺佛日四尊宿墨蹟項孔彰居士求書神通變化四字跋書王景雍孝惠先生卷題張子聖源倚石揮麈圖冊書芸居機公悼孫詩後書爭坐位帖書狄梁公碑刻後題蘭卷書陸包山畫冊嬾齋印跋觀松雪硯記圖書古硯雜著雨窗閒話四則寫寄顧敬脩壽生菴曉起得語三則畫示睿能禪子疏湛明禪人之江右持缽疏月印上人投老叢林疏四維寬公把茅疏供天台阿羅漢及諸名山疏天台文殊寺化供疏虞山興福禪寺復殿東舊產疏題修大藏經卷海虞建廣善禪院疏普見法門念佛疏虞山拂水菴建地藏菩薩殿疏嘉興真如寺禪堂重建韋馱殿疏興化普潤菴募藏經疏天童鏡池老宿募修祖塔冊榜興福禪寺結冬榜卷之三文部丙傳廣陵同人禪師傳靈巖戒雷法師傳生緣傳曹雲海傳誌銘達澄禪師道行塔銘祭文弔蘇州寶光寺筠亭石林隱蓮三長老文告靈溪師文祭考澄宇公文二首祭妣文祭祖文祭兄伯澄公文二首告祖文卷之四文部丁書啟上復梅里王言遠孝廉答嘉善周君謨孝廉一字西玄答眾社長答許白生文學答周貞可文學寄太倉孫念莪封翁寄李曉令于白門示岫雲西堂與中輝上座寄山陰祁驥超居士與周西玄二首與唐琪圜寄石幢禪師與黃介子二首復夾山林皋和尚與元白大師復黃介老答吳伯明與周貞可二首寄天童木陳和尚寄通玄林野和尚答慈谿白龍寺冰懷法孫與雪丆監院與完白維那與屠闇伯居士與倪伯屏司李與朱近修孝廉一字養明與黃介子居士與倪伯屏與屠范二道長與廣文楊公謝黃闇齋參政與倪伯屏與屠闇伯文學與吳伯明居士復虞山諸護法又啟復錢牧翁宗伯復孫光甫方伯復嚴子張兵部復錢嗣懿封翁錢嗣希進士復翁子安孝廉復孫孝若孝廉復錢西翰孝廉復陸禹舟陸定爾兩護法啟復毛子晉檀越復錢孺飴孝廉復破山西林隱谷禪丈復羅夢章道臺復陳平若御史復鄔簡在孝廉復胡宅眾文學東顧敬修居士復孫孝若孝廉二首復孫非臺居士二首復虞山諸護法復孫非臺與孫孝若謝錢牧翁宗伯簡王兆吉護法辭孫非臺護法簡能仁木陳和尚復宛陵詹曰至居士復棲真林野和尚復廣潤木陳和尚復興化護法寄雪竇石奇和尚與黎太沖長者復吳鹿翁相公附表書復孫光甫復孫非臺寄王言遠簡金壇蔣楚珍護法簡蔣虎臣太史簡興化吳鹿友相公寄李平菴文學寄詹曰至與諸千如待詔一字合甫寄吳伯明與王雲來居士復詹曰至謝嘉善錢塞菴相公復黃坡蔡遯翁復柯敬明與倪伯屏與諸合甫與葛瑞五與葉嶽心與陸平叔居士卷之五文部戊書啟下復京口鶴林諸護法啟復雪竇石奇和尚二首復溫州法幢大士法姪寄朱近修與范遵甫與周公貞復道峰木陳和尚簡姚益城中丞與五磊穎石法姪與超果破顏法姪與徐心韋侍御與江寧劉覺岸居士與詹曰至寄祁驥超居士寄倪伯屏司理寄報恩浮石和尚復黎太沖長者復吳北海文學復屠闇伯復鄭子康復范子遵甫簡孫孝若護法寄嚴髫珠居士答陸葆翁復芸居玄若老友復顧敬修居士復泯巖空林大師答鍾雪緣文學答呂幼安文學簡王念尼道臺答蓮花峰了源法姪與孫非臺東陸哉生復耿玉齊護法簡王念尼答玉峰玄佩二法孫簡韋海梁刺史簡耿玉齊道臺與李明遠文學與朱養明簡屠闇伯復李端維李武曾昆仲寄松陵包孝廉與錢福先民部與朱近修復南澗曉菴法姪復理融禪人東韋聲玉刺史一半海渠東耿玉齊道臺復五磊穎姪復王言遠復朱近修復柯敬明居士東楊九春府尊復白雲鹿門大師東馬培元護法東雪竇和尚復與麼時書記二首示石隱珍徒示西華瑋首座示睿能上人示印象知客示法平書記與詹曰至與徐心韋侍御留簡報恩浮石和尚與倪伯屏司理復金子乾居士與錢聖月居士復周貞可復翠微漢萍大師與達本長老卷之六文部己雜牘與唯一禪師與鹽梅禪師答友與山中友人與婁江毆沖谷文學復崑山諸千如文學二首簡嘉善周君謨簡馮荃升文學簡吳伯明復張靜垣簡周西玄與吳君訥簡王言遠復兄與宋五陵鍊師簡周西玄與丁方流文學與李曉令二首與吳門玄若師復吳伯明復李曉令寄靈章友人病中與李曉令與唐琪圜與道侶與王言遠與孫集公與李曉令復天童木陳和尚寄江陰軋明寺元白禪師與社友與沈傳中文學答李曉令復諸千如答葉嶽心答錢聖月與許白生文學與虎丘道侶與諸合甫與葛瑞五與葉嶽心與嚴髫珠與葛瑞五復松雨師簡空林大師示靈嶼上人寄沈傳中文學復姚江沈求如居士復鄭子康與李曉令復王侶石復李曉令簡鶴師與葉嶽心與高靜之居士與雪丆首座與印象知客簡吳稚先居士二首與吳仲木與陸哉生文學與陸子念居士簡陸葆翁與靈嶼上人與香際上人與吳稚仙與徐非一復陸叔範居士與陸藎臣與陸平叔與范遵甫答鄭子康三首與隱峰侍者與廣潤木陳和尚與梅谿菴主與王侶石文學寄曉令諸郎君與商尊法姪寄極樂菴嬾石監院簡庉村浮石和尚復錢聖月簡周公貞與范遵甫二首與朱近修與法平書記簡木陳和尚簡報恩浮石和尚與玄若禪師二首復周青士復王薇垣與錢聖月與朱近修東鶴師兄與陸葆翁二首卷之七文部庚頌雪竇石奇和尚書華嚴經頌四大家書華嚴經頌有序十一首普陀山舍利頌有序千手眼大悲菩薩頌雪彌勒頌十二首和南宋天封佛慈禪師蜜蜂頌有序二十首附原頌及全明進禪師和并序像讚附雜題書一佛兩菩薩像藥師佛乘白牛像觀音像二首繡觀音大悲菩薩像魚籃大士像大士象王圖羅漢像十八大阿羅漢卷十六阿羅漢卷初祖達磨二首天童老和尚二首石車和尚三首石奇和尚林野和尚三首自題頂相三首三教圖純陽大仙像勝師伯像仲師伯像素純法師像芸居玄若機公像雲岫菴隱山老宿像傳輝大德像瑤山老師像慧明上座像潛菴老師像雲在菴道嵩師像從聞友人像智林寺屺瞻開士像雨菴大德像巢修上人像慈航老師像石佛菴畫空老師像明奇靜主像長庚鏡池老宿像濟寰老師像石浪老禪像李曉令持綸圖二首孫冶堂行腳圖丁長卿文學像丁漢卿居士像李道人侍母行樂徐玉井道人像戎明宇長者像丁華宇道人像陳衡山居士像二首徐玉宇道人像浩然居士像殷元長事佛圖徐定宇歸來圖伍虞顛道人像朱待予像吳節侯文學像曹母周孺人像汪子瑜居士像江君圖項孔彰居士像二首王南伯文學再生像丁籲卿文學像丁方荀像王子佑松下憩圖王順塘善友像項素仙像題畫牡丹圖畫菜七首畫葡萄十一首卷之八偈部戊寅初住銅井山勝露居士伯明吳先生以四偈貽岫子有林下風味援筆次韻山中吟十首正月十日大雪歲暮至上元夜紀述十首庚辰冬開法古南入春偶成八首穀日唐琪圜居士以登天目八詩手書緘寄步韻卻答示楚萍二首示慈舟二首谿院言懷七首獨坐癸未八月朔日禮洞聞和尚塔有感六首蒲菴二首贈慎獨師有序武塘周西玄居士有喪明之戚寄慰新正四日答李曉令醉後句附原偈春日走筆六首天童山久雨有持扇乞偈者偕高原石幢同人三公夜出石筍峰宿天竺三生石李明遠居士乞悼兒詩四首重晤雲義先生題秋亭丁承清齋夜談二首示玄谷二首新正十八日壽虎丘本如老師病起三首乙酉春大雪破石一念二禪人聚彌勒佛像於中庭納子競觀悚然增敬以幻修幻無是過也戲拈四偈鰲魚燈三首走馬燈三首火爆竹扇乙酉孟夏天童南山禮先師塔有感四首梧山十七詠十八首天童木和尚送被簡謝二首和南源大師山居二首早春寄訊錢塞菴相國二首寄謝虞軋颺給諫酬空林大師見寄七夕鄭子康初來參偈贈贈陸子念病中謝客雪彌勒二首答李曉令贈形家李同春寄題錢聖月𠁼丆禾中重建真如寶塔峽石山慧力寺修鐘樓子康鄭子清修梵行攝入法系命之曰恬作二偈貽之贈范夢覺示陳宣其文學示陸咫顏文學示王臨玉文學題崑山戈玄淨先生略傳後示丁方流示吳彥正贈丁和卿文學贈丁長卿文學偶成達