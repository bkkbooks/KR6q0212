body:
  text: 東吳毛晉子晉編閱鄂州記室智時較訂詩乙古南時下送王言遠北上嚴霜昨夜結寒梅車馬兼程北望催聖主勵精求治策賢良捧牘奮雄才觚稜雲氣天邊識彩筆花光輦下開林社不忘弘護願閒隈竹院聽春雷除夕次澄禪人春交十日蚤聞雷驚得千林煖色回短燭紅光今夕滿深山黃獨古人煨床頭不睡翻新曆牆角頻過候老梅正好圍爐多坐坐村雞咿喔數聲來語風雪大師送天童老人入塔訖裁詩別眾感而次韻已作閒雲野鶴身到來山水即為鄰衲衣垂處風超格毛穎流來句斬新天地喜寬容此老影堂慘淡弔何人苦心一段難分剖直欲牽裳過百春舟過慈谿齋姚益城中丞宅因和山居之什遠情一味愛山林無問長坡與短岑但有松聲頻側耳偶聞鳥語喜開心花懸近圃春堪摘月起平湖夜不陰只此留連吾願足何妨歲月自深深偕石幢高原同人三公過靈隱憩冷泉亭今古只如此冷泉原不飛怪我亭中人坐來忽忘歸韜光曉步韜光法師荅白香山招詩有不解栽松陪玉勤唯能引水棹金蓮之句杳杳霜竹林日高露猶響有懷種蓮人登樓看湖漲立夏前李曉令招遊藿園名圜曉過麥風寒古岸維舟野興寬最好春光餘一日不凋竹色喜千竿試嘗新豆呼童擘莫辨幽芳拭眼看人坐中亭疑在野晤歌於此可相安漫書陸體莊扇字拙不嫌扇舊偈新莫哂韻差共坐芳茵過午試聽幽鳥啼花蚤熱住村已三春最熱愁過夏輸卻白雲深搘藤高臥者寄答唯一師春山花似錦伐木友曾求未得趨重晤無端又一秋竹窗閒聽鳥溪水浪垂鉤感念同風意凝眸古塔頭尋元白師於江陰乾明寺夜話秋陽皜皜映秋林迢遍江城訪舊臨天各一方懷有日交餘十載可無吟長廊未飯先攜手短燭生花更論心何事師僧難得搆法堂一丈草深深過丁氏湖莊冬日閒無事輕舟過水鄉一帆收野色兩目接湖光坐處篝燈炯齋時缽飯香莫言蓮社遠心已話羲皇贈丁虞卿文學清時率土太和風嘉遯優遊畎畝中尊酒當軒懷揖讓一經教子識夔龍渭川獵夢鷹揚起莘野躬耕幣聘通何似家門鍾孝友四時湖上看飛蓬再晤丁方流忽作三年別重來一笑逢青雲君子志此道卻同風歲暮荅蔣聞大孝廉見懷天際雲陰薄暮重歲殘溪院倚枯笻靜思學士四千偈恍在匡廬五老峰應節是村喧爆竹耐寒何水剩芙蓉從來莘野斯民望夫子誰言是老農病中素閒友人見過恍惚匡床臥不知年又更畏人來問訊聽鳥自嚶鳴窗外雲光暖籬根艸意萌相過喜吾子竟夕話無生答倪閬民交臂秋風亦偶然不堪言別又經年芳菲春意來眉睫松柏寒心在語前湛水光生因著月淤泥香滿為栽蓮從來此道思遐契渺渺煙波一放船七里港二首太湖西望水漫空七里人家一港通茅屋土垣村自古菜黃麥緣歲知豐門橫小艇花無掃岸接垂楊霧半籠犬吠雞鳴城市遠桃源疑此泛何窮二石橋自北板橋南層網相連次古菴地曠始疑春色遠村幽翻覺野情酣龐眉荷鍤窺人立稚子群呼見客慚短屋把書誰氏隱日高猶自不冠簪臥疾移舟虎丘山意本清寂怪來絲竹繁泊舟自遠岸欹枕欲無言斜日松陰隔春風塔影存石場人正鬧歸去月留痕寄友多年欲看釜山潮未得閒情把一橈輸與結廬脩靜者梵音時接海天遙題畫溪水悠然靜不流遠峰黯淡隔山頭放情何必滄洲去且傍垂楊坐小舟從聞統公自拂水巖移關東塔寺過贈憶在孤峰上一扉縈薜蘿無言關世諦有行學頭陀錫舉心何住山忘道已多風鈴傳塔語清夜好音過春暮歸舟四首野性厭人事放舟欣得閒岸長非欲盡客久定思還麥隴雲方綠花田錦正斑未甘輕別去眼內獨青山二阻津野眺吾聊適春遊眾所同分明識津口不得過湖東香艸微茫外晴波想念中後來期未卜且莫轉飛蓬三日夕漸覺春裳冷俄看山日低孤舟頻計路遠樹欲生迷兀坐無餘想幽吟自索題數聲村犬吠燈火到前溪四坐月四望煙無際空明忽自來蓬窗渾不夜膏燭謾登臺水靜村歌接更闌漁網開勞生何定息日月重相催寄吳門素純法師百城宛轉事悽悽憶過高齋歲若迷幾對寒燈陪宿鳥高眠紅日聽鄰雞郊原已慣成來往草木猶欣互品題良會至今忘未得卻憐蹤跡滯深溪歸燕識故巢十首乘興清秋去雙雙今又來逕飛梁屋語不使主人猜花砌看無跡柴扉為半開新泥增舊壘慎莫污香臺二溪路柳陰陰衡門何處尋每來寒食後應悵落花深天地空雙翼春秋苦片心恩勤哺諸子寧計歲華侵三大似知時節天涯念舊樓昔嘗親擇木今再試啣泥花落青天遠溪長碧艸齊往來憑兩眼芳樹未應迷四毛羽端如舊春風已隔年入門猶認主解語一何賢喜色生簾幙芳心在几筵遶梁情不已下上復翩翩五直作還家想逢人仔細看惜春猶得及行路不為難宴處還仍舊規模就苟完輕風時刷羽臺榭綠陰繁六風雨終無慮春泥欲再添頡頏村寂寂來去尾纖纖快自成家室將無辨閭閻閒門清畫永冷看逗疏簾七宛轉尋花片差池帶柳煙衣班緇社裏家記畫堂前胡語何人解靈心自不傳歷然賓主意相見入門先八有類雀穿屋非同鳩借巢短簷清影集長日好音交補葺寧辭倦綢繆未忍拋華堂同逆旅小隱不須嘲九紫項相為偶白衣無作儔海山春半度家業歲前謀避戊應多吉添丁不著憂茅堂寬得蔭霜露謾驚秋十梁上日飛飛溪林若有依不同三嗅作已見兩年歸堂搆存諸子行藏隨化機喃喃香在口階砌拾芳菲懷西湖西湖春絕好不得及時探遙憶雷峰塔長年醉碧嵐立夏前一日同道侶登硤石兩山值雨三首畫舫隨溪發青青兩岸過也知春意盡卻愛水花多卷幔頻看塔揚帆不定波茲遊真勝事酌茗是松蘿二東山纔到岸雨色已濛濛白社久相得青雲興亦同攀躋凌佛頂咳唾落天風歸路何須問濃陰古木中三山石兩相望溪雲隔一灣不辭泥滑滑細聽鳥關關殿古客心喜林深僧夢閒梓花香遍地幽夢覺春還丙戌夏自甬東還古南舊院錢聖月來訪出乃尊豈塵公閱唯識論遺筆見示兼贈二詩即韻答之二首兵革聞頻過林廬喜未殊得安長水釣遠歎鹿峰屠雷雨忽俱息竹陰宜共趺先賢遺筆在知久味醍醐二乘槎非八月扶杖試歸歟海上新聞虎溪邊舊市魚泊舟村亂後掃逕客來初相見驚如昨鬚眉意氣餘題嘉善祖燈菴二首真光能不息流燄自靈山入夜漁蓑近經秋樹葉斑玄言溪舌演聽眾石頭環閒卻菴中主孤雲共往還二舊有茅菴在松聲來自山種蘆秋點雪養竹老成斑村月催燈起溪雲作髻環東流煙水接風送綠萍還中秋後一日過小菴精舍孤村立閒林野客尋會心千箇竹清耳一聲禽秋日不知迥涼風自覺深桂香猶在樹遲月坐芳陰戒香居室淨不容掃林深獨占幽蒼陰時瀉竹妙氣欲生秋照缽燈何淡霑缾草亦柔菩提無樹覓從是益清修歲晚二首溪邊歲將盡階下草不死有待膏雨滋一時青青起二蕉葉畏霜剪離披在中庭何時春風來枯根長新莖和李無塵除夕元旦二首荏苒年華又見除青山雖有不安居冰霜甚矣梅心苦屋斗依然燭影虛五夜誰家雞犬鬧萬村何處稻梁餘謀生未用思全策野鹿標枝憶古初二玉曆纔頒共拜新蘿衣幸早別簪纓溪林小隱私為喜鼙鼓遙聞也白驚北想銅駝堪下淚東求瑤島幾傷明春風殊自知人事萬古吹來寤有生新正三日寄李曉令年來世事愈新新變幻無從問往因天地自來同逆旅菰蘆今復歎窮人霸王入夢無非假傀儡登場孰是真幸向茅堂灑心慮新詩寄我不妨頻蚤春尋梅過一葉菴幽芳何處遠香賒不在林中定水涯菴喜如舟呼一葉梅看在盎發千花小橋客過村流碧曲岸風來野竹斜只恐春深重到此數家漁網柳陰遮飯後放舟溪東見硤石塔值象閒禪人引游李氏古墓方舟入港曲灣灣理策尋芳自得閒一筆插青空見塔半墻圍綠土堆山新桃綽約開村屋老桂婆娑掩石關正渴頭陀來欸茗晚風落日載春還雪窗有懷二首梅瓣沾唇未及酸絮花飛裓不勝寒千金欲得狐裘美百結何如衲被安有句小窗呵硯易無聊短策出門難同雲布網天無漏野雀尋枝路自寬暖閣風流餘一種窮途心緒有多般蘇卿久耐寒持節袁父曾僵臥不冠謝筆瑤章宜早賦秦庭白壁幸多完三更有月開晴霽分外清光試一餐二青梅未嚼不知酸春雪橫飛始見寒初下天心惟一爾染成物面有多般山川高下能藏險屋漏穿尋不假寬當境共言行樂易斯時真覺處貧難室如懸磬何其慘壤有餘蔬孰忍看縱為堅冰行刻令闃令空界起爭端吳儂已化衽為左許子無煩粟易冠雲雨覆翻良足歎滄桑變幻幾時完靜知茅屋行嘉遁斗酒千詩強自餐對雪飯後覺足冷溪山忽地迷再來春雪大獨坐板樓低小鳥寒投竹空花密覆泥行人何絕少翹首望林西曉晴紅日上扶桑青天盡發光石池冰結岸茅屋雪加霜竹葉青青在梅花點點粧眼開皆霽色消受一爐香李曉令貽詩招看園中海棠喜而有答二首溪上桃花已不新佳園聞有十分春晨風欲徑凌仙島朝露將看點幻身竹榭嫣然添麗色茅亭快爾靜風塵主人幸有三生約語笑終朝不厭頻二久雨初晴景物新孤芳遙眷眼生春葉承日影初醒睡色抹霞光欲舞身一任繁英紅褪雨獨鄰疏柳碧無塵花神最是多情者未喝風前笑已頻期過藿園阻雨曉令折海棠一枝并詩至喜聞燈下一詩成總為花神久待晴滑道不疑仍雨色撼空先怪有風聲一枝幸寄情聊遣三徑難尋悶忽生好是池塘春艸句古今詩價重連城曉起見雲開有晴意寄曉令朝來好事想當成道是無晴卻又晴庭際蒼苔收濕氣竹間黃鳥弄新聲青天莫再須臾掩紅日應教逐漸生萬朵名花容我賞快哉親到洛陽城是日雨止過曉令園中劇談至夜二首一樹仙花畫不成天陰來賞勝天晴因滋夜雨添顏色為怯春雷停語聲顧盻直令雙目眩陸離疑向半空生狂蜂未易來偷采面面危墻作護城二宛轉枝枝吐萼新芳庭凝立獨留春貽詩當寫鮮妍格釃酒猶憐草木身光射疏簾天欲暮機扱野衲句無塵劇談忘卻歸來也秉燭溪頭舞櫂頻李曉令招敘海棠下兼惠趙松雪墨跡報謝西府芳菲見未曾春臺花葉布層層雨中對去人俱靜月下歸來興獨乘妙墨手貽交自古佳蔬口嗜飽能增溪橋水漲船高放到岸僧傳夜後燈曉令訂過石佛菴看花蠻觸爭長也太狂古今興廢亦茫茫青山抱病應難入紫陌閒行幸不妨兩耳似關聽鳥倦半春多為看花忙明朝蹤跡投何處石佛菴中有海棠值雨阻約走筆自遣曾約鄰菴去賞花陰晴未必敢先誇果然屋瓦五更響又聽村鴉四樹譁開眼可憐天地暗埋頭深畏雨風斜春芳能得幾多力將恐飄零襯土沙新霽曉令招村郊野步遂過石佛菴看海棠眉菴隨喜脫沙佛像至夕曉令獨歸余挈二三衲乘月而返春光無限落晴空野色開門望不窮深院海棠紅耐雨垝垣桃萼碧迎風石沙作佛非兒戲燈月皆明炤轉篷自古勝游惟一瞬莫嫌分手各西東謝石佛菴主春來兩度到精廬自笑觀花習不除當路喜眠迎客犬臨池看躍放生魚海棠屋角留香色石佛龕中潤雨餘卻怪盤飧淹我久歸來新月滿林墟久雨寄朱養明天雨憶君去天晴望君來一晴復一雨幽期安在哉野田爛菜麥竹院深莓苔最惜春光隨雨盡長溪不見桃花開雨夜夢同岫雲禪者數輩策杖山谿之間坡石古秀其泉甚清喜而成偈覺來風景猶在眉睫童子請余筆之爍爍春光在眼前淵淵直下見青天空山盡日堪相賞何必擔歸月下煎春遊紀事同人於野手相攜小艇垂楊綠滿溪忽遇鬼風如劈箭劃開波面肖靈犀碧天已掛蛾眉月紫陌初乾燕子泥村曲人家開徑好薔薇在架放條齊題接引脫沙佛像螺髮青青頂髻紅婆心憫子特來東蓮花獨立曾無語春艸當門自偃風卻憶聚沙胎乍結何知入世體全空飄飄衣裓當軒舉多少勞生顧盻中西樓四首村院無佳處高明獨此樓閒來西向坐靜似北窗幽長路行人接孤村過鳥留好花風打盡無復露墻頭二獨坐有餘適市聲無見傳青黃看菜麥遠近攬雲天童子解供茗村翁自賣鮮菴西有殘屋薄暮起炊煙三久雨衣生潤初晴陌未乾負擔防腳失憑檻得心安役役人生事悠悠行路難春深多臥病拍面怕風寒四黃犬翻青麥紅裙抹綠桑天時行恰好物理得如常雨水溝溝滿鋤耰處處忙鼻邊蜂蝶過一陣野花香懷舊隱落花寂寂鳥雙雙新竹成陰綠滿窗夢聽潮聲來枕上幾年不得到婁江有僧從吳興來得故人同人化公信有感二首天涯甘苦久同嘗廿載冰霜志亦強奄忽死生殊未定北窗一葉下新涼人之生也固芒乎一醉千春不可呼憶昔湖頭乘小艇平波談笑看飛鳧偶成悠哉一片雲飄然何所住清風山頭來搖曳淡無慮有生獨不然高下希自取安得無心人天涯論衷素七月下浣過藿園竹下坐綠雲高高青天虛秋風漸涼秋色餘此中箕踞意自適不問世事今何如蘭芽為茗客歎奇我亦鼻嗅花扶疏片雲頭上不見黑小雨催詩忽點裾古云一悟寂為樂此君何得一日近我廬送王言遠之任廣州君今躍馬河南行懷保黎元美化成竹院秋深無事掩月明千里見高情小春日壽吳鼎陶御史椿萱八秩二首德風藹藹著鄉閭湛露遙霑降紫泥啟後詩書曾授手生年梁孟共齊眉竹笻野衲山中贈桃實仙人海上貽稱慶畫堂春意暖梅香隱約到樽罍二蕭齋貝葉手親持天竺先生晚結知朋輩一觴猶世祝兒曹三樂乃天彝遙瞻紫氣長林滿高跨青牛化母隨采藥當年憶龐隱煙霞偕老古今奇寄張鳴九文學尋秋偶過古黃莊半日清談木葉涼別後月明三百里天涯冰雪念同鄉除夕次崶禪人韻歌罷朱筵酒未闌十分清寂屬祇桓但將世外身心了不覺人間歲月殘室掩燈花忻自結爐深柴火快無寒明朝短髮年華長陌上兒童孰解看元旦夢裡聞雞夜欲闌布衾餘暖尚盤桓枝來山鳥應須語瓶貯梅花未可殘歲取十千還卜稔春交五九不生寒茅齋晏起稀人事小閣橫經眼細看夜雪漫興二首深爐火未灰芋子正堪煨送客寒燈出開門夜雪來虛光凝竹院冷氣浸庭梅宿鳥皆無語更樓鼓自催二春宵有餘興剪燭話更長未覺鐘沉院時將衲擁床一林寒似水萬瓦粲如霜多少簷前竹垂垂欲壓牆對雪口占三首春來天地寒萬里飛白雪村路絕人行小鳥簷頭集二庭前幾竿竹寒重一時倒呼童扶起來葉葉光皎皎三茫茫一片白折竹時時聞畫沙學兒戲字字不成文尋梅春來冰雪喜初晴小艇溪邊自在行莫道梅花猶未放前村蚤有暗香迎初春送問松上人過吳門兼簡王意菴長溪一帶水悠悠送子攜囊過虎丘放鶴洲前梅正吐可中亭畔雨初收新茅且結煙霞隱舊病姑停汗漫遊咫尺山莊玄度近春風詩句好賡酬解制二首千里同堂話始終韶光易轉似輕篷花根已潤春來雨草色齊醒陌上風馬有驥材權伏櫪鳥非鵬舉定驚弓從他五味諸方學衰病吾今有不同二雲水相依制欲終麻根但直不愁蓬興餘姑看千林雪語放應生四座風鑄像古來憑大冶學箕誰者法良弓囊藏穎脫當科選平地春雷響不同尋梅煙村何處是通津小艇搖搖問水濱地結冰霜寧畏冷園多木石且觀春永懷苔骨心無倦忽竊寒香鼻有神卻笑當年林處士孤山滿種養閒身春遊過李園春野梅初好村帘酒不賒苑深藏小岫溪靜出浮槎雲烏能依樹兒童看折花歸來燈下坐香氣在袈裟仲春三日壽李青來文學母徐孺人八旬四首和風吹野渡佳氣藹衡門堂上觴宜舉人間壽喜尊春花娛老眼煙月寫眉痕懿德重為擬安貞取厚坤二特操非人授松姿耐歲寒勤家夫子逸處患婦姑歡大雅徵麟角期頤享帨鞶鸞笙何處下仙侍紫雲端三萊衣名著久卓爾祿無干釵釧貧而樂春秋老亦安鶯將林上囀花不霧中看坐愛幽香遠芳庭又吐蘭四桃李下成蹊春隄芳艸齊恩勤宜有答康壽古堪稽新燕飛簾北嘉賓宴日西願申華嶽頌不厭醉如泥寄懷張心素吳門相別後役役幾春風我鮮求閒術君多濟世功指端元有眼病外更何攻妙藥無須覓醫王旦暮逄寒食即事二首晴霧茫茫春日佳垂楊飄綠水之涯鳴金野櫂深溪出酣酒遊人古殿排芳樹不言皆解笑荒陵無享竟誰懷韶華轉眼真難駐莫怪紅裙墮釧釵二風日晴和鳥亂鳴芳辰取次及清明戶知寒食煙誰禁人喜春游夢亦行桃李倚牆顏色好桑麻插野土膏平墦間祭掃何來者薄暮松門宴未停賦得佳節清明桃李笑十首幽齋方靜坐令序直清明爨冷因懷古居深亦避名好花聊寄詠芳艸不堪盟忽忽催遊興枝頭囀曙鶯二夭夭誰箇種灼灼映溪林花得詩方重春隨眼自深素紅分兩態貞靜結同心暖日勞蜂蝶紛紛隔水尋三花下成蹊路花間鳥作歌春風吹陌遠天氣感人多隋館舊應滿梁園今若何海棠初睡起長歎馬嵬坡四玉面開佳李朱顏豔小桃只於三月見似笑百年勞新月晚能炤和風畫不高抱琴花下士母把寸心挑五天幸無風雨時方在豔陽紙錢飛太薄柳線掛何長陳死應無覺盤餐空自忙只遺墻外樹歲歲色能芳六碧艸已盈陌采檠春日遲花顏何若喜客淚自成悲掛劍新黃土分香舊粉姬英雄心未了當復化神奇七黯黯村疑雨濛濛野盡煙快過修竹院真是賞花天芍藥期相贈山茶望欲然渴來醫一茗歸憶主人賢八童子能詢路行人去不休曉霞鮮著眼春雪冷飛頭未得瓊瑤報欣先笑貌投愛花溪上轉緩步卻勝舟九午雞啼未歇春霧尚沾衣自喜莽蒼近何嫌人事稀舊煙山外禁新火木中歸誰謂村花好臨風一片飛十百五逢寒食三旬剩好春微吟聊紀候多病每觀身燕各營新壘花將笑老人及時行樂者取醉坐苔茵寄題敬亭山一峰菴敬亭山色好秀起獨茲峰白日自云轉青天還幾重松杉交暮靄城郭入秋鐘聞道新樓敞安禪隔世蹤春暮有懷愍度師違況日已久懷思安可陳黃鸝啼入夏紫燕喜留春鴛水客仍在龍湖花幾新何時理閒櫂磯上把絲綸過新城廣生菴容與方舟可到門精廬小搆傍深村我來信宿忘賓主丈室空香雨曉昏能仁寺布金聞自陸宣公樹影溪光殿閣重昨夜村西菴裡宿分明聽得打疏鐘千佛閣四野煙村在望中僧房共許小舟通熏風長夏南來好古佛千身現半空泛舟至沈翼乾先生墓木香棚上少花纏堂外松風代管弦積簣成山人在否夕陽流水墓門前同邵含甫顧墳遠眺松陰落地曉風涼藉艸為歡茗碗香莫訝閒僧喜閒步生平山水意偏長飯郭清安宅清溪浩蕩綠楊邊僧缽遙來盡滿煙飯罷涼風生竹下斜陽幽鳥聽談禪廣生菴答沈天祿見貽漁罾相次泊澄潭舊路將歸問指南客裡忽成三笑樂溪濱幸接片時談詩餘法喜場偏檀雨及農時土盡貪誰謂風流支許異都來種性肖瞿曇爛溪舟泛蘆葦蕭蕭送冷風隔溪漁網早霞紅怪來雙眼空無物萬頃晴波寫我胸浮碧菴空碧虛明畫不全菱花荷葉水中天菴前古廟留奇樹吹下涼風醒客眠遊凌氏古壟羊虎相忘草際蹲桐陰百尺晝能昏石堤更截南來水自可千年潤土根草菴開門洗缽即清流草舍燈光映古丘若問道人真活計行雲流水兩悠悠從塔港放舟至乾元菴作溪菴纔一宿煙艇又何之喜覓新茅隱因深舊社思波寬鷗鳥適風急釣竿垂蹤跡誠如寄山瓢到處宜草蕩遇風無端風雨一時來舟繫蘆叢莫敢開促膝篷窗看白浪中流何處釣魚臺蚤發雁蕩白鳥青蘆碧水寬雙雙乳燕掠波寒垂楊數樹漁家近罾網高低曬竹竿柳溪橋古廟東西自結鄰煙光水面蕩清晨柳溪橋下路行熟魚鳥相依若故人王帶存招遊園亭五首曲港清風入名園薄暮尋枕流隨野性開逕見遐心雲卷谿山近禽喧竹樹深虛堂無異友聊坐矚涼陰二積水心何寄為山想亦靈明霞開苑樹歸鳥向池亭短策方憑檻孤舟且泊汀中林嘗不厭梅實正懸青三植地仍多果編籬盡是花好春三月在幽景四時賒竹榭能留客荷軒欲暫家主人初未問宛見水之涯四坐石惟聞鳥臨川可見魚真同濠上賞可信世間居磯靜斜陽淡亭空碧艸餘行將疑廣莫此處合容㯉五逸少元仙子風流自不群琴樽傳異代丘壑寓斯文鶯囀溪邊柳鷗眠水上雲薄遊身在野徙倚日初曛嬾齋步子康韻二首總不圖人鬧我關雙扉掩上極清閒不須更就松雲臥耳目悠然絕似山二勞勞舉世多忙色只有道人留嬾顏睡起小齋桐日永新詩一首快消閒村居八首世路走何盡人生閒亦難冷情逢事畏病骨處村歡舟可行深樹橋還隔小灘綠萍飛白鳥自覺地天寬二野外行無事村中住有情地餘桑柘影路入桔槔聲甕牖朝霞染柴門秋水生何當逄遼者來此濯其纓三肅肅抱孤影閒閒存素秋村空人語近夜靜月光幽落扇兒童寐窺簾熠燿流良朋千里外寄字苦無繇四窗紙蝸牛走簷茅壁虎蟠有生同性命大塊急飢寒種菊殊堪把烹葵亦可餐溪風搖五柳彭澤古為歡五已快星流火猶遲露結霜看天生月彩坐樹納秋涼鼠語燈頻剪雞鳴夜未央彷徨塵垢外何必獨蒙莊六灑掃為常課行吟適病懷魚罾臨水布蛛網向空排田父時擎笠村童不著鞋舞雩風且詠天趣豈曾埋七只對空庭坐雙扉不用開豆棚花自落草逕客何來運甓思無逸揮斤棄不材涼風門外葉一任晚成堆八綠竹深環屋青麻長過墻三秋平稼圃五月了蠶桑沮溺何知亂伊周正在忙武陵津莫問斯世已相忘中秋前一夕藿園看月時李子將有遠行落日舟還繫天空夜不升小山先得月虛室正懸燈樹影千林倒蟲聲百感興星高河漢遠客路善支藤十五夜坐指月菴此夕秋何勝深溪一櫂停雖聞雨聲大不奪月光清煙樹輕弦撥村橋微火行主人留久坐涼榭喜初成大風呼櫂過秋亭攜鄭子看月一雨已亭午孤蓬滿載秋村村風戰竹處處水容鷗有月生今夕無朋用遠求斜陽出門去快作閬仙遊是夕偕鄭子泛舟別溪菴適王介人周公貞亦到碧水萍花亂清秋菱葉齊客舟隨岸轉菴路入村低良晤欣無約空明在別溪南林疏雨過人立板橋西登金山青山水上自沉浮滾滾長江去不休南北風帆如箭疾翱翔獨鶴下中洲焦山三詔洞三韶滄江不起身空巖竹樹淨無塵漢家天下如傳舍焦姓先生獨享春鄭子學佛庭下生芝道瑞也詩以貽之靈種何從孕多君學佛徵艸叢稀得見神理忽相應雲狀階前幻霞光土面蒸兒童休採取軒有野僧憑送李曉令入粵人生各有適求志即為安去去五羊路凄凄九月寒渡江招月飲陟嶺向天盤客謂居家好人歌行路難風霜飽行李勉子必加餐登施淳寰小閣持缽清秋過濮溪扁舟來去市東西偶逢居士留茶話憑眺空樓綠樹低酬范子月夜見懷良夜懷人遠清光許客同樹禽欣得晝霜葉自驚風慧業虛支遁詩名向謝公歸來春又去碧草法堂蒙初夏范子同余過秋亭小菴有作步韻雨後鳥鳴和殘花漾碧河春徂佳景在舟泛逸情多村水生蓮葉菴門入薜蘿曠遊吾不厭薄暮聽漁歌寄懷王言遠晴日溪頭艸木香幽村處處事蠶桑片懷社後窺雙燕一夢春深到五羊滄海明珠銷夜氣碧山霖雨潤炎荒旌旄咫尺曹溪路舊話風旛喜再揚紀遊出遊三月盡閒坐一窗深終日只看竹無時不聽禽野客少相識孤雲何處尋輕舟自來往隨興泊濃陰書王祈兮扇春歸竹院落花遲黃鳥偷來在樹枝一種閒情禁不得曉窗研墨寫新詩偶作二首北窗朝起坐竹影好風吹侍者能修供薔薇折一枝二谿陰已數日竹埂未曾乾新筍泥中長成林又幾竿對松詩贈鄭平子先生有序梅里鄭子康余弟子也乃翁先生號平子年甚高隱居里中不與人接家有古松一株日與相對蓋自宦時從天目山得者將二十年矣平時詩篇甚富半從對松而得己丑秋日余慕之乃命子康為介造其廬先生喜余世外人遂啟書室延立松下松果蟠折古勁蒼翠襲人信先生之樂而忘老也即其榻坐先生髮雖白談及詩諦精神躍躍如少年狀因示余對松詩蓋平日最得意之作也余捧玩之乃賡其韻以贈野衲偶來松下坐蒼松未必能知我因與先生結道交松亦愛我窺庭左先生對松年已深等閒未許客來尋今日放松相對我與松共有白雲心憶昔淇園歌綠竹忽見茲松禮加肅閒庭廓落清風生濤音微奏疑空谷楊花三月鋪如氈芳菲莫恨春無緣此松獨抱歲寒色看春歸去花亦仙松隨先生已多載婆娑未覺滄桑改一杯岸幘小窗前喜有詩篇浩如海詩思飄揚神欲飛松枝翠滴凝朝暉蓬門久已絕塵事艸積何嫌三逕微松耶人耶都絕好合浦連城未為寶留侯功業漢庭隆赤松最後能偕老古來達士多仙風豈是娛情草木中南山在眼菊盈把淵明自號醉吟翁枕上盧生正榮適怪煞松風吹兩腋黃粱熟後悲塵凡仙人已跨鶴一隻何似先生與松友白髮從稱愛松叟日將老手採松髯霸王楚漢知誰久酬沈爾任文學有敘附原詩己丑杪秋余持缽濮鎮寓白衣菴見疏冊題語奇之僧曰此沈相公筆也有頃居士來菴見訪自言生平未肯折節沙門及見余自不知道誼婉篤又自言曾與湛西堂善時西堂己物故因談其生前所負為之慨嘆至余日走市中東西往返居士亦不倦日夕相從且賦古體見貽余樂居士一面遂相忘於法喜何愛之深因次韻酬之昔我見費老長揖不肯拜傲骨太崚嶒蹉跎五年外今茲禮吾師此心忽如死自笑倦飛鵠於焉覓所止因悔前者非更疑今者是疑悔兩攻中是非何時已譬彼缽本空云何乞米粒米粒固苦心空空仍費力勉言向實走不敢鶩虛行虛實卻難探行走阻脩程昨師東村來今師西村去東西無定蹤尋師在何處爰念湛虛氏彼本出世人欲速致煩惱遂以殞厥身矧予薄福者而敢忘大教始知嶧泗庭早具朱涇釣右沈爾任贈詩生平懷米顛見石亦肯拜君骨與之較總在驪黃外自哂病㯉櫟心灰類如死溪菴聞足音嘉客喜至止初覺灰者非終忘喜者是是非付天鈞所樂無時已譬彼缽中空而能容米粒空粒本同缽擇之憑眼力此言如夢語道人期篤行太空亦為幻古佛有章程昨從東村來今出西村去去來我無心東西在何處吁嗟及門子許是英靈人所向遭數奇齟齬終其身君子能樂天有符安心教臨溪得閒情同把朱涇釣
