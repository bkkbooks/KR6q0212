body:
  text: 東吳毛晉子晉編閱鄂州記室智時較訂文甲論觀苦入道論世間法以不可力致者委之命與數故所遇窮達遼者惟順受之此於世逵矣而其理有未窮乃出世法則不然以吾人之生斯世也脩短不齊有富貴焉有貧賤焉靈蠢萬殊有聖哲焉有壬昧焉此非天降非人與無不從過去世搆因如疇昔樂施與則此生享盈積疇昔奉齋戒則此生履崇高疇昔曾聽法修慧則此生有智強識其貧賤愚蒙者反是此先佛如來誠諦之語苟能知此則人之處轗軻患難自不怨天尤人一一消歸自己而非世之所論不怨天不尤人矣何則古今高識大賢言命與數雖欲人反求諸己而曰數似于己外別有一制限在曰命又似乎己外別有一定宰在所以李將軍有數奇之悲楚重瞳有天亡之歎蓋將尤人不知反己乃至顏冉之夭夷齊之餓此又博學者屢屢致疑而莫解也原其所號為命與數者祗論夫一世一形之賦受其於死生輪轉幽微之故未嘗發明也故昧者每以生為樂以死為苦賢者則曰所欲有甚於生者故患有所不避也此不以死為苦矣然未嘗指生為苦聖者則曰朝聞道夕死可矣此似以苟生為苦以道為樂然未明其道之何如也若夫達出世法者當其遇坎坷而顛沛流離也則必惕然以思此繇往因所致既惕然以思必恍然而悟曰我既昔作坎坷之因茲欲履不坎坷之境無是理也又將思過去已作現生之因則現生定作將來之果因今以驗昔由往以知來因今以驗昔則知定業之不化由往以知來則知定果之莫逃以信因果分明故則現在所作又必矍然起驚曰未來生死冥然無涯我于今也仍不作無坎坷之因乃欲將來期受無坎坷之報有是理乎如是而思如是而審如是而驚如是而慮則知患難貧賤未足為苦乃生死殊為大苦矣以有生死而眾苦繫之矣思生死為眾苦所繫則欲求脫生死之念必勃然而興求脫生死之正念興則世間情念應時而破譬千年之暗室一燈始然不知諸暗之何從也從是而疏世緣從是而安貧賤從是而輕富貴從是而親善友從是而堅正信從是而黜聰明從是而修智慧從是而躋覺地從是而知佛恩夜寢夙興應事接物自不碌碌而過此果因之理乃出世大關鍵未有不通斯旨而能入道者但世之人情每欲富貴而惡貧賤是必以富貴為榮貧賤為恥又豈不以生為樂而死為苦耶達觀者不然富也貴也貧也賤也靡不有老病死也靡不有老病死則富亦苦也貴亦苦也貧亦苦也賤亦苦也生為其首也生生不息則其苦無竟故大發修行之志堅執智刀斬裂塵網直躋乎無苦之岸則生亦不可得老亦不可得病與死亦不可得然後為得豈直富貴浮雲貧賤不移而已哉蓋生滅滅已寂滅為樂乃諸佛之造詣群靈之本因迷而苦之悟而樂之耳昔者齊景公登牛山見齊國之美潛然雪涕此其時亦有見乎身世無常為苦而達者哂之以其迷寂樂境認乾闥城而生戀戀也若徒謂生必有死生為勞死為佚乘化以歸盡為達而不究生死幽微之故則亦莽蕩邪見斯又景公之所當哂也以其見世無常而不驚盲瞑無智其又惡能達觀無生無苦之無上妙道也耶序達澄昭公語偈序達澄昭公與余同參金粟老人乃乙丑春二月也公來自台蕩余發足自吳門相去千里海塘問渡忽焉相值促膝方舟酬酢半餉予見公貌厚骨剛志邁言簡有古衲子風公亦謂予氣味不異遂成莫逆夏末公渡錢塘禮受業于歸琴川省親再期金粟山下分袂月餘叢桂香中果如約而至復相把手然公孤高之操陸沉眾中獨當老人棒喝下神骨聳然老人時瞬青眼視而公唯自重若訥丙寅春煙霞癖發偕予看明州山水挂瓢福泉山之法海寺所造日深語益鮮利或拈弄古今或宴憩水石信口而吟信機而出猶天籟鳴未過關者侗乎莫測第恨其隨誦隨捨一日溪行予謂之曰我儕片言隻字莫非吐露衲僧本分揭佛祖命脈何遽棄之公忽悟大笑曰從是當彙成編任刺人眼予因戲之曰篇之首安何名公云虛空不容彩盡予笑曰虛空固不容彩畫彩畫豈外虛空耶公云打葛藤作麼予復笑而不言遂以名其篇元白可公出山詩序衲僧衣線下一段大事輝今灼古非言句可指擬才涉唇吻即覿面蹉過故我同儕欲求法於語言文字已若掘地覓天況刻意工翰墨事吟詠於自己分中何啻白雲萬里耶雖然若是得底人又且不然言所不言跡所不跡嘗年無語其聲如雷終日口喃喃原無一字如是則何妨開口何妨閉口何妨有句何妨無句何妨一句何妨多句予友元白可公楚人也與余同參金粟別來數年晦跡於徽之黃海日登眺三十六峰坐石題詩吟風嘯月若下忘人世矣乙亥冬會老人從心之年及門弟子散於四方者畢集太白蜂下公亦負策而至自秋徂冬每於火罏頭出黃山所詠示人同志咸愛其脫落繩墨有瀟灑獨得之韻春日載陽制解公作詩別友卜日他行意覓一丘一壑種田博飯追步古人不欲浪出頭角類骯髒蟲豸於是黃巖木陳忞公聞而嘉之作歌以貽一時同志賡者凡數篇公總集之索予為序予曰是集也胡言漢語同友雖各出手眼然於公分上皆閒言語何用為公曰拋磚引玉余之幸也固以請余因書前數語不唯題今出山詩他日併可序公黃山集使明眼人欲識我林下人面目不待文彩已彰自當於筆尖未動時薦取鹽梅鼎公遊南嶽序丙子春予隨眾作息太白山中時同參鹽梅鼎公將遊南嶽諸同志各以言贈余聞南嶽之為山乃先哲栖遲之處考之傳燈若思大之吞佛懶殘之煨芋讓祖之磨磚谷泉之縛松其神機隱德格言密行昭著天壤不可磨滅千百世之下固有聞其風而起者然聞風而起者豈尋嘗之人哉是必有先哲之抱負斯有先哲之舉止行色匆匆吾書質於鼎公當一笑而攜笻木陳忞公回粵省親序天下有達道親親其一也蓋吾人之有親猶水之有源木之有根所從來者矣故魯夫子曰身體髮膚受之父母不敢毀傷尊其本也而吾祖竺乾聖人則教人辭親割愛毀形棄俗其故何耶或以此為然則古人有如臨深淵如履薄冰之誡矣以此為不然則古人有斷髮文身逃荊蠻而不返者稱為至德道果安在耶是非事親之道居嘗達變各盡其事之之心互見於形骸休戚者歟抑又聞之立身揚名以顯其親故曰以天下尊尊之至也以天下養養之至也又曰孝子之事親也不擇地而安之親苟不安雖視天下猶棄敝屣乃昔竺乾聖人宮掖晏然父昆相在忽自眇輪王之尊輕天下之養獨竄窮山貽戚父母又何稱焉是非於其身有大不得已者歟逮夫睹明星而歎一切群生具有如來智慧德相則其身大不得已者恍然覺憬然悟夫然後如法尊其親而非世間之尊如法養其親而非世間之養如法安其親而非世間之安教垂五天流及震旦嶺南賣薪之客不期然而踵其跡籍客十金贍母登黃梅入槽廠傳衣夜渡震旦之法幢賴獦獠漢至今存焉立身揚名自不必論要其纘緒大覺佑啟天人利溥萬世此其孝豈世間之為孝哉予謂世間之孝本乎身之所始出世間之孝本乎身之無始本乎身之無始則無生本乎身之所始則有生有其生矣則冬溫夏凊生事死祭孝斯在矣而不能致親息苦輪趣道樹首出三界無生則能致親解生死之縛忘愛憎之情洞堅密之身入如來之地矣而且親吾親以及人之親一體同觀安於嘗樂此其為孝豈世間之孝可測量哉雖然世間也出世間也其孝必待其人而後行吾同參木陳忞公族出嶺南初業儒因觀身有大不得已乃裂縫掖披田衣毀形割俗遑遑四方盡所以安身致孝之道於是投豫章之匡廬歷楚之黃檗末入天童老人室掌記最久槌拂之下正眼洞明大不得巴者無覓處曰吾得達道矣是可以省吾親安吾親矣丁丑夏乞假歸覲余唯公之致孝無忝竺乾古訓而其發跡又踵乎賣薪能祖茲歸也倘不志靜退念祖宗標格非風動非旛動直振其家聲使天下人知嶺南獦獠漢猶在則如來大法不大有光於世乎其所謂揚名顯親者又何如耶是述世出世孝法為贐而贅之以辭辭曰爰有人兮來嶺南芒鞋竹杖四海參有親不顧奉旨甘如法致孝追瞿曇生死關頭夢正酣劃然打破真奇男時當六月暑不堪青山朵朵燒晴嵐忽來別我出巖菴歸思惻惻萬里含髮毛具見各毿毿人誰無親君獨諳竺墳魯誥我亦探父母其順樂且湛君初厭離去冠簪淵乎所志猶江潭勞勞俗眼真若憨詎知君孝青於藍還鄉拄杖今復擔本身說法舌不談溯之古人面無慚前三三與後三三魚喁艸序余林下人也不知世間文字庚辰冬偶過禾中曉令李子頻來道聚一日攜所作魚喁艸見示且索弁語余惘然因問魚喁何義答曰語出淮南子大凡魚相忘於江河或水濁口則仰焉余於時不覺有感既而披其一題誦其一詩則目前得一境界忽喜忽愕自不知其故及掩卷隱几所歷境界又復了不可得因憶舊所誦維摩經云或有佛土以佛光明而作佛事或有以香飯而作佛事有以園林臺觀而作佛事有以音聲文字而作佛事有以無言無說無示無識無作無為而作佛事楞嚴則云此方真教體清淨在音聞似乎古佛所秘出世法門亦多泄之語言三昧然欲當機領解必待夫信之萌緣之稔也否則猶石之受水了不相入乃若詩者無擇信否纔一諷詠一側耳可中即躍然若有所得斯何故耶夫子曰詩可以興其信然耶此余讀曉令詩有感是知曉令之感發之魚喁余之感乃發于曉令曉令初知魚之感而余并知曉令之感余知曉令之感而曉令不知余之所以感曉令知魚之感而魚也復不知曉令之所以感彼此相感若相知若不相知魚耶喁耶水耶感而興者其何始耶人乎物乎詩乎感而復者將安詣乎余終惘然也請還質之曉令別刻古庭和尚拈頌序滿月處空清淨無翳而盲者不見非月之罪也江湖滔滔布帆疾馳而不知津者望洋而歎非江湖之過也從是言之釋迦老子果有秘密藏乎祖師西來意果有關鑰門外漢不得而入耶借以月論之彼其在空有目皆見寒光著人不待指點指點者為盲夫也自非神妙之手其何能焉所以靈山話月曹溪指月古今宗師機緣拈頌層見疊出皆話月指月之若也當其闡揚語有不一或指於空或指於方或指於山或指於水或指於屋梁或指於庭砌或指於前後左右盲者隨而執之得於此不信乎彼於片影生滿足想較高下焉是故指之權所係亦大矣甚至昭其用也指以淨光則執如珠如鏡揭其體也指以圓像則執如盤如盆若是者彼盲固可笑要亦指法未妙乃不能啟盲之悟而徒益盲之迷夫指而益盲之迷不若不指聽月之自然之為愈也何也月未嘗不在盲者之頂額也是故古今以西來意視為膜外物者盲夫也從而指點見小識局筆庸詞鈍是指月於屋梁指月於庭砌不及也或者組繪其詞隱隔其旨盲者不覺從而咀嚼譬若初欲見月乃竟忘月徒愛指之纖好又非指之者之過歟是故以指彰月以言明道過與不及均失也予觀古庭和尚拈頌其運筆甚靈從而味之意圓詞爽旨深格高絕蹊徑之岐無穴鑿之病直截而婉轉老煉而優柔見古人之大全渾然如空中樓閣雲霞縹緲是能妙于指者己丑春予游鹽官于弟子默庵案頭見其全刻獨愛其拈頌深有所養命侍者手錄於篋中吳門顧敬修居士訪予破山見之捧讀為未曾有曰此後學典刑也請別授梓以流通予曰善師諱善堅考其系為無際派嗣蓋臨濟下兒孫也聽雲集序人生遇合世出世固自不偶昭易澤國也極樂孤菴也予初至歌想滄浪竿投綠水而已居無何有一翁來訪鬚鬢皤然瞻其容聆其語益儒者也出詩貽余誦其詞高其韻視其印誌為木頭老子木頭老子蓋儒而詩者也余喜之既而四方來學聚於一堂風甚冷淡木頭老子樂之一日攜一矮榻及團蒲直來堂中晨香夕燈行住坐臥與衲子俱余始知木頭老子又儒而禪者也適大山勝公自牛頭山來余請典藏職大山又儒而衲衲而愛詩木頭老子不覺與之合焉飲食居處靡不同也余益奇之昔者吾友斷峰雲間人亦儒而後禪鍼芥天童先師惜沒焉其法不見於世木頭老子蓋曾與之抵足焦山討論竺典木頭老子之入佛年且久矣而絕無泛濫之語橫溢之機其學問有淵源佛理窮精奧不立異同其骨氣不為時抑不求人聞獨以了手一著為念在儒為慥慥君子法中亦可謂耆年禪伯也乃醉心於孤庵歲暮忘歸余亦不知其合也擁爐煨芋秉燭炊茗每誦其詩而樂之然詩乃木頭老子之緒餘也柴菴先生和池上來詩序柴菴先生有廬在煙水茭蘆之間顏曰大歇以其歇也足不入城市日惟耕漁之與侶鷗鳥之與親篆煙橫斜梵帙滿案間事吟詠余以池上來詩投之有當於意和而終篇客有問曰池上來詩何為而作也余應之曰甲申之歲神京分崩海內騷然予思避地入山入山不得而寓於池上詠池上懷山中也夫豈懷山中哉客曰然則池上之吟大歇之詠殆相近耶余曰不知也客曰池上之居先生之廬亦相遠矣乃異地而同聲異服而同調何也余曰不知也客曰吾知之矣唐人有醉中往往愛逃禪者夫禪達人之所嗜也先生之嗜其在是歟余復應之曰我何知哉夫達人既醉念之所至感慨淋漓天機畢露及其醒也或失之矣今先生醒而無醉參酌禪典日臻妙境非以禪為遊戲唐人未可以方也余聞古之人志之所存各有所寓蒙莊之逃於貧寓言玩世寧曳其尾子陵之逃于釣羊裘五月溪山自得柴桑之逃於酒躬耕種秫終身醉鄉柴桑豈沉酣之人哉今詠其詩沖和雅淡想見其胸中介如石焉以此論之柴桑既醒而醉醉而醒醒而復吟其又逃於詩者歟客曰命之矣歌孺子之歌乃去宗鏡節錄序佛滅度後後五百歲支那國中有聞達磨西來直指人心立地成佛之說曰吾斯之未能信焉學者分河飲水大法幾裂譬夫一人之身而左右手足各有相戕之勢有宋永明智覺禪師於是乎懼製宗鏡百卷挈大藏之綱會經論之文具精微之辯折衝性相吻合宗說其書出焉能決學者之疑而全大法之體後之作者遵而循之由平康正直之道達廣博嚴麗之域無泣岐矣然古今隨其所好剔繁就簡錄其要妙有四家焉初黃龍庵晦堂禪師者曰冥樞後會稽陶石簣先生廣之曰廣樞楚之袁中郎先生者曰攝錄近有海虞陸子平叔者曰節錄余於宗鏡未披全文平叔謂余曰三公之採宗鏡小異而大同不過在性相屈信之間黃龍所集甚約陶廣之袁彷彿於陶今不佞參以臆見一一卷中全其旨趣之直捷略其章句之重複百世之下似有得乎永明之心永明其牖我矣我師其樂為序之乎余唯唯曰夫永明何言哉本頭自在迷者狂馳將求佛於千生永明蓋欲悉破學者之深疑而扶其正信所謂以慈悲之故有落艸之談也永明何言哉永明苟無言則子亦未嘗節斯錄余又惡乎序之平叔曰舉一心為宗照萬法如鏡斯永明之大旨也序之可乎余曰是方便也昔裴河東得法於黃檗嘗書所見一編呈於檗檗接置之問曰會乎若便會得猶較些子若也形于紙墨何有吾宗即永明亦自言之矣幻人問化士谷響答泉聲欲達吾宗旨泥牛水上行如是章句為心耶為法耶將惡乎序之余獨思夫黃龍石簣中郎三公一為大宗師二皆博雅大儒道德文章傳播海內而獨傾信于永明則知宗鏡之書誠為甘露門矣陸子亦儒者少年時伯仲翩翩為佳公子咸以文章世其家英華勃發視青紫如拾芥邑中大人先生與之游而恒避其鋒然性喜奉瞿曇氏余剃染遂相識世居五渠之舍上鄉譽嘖嘖意其圖南必九萬里自余出破山行腳相隔二十餘年歸則陸子居然道服矣余奇之身臞如鶴道韻若老衲向之豪邁之氣化為精進宴處一小閣梵唄清絕見方外流相親如骨肉齋中屏去聲色軒榭之間惟修竹老梅相對所給侍不過一蒼頭然亦喜閱宗鏡溽暑祈寒無間心有所得手自錄之積有歲月累成四冊是謂節錄也余以意度之夫嘗一臠即知全鼎此上機也黃龍所集也雖然有種種問斯破種種疑百疑不破則百信不生此永明不惜繁其詞而廣之攝之均有不得已也雖然懼割截也若夫批卻導窾猶全牛也則陸子得之戊子秋余過勺菴一訪其伯仲繾綣杖履靡間夙夜因有詩贈之云法緣夙結瞿曇氏世相全空般若經則陸子者信亦奇士也呂幼安詩草序余與幼安交有年矣初不知其能詩即幼安未嘗言詩又未嘗以詩貽余其文心慧業蓋天成也平日遇名緇野衲如故知宿阿蘭若中聞晨鐘夕唄必憬然自得少年時銳志古文辭自期觀光上國為邦家楨未肯苟干其祿時輩推之甲乙以來則又浮雲富貴居家泊然而已今夏大暑余過梅谿值幼安小舫于青龍港似導引者余初不知幼安在舫疑他客命舟子少遜避舫尾及抵院則幼安也因大笑于是幼安乃有詩貽余余始知幼安能詩然讀其詩悠揚典麗又非若初為者然因論之曰呂子向不詩今始詩向不詩非不詩也全詩具于胸中非其時不發古所謂積厚流光者非歟余謂呂子真文人也寔慧人也如呂子者始可與言詩也矣永安聞慧堂世系序詩云高山仰止景行行止秉彝之好人所同有茲有人焉彊梁恣睢狠戾自用或者撫之曰子之性與堯相若其人雖未能服堯之服行堯之行然私心喜之或謂之曰子之立行去堯遠矣其必愀然不樂繇是言之鳥無有不飛水無有不下從善之心蓋本然也古今寧有間歟佛祖之道如水之行地中無往非水城隍山澤喧闐寂靜又何能取舍吳門天宮寺肇自唐景福五年開山為了然重葺為嗣順歷歲既遠廢而復復而廢大明正統九年承天弘演重為開山郡光祿大夫楊翥撰文記之演為育王住山別峰之孫金山文海之子族居嘉禾識見通敏住承天永安在道原禪師之後道原嗣天台韶國師為法眼宗宋景德間修傳燈以進得賜入藏道原主承天永安演住天宮亦從承天永安來是則天宮寺之有永安者蓋承天分枝也弘治間天宮永安師徒又蕃衍一析于東一析于南雖三分于寺實同宗焉天啟五年後裔機公字玄若嚴淨毗尼丹碧輪奐懼無先德之嘉言懿行後進失所模範乃考諸傳燈采道原禪師機語及住承天永安元正禪師上堂問答等語載在一冊以貽後人元正係臨濟宗為報本元禪師法嗣而弘演無法偈垂世未詳何如人其樹偉繢于天宮者僅見于楊之文也嗚呼粵自靈鷲傳燈東西演化方袍圓頂何莫非釋迦氏之子孫不得已人異其宗家分其譜而佛祖之道則一也彰大同之道啟遠裔之信即使其祖道原而法元正慕前德而衍後修私淑之義殆不遠矣所云鳥無有不飛水無有不下業為佛祖之徒其孰能自外于是世之系之感之發之機公此譜其永安之世教乎殼音艸序殼音者殼中之音也西方有鳥名曰迦陵在時其音已壓凡鳥種性異也莊生齊物論曰無以異於鷇音斯言鳥之初生張喙而鳴無思焉無慮焉是非之情有所不入也惟天而已矣余投破山雪柏老人年已高髮盡白揮麈尾婆娑木座上歲時任運佛祖之位悠然忘懷行同嬰兒或取涼中庭足忘納履或就暄廊廡手不揖人木几左右一爐一茗咿唔之音弗輟也而紙筆隨之余也蒙稚從旁窺立老人歌遂思歌老人詠遂思詠日月久之不自知柴塞之化而天機之張也佛心祖印踴躍而入時雨春風笑談而解於是凡有感觸亦必有語語必呈老人眼老人初必頷之既而曰諺所謂多年鳥子殼中先老其殆子歟斯時也余復不知老人此語之為游戲耶提獎耶將謂我如初生鷇音而忘是非耶抑為迦陵種性坐壓凡鳥耶總之亦絕無思慮於其間任天而已矣嗚呼老人既沒殼音誰證因憶曩日娑羅塔前初遇不偶然者竹杖序山翁和尚以村竹手製為贈時和尚將還匡盧我林下人之於世泊如也視人間寶玩直土苴耳然五綴之缽雙環之錫獨何珍重之曰表法用也缽用循乞示出世正業杖用遊行示出世正道先佛後佛同一轍焉有大宗師神而明之每于用處發其機要永嘉詣曹溪振錫三下卓然而立是也德山因飯遲托缽出法堂低頭入方丈是也又麻谷到章敬振錫三下卓然而立敬曰是是到南泉泉曰不是不是夫此機也豈常流所測哉復有大宗師者得佛祖之用行逸格之令缽從瓦鐵而杖不必錫臨濟三度問佛法大意黃檗三度棒之則錫杖化為木杖矣大禪佛參小釋迦小釋迦打以四藤條後號于眾曰集雲峰下四藤條天下大禪佛蓮花峰祥庵主平時舉杖云古人到者裏為甚不肯住自代云為他途路不得力作麼生得力去良久云楖栗橫擔不顧人直入千峰萬峰去豈非錫杖又化為藤條楖栗乎噫維錫與木及藤條楖栗乃佛祖廓示正法眼後之作者未可異同于其間往歲丙戌余結冬梅谿飯後經行古墓中見異竹焉節疏而條直曰是宜杖也取以歸媿短于裁製竹之精華不現雖采之旋擲之壬辰夏病初起艱于持重視木杖如金錫焉乃以一僧舊方竹杖為用復過梅谿偶見漚麻者取皮而棄其骨余曰是亦可杖也入手果輕圓修潔階墀之下隨意所之因賦詩曰落落丘中有修修莫掩藏以能高骨格致我略玄黃扶老秋無畏投人夜有光就中新用處初不類諸方頗好之優游林薄無時不俱獨念履險乘危則非其所長也於是遠行仍用方竹竹舊甚適山翁法兄和尚于中秋前四日從虎嵒枉溪上余見手中亦用竹杖光澤可愛顧余舊竹黧黑憔悴和尚心若憫焉余因憶丙戌冬事乃問村竹亦可如山竹作杖乎和尚曰天之生材何限方所苟能裁製皆成法用余曰此處有竹似可杖余得而復棄和尚訝曰試觀焉命余引步至前古墓見竹焉則定神凝思仰觀俯察量尋揆尺僅得一竹攜歸院中遂自炙之濯之刮之磨之群衲擁觀和尚曰製杖豈小道哉御法柄亦猶是也非材無用斲有材無使傷因其本然發其光耀本質固好不廢揩磨則其成材也大立于前表裏精粗無不妙矣時侍者進茗口忘啜日夕矣乃復手拭于月明之下有頃覺觚稜之間皆生白焉眾始駭和尚之善製杖矣且疑和尚為一小物何勤勤若是孰知和尚之托微意抑初不為己用哉凌晨復摩挲再四纖痕淨盡通體圓潔乃手授于余曰吾此去歸匡廬舊隱兄此行將入天童不天各一方乎常相見者唯此杖耳余惻然謝之念和尚精神尚強而頂髮則無黑矣此行歸江西道途邈遠晤面難期同門落落誰復如和尚之愛我乎離群索居誰復如和尚因杖而誨我以接物之方乎憧憧參學奔走吳越孰能如和尚善於裁成而親炙乎腸不覺九迴也和尚春仲從東甌歸作詩三十首淋漓慷慨處患難心無少慍履公庭節無少損與古覺範大慧蓋相匹焉法門之棟梁臨濟之大樹捨和尚將誰屬茲其可躡雲觀瀑拂石而高臥乎余益有感也雖然匡廬古法窟也而祖庭甚侈和尚固欲白駒空谷當必有憫世大士排闥而入請慰眾山之望明年余在三佛地聞法鼓填然遙振于五老峰頭者必和尚也余憑竹杖喜躍當如何贈郁素修序內美未充而外揚或者譽之居之不疑彼何人哉世出世學術之大患也惟其欲速外揚學不至術不精叩其所得曰如是而已矣察其所安則貨利也特借途于學術故學術惡彼而去之古之人不然志于學不恥惡衣食或譽之將不自安曰此譽奚宜至哉其意非惡乎譽也自知學未至也即使學至其志愈弱不自滿其骨愈強不自息可也彼見學術之量猶瀛渤無涯進乎寸有尺在前過乎尺有尋在前盡乎今有古在前尺寸有盡瀛渤之量莫盡今之尺寸可窮古之尺寸難窮名何為哉惟其不根于名而名隨之不苟于譽而譽親之斯又天地間與仁惡佞自然之理也慨今末世古人難得乃于素修郁君見之其力學篆文云在童子時至于今歲月深矣其篆成矣其譽來矣為人真樸簡直不落蕩遊之習絕迂夸之語其學可行矣卒未肯足跡四方求知于人客山房中日與石友自朝至夕乎摩神運心無他營但求其術之至而已矣一篆愜意則喜見眉睫津津然不自覺蓋其生平一石當前雖天地萬物陰陽寒暑羅列交現乃不知為何物況身世窮達聲色貨利云乎其用意如此余見顧謂諸弟子曰學道如郁君其庶幾焉壽吳門鄭士敬先生六秩序士敬先生乙未清和齒登耳順士君子爭集咸以耳順壽之而先生則投箋于余以散亂無記內省夫無記散亂釋氏之語也孟軻氏則曰學問之道無他求其放心而已矣昔有問于宗宿曰起滅不停云何宗宿應曰直須寒灰枯木一念萬年問者退復叩一尊宿尊宿犬喝曰是誰起滅問者恍然悟入夫散亂者起滅之謂也惟其有散亂則有無記曰求其放心攝散亂之謂歟夫問者之問諸口答者聲入而心通也答者答諸口問者其亦聲入而心通而恍然有悟歟夫子十有五則知志于學三十而立焉四十而不惑焉五十而知天命焉六十而耳順焉夫子聖者也自十五而三十四十五十六十學中之境若不易躐等彌入而彌深余愧十有五未知志于學不先一簣何以成山雖踰五十罔知天命惟先生始志聖人之學今臻聖人之年前乎此者立與不惑與知天命皆見於躬行宜士君子聞耳順而稱慶也然順乃先生之耳也余未及先生之年未知聖人之學又安知先生之耳是故耳順乃先生獨知之境也然則一曰寒灰枯木一大喝之先生聲入而心通其必有分焉無記散亂斯無地而寄余野人也拈此野語先生亦樂遊方之外必有取於是贈丁虞卿序昔管子以叔牙為知交遊處匪朝夕也其或有一晤對一促膝遂悉其生平者乎虞翁長者也余得訪于十年之前又獲晤于十年之後滄桑變遷干戈擾攘其胸襟固自若也其躬行所可見者有五世耕于野樂聖之道天民也誦詩讀書惕若乾乾君子也知雄守雌反華歸樸老氏也教子以義繼事承家仁人而孝也不求聞達高臥湖鄉又逸民也至聞南巢倒戈應天順人而終念乎揖讓晚號虞翁其自信歟子謂韶盡美又盡善然則虞翁誠得孔子之意者余游方之外交固疏而所見有如此乃樂為道之諗于深知翁者一印同異贊曰耕讀傳家孝友鍾性晚以草木是娛而琴酒多興虞翁虞翁其生今之世信而好古不知老之將至者耶以廬山摩巖石刻涪翁所書七佛偈為山翁和尚壽序乙未之秋客有來自青徐間者向余曰大覺山翁和尚將還廣陵矣菊月是其誕周行七步獅子吼矣法臘既高指天指地前無釋迦後空彌勒誠獨尊矣子為同門稱最契將何以壽之余茫然無所應久之客去乃思古今人情皆有好或投所好則合投所不好則暌雖幅員之廣君孤之奉苟非其好有不屑視者是故君子觀其所好則知其志之所存誦其詩讀其書貴知其人也昔者虞舜登庸位在九五苟拂其志寧遵海濱于是知舜之所好在親而不在九五伯夷叔齊餓于首陽采薇而歌其所好在仁求仁得仁雖孤竹可不處首陽可高臥夫子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好繇是言之人情之所好其係亦大矣易曰不事王侯高尚其事乃宋之大儒則又以子陵一釣當之余故知富貴浮雲曲肱樂道彼六合之內亦有然者況沙門觀三界如幻達萬法如夢其心如枯木石頭世之榮名利祿無自而入其有所好乎雖然枯木石頭仍有所好也特所好有異於世者所異者何法也請言其法蓋佛祖授受俾人息妄緣詣真際解脫世間而登道岸者是故沙門之於世也無尊爵無顯名三衣麤疏一缽五綴亦甚卑也至論其所好所謂不事王侯高尚其事則其志有足取者至以其法悟人博地儕於古佛而不下於先聖賢此其法不又尊乎識者曰出家乃大丈夫事非將相之所能為誠然其語矣今之沙門行其志於四方者眾矣其孜孜以法求人如飢渴者非我山翁和尚歟余諳和尚胸中絕無他好者是將何以壽之乃若香華枝樂名衣上服檀越持矣霞絛錦軸鉅文宏詞宰官懸矣伊蒲之饌甘美之果弟子陳矣余又思擬將何物為和尚壽耶一夕坐中庭偶見和尚為曉音禪客書草菴歌一篇勁而古視題款乃初住道峰時作余訝問音曰和尚在道峰住持事繁何有餘暇作此音答曰此和尚中夜筆也余益訝之音進曰和尚誨人不倦筆硯布施至忘飲食此未足盡其尤好七佛偈書蓋千百紙矣隨人所須無吝余曰有是哉乃知和尚真得所好也真能以法誘人也憶在昭陽結冬有貽余山谷七佛偈為廣鑑瑛禪師書刻於廬山巖石者余亦珍而藏之蓋六年矣于是忭舞曰是可為和尚壽矣夫山谷宋學士也而有合于廣鑑為書是偈其亦尊於法耶當其時更有居士曰蘇子瞻以怪石供僧佛印發于文佛印鐫文于石說者曰沙門觀法果如幻耶一怪石何好之甚也余曰是宜好非爾所知也夫子瞻與佛印為禪喜游其心志一寓于石耳非以石而能致沙門之好也是故君子觀怪石之好則知佛印之所存觀七佛偈之好則又知和尚之所存怪石焉七佛焉前後一揆也余以是知和尚必與此刻為水乳其他皆非所好是則余雖持多年故紙為和尚壽不愈於持香華諸供養耶和尚聞之其必囅然一笑雖然和尚適有是好無是好不能顯此刻余適有是刻無是刻無以合於和尚嗟嗟和尚之好山谷之書相去蓋百年而乃合焉猶旦暮遇也其亦有待耶余筆之於文寧不為叢林盛事記雲浦上人書華嚴楞嚴二經記法界之性如光與音推覓不得而實無不遍緇友雲浦會稽人剃染蘇州海慧菴結屋太平蕪湖號冷瓢就冷瓢中書佛華嚴經方竣兵燹作乃攜經至海慧值歲荒饉檀施絕少復罄其衣貲書楞嚴一部志可嘉也辛卯十月望前余從京口下吳門憩閒來居暮雨中浦持二經過余修敬畢未及數語置經於案遂別而去余因憑几思曰若人之來其有意乎將謂我能證知法界之性欲三印可耶抑亦自念其為法之勤欲表而出之耶因又思之法界之性從本以來彌滿清淨若人未書是經法界之性未為減也不書可也已書是經法界之性未為增也書之亦可也書不書在人於法界性無所損益雖然由是經以知法界之性言以載道也由書是經乃能精一其志開法界門人能弘道也不書是經又烏乎可浦之行其大矣乎嗟乎人生芒芒終身焉汩汩知身而不知世界知世界而不知法界苟知法界則吳越一天也何地盡山多指為兩域乎滄桑一幻也何定鼎割城悲為兩事乎蠻觸一體也何左強右弱分為兩戎乎佛生一性也何螢火太陽執為兩光乎死生一如也何持瓶餉遠認為兩空乎成壞一際也何剎那百劫視為兩時乎所以海慧此法界也若人之降伏塵勞也冷瓢此法界也若人之生如來家也華嚴此法界也重玄之德佛證窮也楞嚴此法界也法界事事究竟堅固也又且若人之來此法界也信能必至如來地也若人之去此法界也如來宮殿無有邊也乃至余眼閱之余心思之余舌證之皆無障礙而遊於言詞三昧無非此法界也是故以法界證法界空合空無二相也以法界入法界水投水無二味也極而論之法界之性大不可思議也言詞喪也心慮忘也芳草綠落花紅余之筆舌又何能形言也乎當瞻仰象王獅子哮吼迴旋可也於是投筆起座袖手顧視復還其經松陵乾元菴圖冊記人之情有雖去此百千里而思悠悠不置者必其所好在是也人之志有雖處之勝地授之大任聲名洋溢歸者多而從者眾恒有不釋然者必其所適不在是也余在俗髫年見比鄰少年以紛譁相競遂心薄世間逮入法一丘一壑蒲團草座始與志適然賦稟庸僻無高人達士探奇選勝之韻宇內之名山大川無暇登討第志在枯寂雖不期山水而遇山水清寂曠遠之處意即合焉曩住銅井湖光山色行坐在目居常飯食訖遂獨曳杖出門跏趺于山椒日鹵而不覺解事弟子常挈茗相從又時過鄰菴賞花看竹晚沐已乘月而歸或信宿焉留連於春芳秋香之下此住山之樂與志甚適也後下銅井過禾中古南一土鎮耳喜舴艋甚便梅村竹嶼靜侶二三時偕泳游亦甚適焉將忘其老奈之何業風遠吹直至太白峰下住持之縛松關廿里使人不易出侍者曰春風和矣岩花放矣予方跼路一室中酬應人事以一指而喻眾指以一心而齊眾心雖非紅塵之僕僕豈如青嶂之閒閒噫亦甚不自適矣幾何其不病乎且也無鄰叟可以話心曲無方舟可以濟足力雖處雲上猶繫籠中日長如年每忽忽而不自得正無以遣情排悶乃企周禪人自松陵持乾元菴圖冊來余展而觀之躍然得見所好忘所不適指以示周曰茲菴乃吾舊所游也常在意中雖千百里而不置今子不遠將來余睹蒹葭之橫直煙水之微茫風平波息龍湖如鑑余恍若至其處是宜忘山中之不適而適此適也子可謂貽吾所好也雖然此乾元之境也境中有人焉其稱木浪者參先師於育王根利而有得惜歸不壽余因之得交其上下其稱愍公者年長矣謹愨而好道記菴之始末即其筆也此老為木公之上其下數人事余若師大率皆有向上志欲高飛遠舉惜有菴之勝即有菴之事役而未能是故余之所好在龍湖而龍湖之好又在人耳嗟嗟吾衰矣何當出山一葦杭彼開襟話舊寫今日予之所思適他日予之所適也乎辭曰龍湖之水兮春煙淼茫龍湖之蘭若兮春鷗在旁茭蘆青青兮荇藻含香微風一葉兮于以采芳疏鐘清磬兮宛在中央翩翩道侶兮上下允臧懷斯念舊兮幾換星霜孤蟾靜夜兮讀經琅琅龍湖之人兮眷眷而不能忘銘正觀堂銘世出世間事有宜銘即不銘於筆而有眾欣然共銘於心者必其事為最勝因緣大有益於群情也昔蘇長公為成都法師敏行作大悲閣記表於西南開化米信其記以菩薩證道從聞而入始於聞而至於無所聞從無所聞而至於無所不聞夫證道而至於無所不聞則菩薩折攝之用咸備清淨寶目母陀羅臂左右開合八萬四千或慈或威神化莫測所謂觸而不亂至而能應蓋不期然而然者而世乃以千手千眼稱之斯亦菩薩憫世狹劣特示少分而已所以然者夫眼生於面手根於身眾情所知也捨兩眼之外不知更有所謂眼矣捨兩手之外不知更有所謂手矣而聲色紜紜交乎前無不以兩眼物色兩手執持乃菩薩則異於是千眼為視千手為用千眼為視不住色也千手為能轉物也此妙智淨覺眾情所未喻第向以眇小自居卒然見菩薩手眼皆千變化奇幻自不覺聳然動容肅然加敬曰是菩薩者何眼之廣耶手之多耶其神力所致歟將道德所感歟是菩薩者得瞻依之必能脫我於塵勞必能置我於道岸於是菩薩悲心與眾生信力融結為一勺水獻花行道禮拜菩薩等行其慈眾生默開其慧菩薩不以高陵眾生眾生不以卑遠菩薩眾生以兩眼畢見菩薩之千眼以兩手能舉菩薩之千手兩眼能見千眼兩眼未嘗不即于眼也兩手能舉千手則兩手又未嘗不即千手也其故何哉千尋之木枝葉婆娑而根本則一也雖眾生未能以是觀菩薩而菩薩必以是觀眾生是為正觀奇哉有情亦有手眼芒芒昧昧自不能明必觀菩薩始獲開悟則菩薩之手眼其可不彰于世乎天宮寺永安房雨新上人律身清淨發願廣大有念乎菩薩功德外募檀信內罄衣缽搆堂三楹三年而成像設未也有檀越顧敬修氏夙領佛記樂法無倦居恒欲求妙好旃檀肖菩薩像慮像成無棲像所是二上士皆含千手眼于一念乃時節之巧機會之來虔奉是像即居是堂依正恰稱聞見為之踴躍焉其法祖玄若大比丘奇此因緣乃顏其堂曰正觀表菩薩之正眼寂然嘗照無奔逸相菩薩之手展握自在援溺拯迷是眼與俱若公與余蓋法門久交走書來囑作一銘誌余因助發正觀之義明菩薩之化功且念斯堂之成也菩薩之所居也天龍鬼神緇流道俗皆已銘諸心矣奚待余銘于筆耶重其事不惜繁其辭願入是堂者一瞻菩薩皆得正觀而銘又何辭銘曰大悲正眼智為其根一而彌曜萬而不昏昔有尊宿問於臨濟急下禪床當胸把住暗中摸枕賺殺雲巖通身遍身大費涎黏何如菩薩開手見眼覿體示人超諸方便咨我同人等具妙明攀緣苟息酩酊必醒天宮吉祥永安常住知恩報恩五體投地震谿堂銘震溪吳門王子子佑之別字也其堂子佑所搆也子佑素未面其具信根嗜法味蓋得之緇流道侶交知之間茲作堂顏之以字者何義或曰子佑上世家於洞庭昔文恪公曾以震澤名其書四方之賓朋稱王氏必曰震澤主人子佑仍斯名不忘所始也余曰夫如是子佑已自銘矣今遠緘溪藤來山中冀必有異聞因遂駢其說夫震陽在初九天體也有雷之象群陰固結之時天心卒復擬其埶微陽若不能敵于群陰然雷霆之奮昏蟄盡驚醒聾聵於夢鄉以進君子之道而開小人之疑無若震焉子佑儒者斯義稔知之矣例之吾法覺海澄圓絕無陰翳奈何所立炤亡遂爾惑霧興焉癡雲暗焉纏綿於妄想膠執於名字而本真隱矣苦世火宅有生不覺夢中蝴蝶恣意餐采其情戀戀至于業風橫吹異類錯變紛紛紜紜咸莫知其故于是大雄氏出喻以無常示以苦空誘以車玩指以衣珠如鼓迅雷震其頂門大根之士一念迴機群執盡喪有若千年之室冥冥蒙蒙照以一燈朗然分曉未可以諸暗之聚合而謂徵明之不勝也陽之克陰覺之驅迷大概如是子佑好佛者因以是進之昔玄沙備禪師得雪峰之道有僧來參請垂示沙曰汝聞偃溪水聲否僧曰聞沙曰從者裏入此亦震之用而世未之或聞者也余深嘉子佑之作是堂也發佛祖之秘蓋從是得入偃與震不謀而合溪與水不言而自喻矣東坡居士曰溪聲便是廣長舌此文字禪也因不以是為註腳銘曰覺海澄圓清淨本然山身溪舌名字誰宣照亡所立昏霧斯集異類變更有生疲繭大雄哀哉從是而來宵中一炬雲中一雷鼾夢既覺法界寥廓溪耶水耶無受無作持以信力洞開重門萬物紜紜各歸其根事得理融理隨事變半偈緣空五車文絢佛祖在邇箕裘有光世而出世偉矣斯堂木樹根銘余不善植花禪子供茉莉一本愛其香而存之越明年枝葉四布有加于昔花開以百數計木樹根者爛于深山不知幾何年矣皮脫而心空采薪之侶將置燢下余見而惜之取以障其花峻拔之狀有如崗巒映帶林薄洞穴天成可觀當停午炎氛逼人解衣磐礡覺中庭有爽氣既悅其幻乃復作銘銘曰惟天之道法乎自然此木樹根在山忘年手攜成山不營一簣惟花近之林薄相類一青一朽神理各全花香凌晨直達其巔
