body:
  text: 東吳毛晉子晉編閱鄂州記室智時較訂文庚頌雪竇石奇和尚手書華嚴經頌大哉毗盧法界藏廣漠甚深難思議一塵中現無盡塵塵塵有佛剎安住佛身充遍悉無餘毛孔復含無盡界依正同然莫可分而亦炳然不雜亂譬如千燈共一室亦如帝釋寶絲網十方薩埵來如雲影現其中作佛事各說所習妙法門各各向我毗盧佛菩提樹王枝葉旋婆娑遍蔭金剛座雲臺寶網彌虛空自然而雨莊嚴具如是眾妙莊嚴具皆代如來宣法音如是法音流十方愚癡凡夫若聾聵焦芽種性亦尟聞大心眾生乃能見唯我勝友奇大師舍盡曠劫妄想執竟將舌端作墨海書此無礙妙章句置於空山勝道場風雲樹神冥擁護我來獲窺心眼開三復喜覺盈身意再拜稽首世間雄及與遮那昔同行願大悲雲遍覆我令我速達根本智令我速成普賢行願樓閣門彈指入願三世性疾明了廣及沉冥諸有情剎那共證如是法四大家所書華嚴經頌有序十一首騎虎頭踞虎尾第一句下明宗旨毗盧老人偕同行菩薩在逝多林中現無量神變正如傀儡登場尊卑好醜詼諧歌笑一一可觀不知線索卻在別人手裏當時二乘在座聞如不聞見如不見豈不是具大人相然且喫飯同個缽盂腳下有一坐具地無人占得道他未遊華藏無有是處善財童子一生參學便與普賢行願等大心菩薩聞風而起從昔至今換卻人許多眼睛此又是大奇特事可想可想然則要明華嚴宗旨端在第一句毗盧老人坐菩提場未開口時已落第二句畢竟如何是第一句住住趙州云如人暗中書字字雖不成文彩已彰頌曰四家書部好華嚴末後山僧動筆尖春過小窗新綠滿象王鼻孔一時拈毛錐快利墨池渾攜手同趨法界門等是法王真眷屬菩提場內各稱尊慧業文心不等閒留將點畫在人間參求倘遇奇男子樓閣重重海岸邊青山白社送殘春流水桃花試問津誰是曼殊誰遍吉毘盧法印屬當人一莖艸上現瓊樓湛湛壺天賞不休五百聲聞齊按劍如何能把夜光投兜率須彌最吉祥坐來宮殿寶雲彰至尊不必重開口自有群仙說秘方寶網華幢匝幾層光明雲裏應真僧轟雷莫駭從空打三月龍門燒尾騰娑羅林畔水煙深海闊山高月未沉路債未完鄉夢杳隔江招手有知音真金不厭火來鎔淨極光生匪類銅打就瓶盤好顏色街頭賤賣與村儂高山日出影蒼蒼多少人家在夢鄉若使玉雞啼得醒眼前天地只尋常法界浮雲點太清到頭凡聖也空名劫先木馬嘶風起直踏毗盧頂𩕳行補陀山舍利頌明州鄮峰育王寺應現釋迦如來舍利世所知也丁丑春余友同參木陳忞公登南海補陀憩錫梵音庵庵亦有塔供舍利詢其所自庵主云有梵僧賚至亦釋迦分身也公因捧瞻作記發揮如來因地精詣明暢余讀而踊躍乃稽首贅為之頌佛真法身充滿法界歷古亙今無成與壞草葉縷結大地山河絲毫不隔交光相羅咄嗟群有迷頭狂走常樂法中死生虛受唯我鼻祖神而明之巍巍堂堂三界大師鹿苑放憨雙林賣俏火光自焚百骸俱妙梵僧何年來渡海潮被褐懷寶一葦飄飄小白巖前解開布袋阿誰證明有觀自在鄮峰相望隱隱隆隆一點水墨兩處成龍地變黃金河成酥酪如來身相何處摸索咨爾海眾切忌尋光外求有相與汝無當勺水獻誠散花供養我身佛身等無二相見法實相證佛堅密萬水一源千車同轍自覺覺他盡未來劫我作是頌普告來哲千手眼大悲菩薩頌大悲菩薩垂方便於一身現千手眼眾生本有種種欲菩薩乃示種種變日月寶鏡摩尼珠蒲桃楊枝及罥索寶盂錫杖白拂子傍牌弓箭金剛杵慈威並作折攝施天魔鬼神咸拱伏青紅紫白妙蓮花五色雲中有化佛菩薩神變何有窮四十二相示少分吁嗟眾生乎眼同自蔽妙明異菩薩大悲心中平等慈巧將安置菩提路我伸讚歎用筆舌亦以手書以眼照敬將少問問菩薩我身手眼凡幾何菩薩廣開甘露門熙怡必當酬我問見聞隨喜得心開亦如菩薩所回向雪彌勒頌十二首不待當來早出頭曾拖布袋走明州滿身寒雪今來此又等何人海岸遊頭顱怕載寶花冠冰雪為肌頗耐寒族姓多遊成佛晚卻來村院暫偷安兜率陀天懶得歸放開捏聚應群機分明遍界身無隱惱殺行人看雪飛坦腹春風牛似獃誰知大雪滿頭來時人未識真彌勒惹得渠儂笑滿腮一片清光遍界鋪誰名彌勒起規模問來直得禪床動好送渾身入火罏多緣宿習愛風流面目無端混玉樓笑煞當來慈氏佛隨波逐浪幾時休一花一佛滿叢林卍字胸橫紺目深此個天真最奇絕嚴身不用紫磨金大地山河影現中正當彌勒顯家風眉毛仔細從人看非佛非心徹骨窮樓閣莊嚴日洞開天光赫奕此中來遠方歸到門前坐合掌南參有善財凜凜寒威萬屋霜重重帝網正交光阿誰成就無生忍卻把雙眉特地揚不離兜率降王宮佛佛從來示跡同淨業久修無染污何曾真入母胎中淨琉璃地作安居笑臉人人識得渠何物手中多賣弄數珠百八是硨磲和南宋天封佛慈禪師蜜蜂頌二十首有序附原頌及金明進禪師和併序余閱佛慈五頌詞旨超卓蓋資深逢源為人一出手眼者也學者捧誦政不可作游戲文字觀耳因亦步武奇正相生機軸各變變固不窮第不知鍼鋒毒氣阿誰撩著失聲叫喚目蜂子為仇讎也呵呵附原頌見金明寺斷碑千花蕊上刺香時百艸頭邊得意歸一竅透穿通活路遊行無礙去來飛風光占盡作生涯鬧合門前趁晚衙君看不言而自信兒孫整整世其家桶底遭君打脫時從前活計頓拋離超然不戀舊窠窟空有層層釀蜜脾平生底事付風光日暖花開個個忙𡎺著等閑遭一劄痛連心髓要承當老閉刳桐向上令參一竅通禪者不須窺戶牖鍼鋒劄著面皮紅金明進禪師和序曰余庚寅春移梅次掘深土得斷碑半截洗閱蝌額有天封佛慈禪師法語八字下勒警語一篇并蜜蜂頌五首蓋南宋紹興己未長至日華頂支離覺穸書遺祖炤顏侍者者余為移至法堂及稽燈傳佛慈為圓悟嗣又考真歇了塔銘了曾在祖炤會中為首座觀此洵知二大老出世開法金明非小緣也敬述緣起并勉賡和順治乙未春金明悟進識類墮風光妙密機紛紛鬧裏帶香歸百千慧命同心接不令而行翼翼飛同門出入各天涯縱在途中不離衙滿徑芳菲皆活計翩然落艸問君家驚天動地出窠時義斷恩忘永別離從此門庭雖各立同風千里蜜生脾朝朝鼓翅弄晴光拭露穿雲花底忙劈面相逢無避處一錐腦後痛心當從緣入得這空桐透過窗櫺處處通豐儉隨家同受用江南三月落花紅因陀羅網未生時攪亂虛空著處歸漆桶相呈收拾後解承家業出林飛百花叢裏作生涯隨分些些納入衙花肉盡捐唯得髓老胡一脈此傳家鋒鋩各展令行時日炤天臨勢陸離為問花間多少眾三三算去燥人脾大地何曾礙眼光色空明暗大家忙一門狹小挨身入殺活之機不可當百千聲氣聚刳桐卻許知音暗裏通笑煞等閒非種艸刺來皮下血無紅又風和日暖百花時此出遙看彼又歸個事克勤能荷負全身入艸又還飛春光如海浩無涯喜得花林近在衙活計天然無打算枝頭一拶便還家紛然作息太平時生死同條誓不離李白桃紅遊法界花成蜜就慰心脾多年漆桶忽生光早起花間炤舊忙渴飲飢餐現成事潛行密用貴相當俊哉出處托孤桐門外無容一線通春色暗藏姑待價無端野老眼睛紅又遊行紫陌賞花時陣陣香風透翼歸竿木相逢渾不讓通身活眼重前飛抹過山巔又水涯無邊春色總投衙就中堂奧無人見明暗相參付克家聚頭林下此何時真子俄然敕遠離各自稱尊蕃化育拈來山蜜潤君脾聚糧三月趁春光大似禪和普請忙未肯見人胡亂刺從來鍼芥要相當高山流水在枯桐異類中行氣味通任運杳然忘歲月楓林秋老不知紅又紛紛蝴蝶鬧春時採得花香各自歸鼻孔一同為夢異入廛還共漆園飛三月春光亦有涯晝長花落靜山衙運籌廊幕無行跡妙握寰中見作家林間分化羡知時飲啄尋常道不離摶取上方甘露食中邊一味養人脾扶桑日出海門光舉世營營有底忙六月山房爭坐蠟曼殊隨處請承當西風剪葉下梧桐吹起秋聲萬竅通巖穴隔開人世事明年再看百花紅贊一佛兩菩薩李子曉令倩周君圖繪供石佛庵石佛先住畫佛後住先後不同同稱尊世石佛維堅畫佛維好鎚鑿既精筆墨亦巧獅子奮迅象王回旋偉哉上首各坐一邊三人相對眉宇澄徹毛孔細看有無盡剎文殊智深普賢行大迦老無為一彩兩賽凡百瞻禮分別則癡請看鼻孔人人下垂藥師佛乘白牛像佛心慈牛角雄遊行法界疾如風分身異類中琉璃光明不可掩清淨願海十二重觀音二首空谷之音有呼即生感斯應斯啐啄同時是為妙智救世間者君子頂戴其文蔚也介盤文學請無剎觀音不現身那分南海與南京賓寰信得時瞻禮鸚鵡崖前送好音繡觀音一絲未動妙相難尋金鍼纔度慈容儼臨獨立鰲頭以耳觀音寂然而應一極悲心流者是水飛者是禽圓通無二顧盻沉吟大悲菩薩有手能用有眼能照云何菩薩照用獨妙隨眾生量計數以千而虛空體曷乎方圓凡百有求誰無手眼就路還家滿菩薩願魚籃大士行大方便轉大癡愛籃中鮮魚是人喝采除卻馬郎不知誰買大士象王圖打鼓弄琵琶相逢一會家我方垂隻手彼亦露雙牙水盆苕帚錫杖袈裟機錯落事交加商量個事無終極一片娑羅蔭石斜羅漢二首虎可馴兮龍可制聞聲見色心無住已超三界大火宅並坐山林恣遊戲咄有朝瞥地肯回心定不作斯自了計朝遊西天暮歸東土遇著同流並頭晏坐我不知其誰謂是出塵羅漢目光暸人長眉覆面相顧經年梵冊不展未免借伊竹杖各與三十何故不見道不起於座現威儀坐證無為未足奇十八大阿羅漢卷奇哉奇哉這一隊漢不從天降不從地湧劈空走出大家打鬨向聞迦葉三昧阿難不知阿難三昧商那和修不知問伊行道甚年中切忌去來隨六賊打頭彌勒笑呵呵布袋橫拖肚皮急知他成佛在何時面面相看露風骨咄十六阿羅漢卷十六老古錐皆是阿羅漢煩惱雖已除餘習猶未斷各自逞神通慣尋山水看秪因無殺心猛獸都合伴現身亦甚小量來三寸半飛騰向虛空把人眼睛換三界苦眾生擲下渾不管如獐在鹿園獨跳從他喚若遇黃檗老腳脛定打斷初祖達磨二首道人一白紙索我題達磨山僧難下筆云是踏根蘆阿呵呵即便寫將去休得怪我以訛傳訛棄國榮如敝屣輕世珠若鴻毛打通作祖路愛撐逆水篙不立文字直釣鯨鰲服毒六番有進無退面壁九載所唱彌高胸中氣憤憤眼底空勞勞家風愈久愈堅牢垂芳百世起人豪天童老和尚二首生平愛打人一杖手摩娑奮然提正令人天沒奈何者般窮伎倆殃及子孫多陽羨山中賣柴叟霜髮根根頂門透傳持臨濟正法眼拄杖拂子嘗在手描之盡之恐成窠臼要得其真懸崖撒手懸盧上人請石車和尚三首昔日師門求德友下問謙光有阿兄面目至今無改變當軒瞻仰倍分明行濟北令作僧中英葛藤斬斷大用縱橫不虛與我同根生為天童子坐金粟山本分接人牙爪斑斑末後一著把定牢關鄉音曾不改只是金華蠻雙眉在額短髯插面代佛祖化鑿人天眼七八年來恢舊院覺得精神倦隨處偷閒且自便雪竇石奇和尚二首崚崚嶒嶒平平坦坦大大拄杖打人不緩生平把手共行師鼻共見一半你住乳峰我太白晚年風味相追逐二甘露門誰信道五湖雲水徒遭毒善哉賓上座好請歸嘗熟賓化姪請剪除荊棘瓦礫坐鎮虎穴魔宮句裏壁立千仞杖頭八面清風林野和尚三首十二人中你弟我兄十三省內我吳你蜀鄉語雖然不同要且各自成曲別來十數年春蘭與秋菊太白峰頭撒手行炯炯一燈光濟北初住通玄後太白垂手為人唯楖栗卓禪描寫渠供養炤顧頂門那一隻踏過蠶叢路山川坦平掀開灩澦堆舟航穩當晏坐曲彔床為人嘗說法法法何曾法曇華隨處發法曇姪請自題頂相三首猛烈之性惡毒之口以之立身以之事師以之成友友多畏渠師卻點首正法門倫理掃庸流窠臼苦煞生平不近人空搭伽黎世間走消閒且自揭傳燈臨濟兒孫有此否登泰山而小天下登彌盧而小神洲本來隻眼蓋天地時人向外爭馳求憶曾行盡驢馬腳兒時做處老知羞被人捉向法王座一年半病隈床頭見人不是面孔冷赤心一片深相酬對人不是少言語嘈嘈怕落今時儔誓將脫去住持縛滄波萬里隨閒鷗壎箎奏箭鋒投梅谿風月消吾愁者漢面目自識尋嘗不黃便黑噇卻何處酒糟不覺添些春色雖為臨濟兒孫最怕聲名烜赫將老鶴林勉主太白腳跨兩頭業緣苦逼終期滿酌寄奴泉臥看江帆千尺三教圖三人相聚眉毛相同切忌妄分頭角失卻本來正宗純陽大仙十洲三島恣翱翔鬼子相隨負藥囊不達玉清皆幻化紛紛世上盡黃粱勝師伯像咄此個尊師世間難得出語實頭為人本色不參禪而正信調直不持戒而梵行清白荷負叢林輔弼知識三十年如一日末後逍遙柏樹邊怡然非語亦非默等閒覿面要知渠是我山中勝老伯仲師伯像少小入佛曠劫捨情事知識生平不忘管帶臨終時乃得超然便行存道以默接物以誠艸木為友筆硯娛情啟後昆能成立贊先宗使克明吁嗟兮歸來水流花開空山無人素純法師像眉濃眼大性剛心直窮途握手道義莫逆別來數年古貌懸壁僧伽黎被體恍惚戒香來薰脩多羅在口旋驚義海湧出養之有素涅而不緇難豈苟避身若不知夫是之謂出世之傑士法門之丈夫死生無變於己吾友素法師芸居玄若機公像法解得高想吟情出靜思芸居曾把關面目少人知淡而不疏其交友也慈而有禮其誨徒也指揮如意化現天宮乃緒餘也噫嘻維石巖巖松蘿夤緣閒來撫膝爐香滿前耆年解脫一坐十小劫聽鶴鳴之在陰聲聞於天雲岫庵隱山老宿像貌古神清耳長髮白建僧伽藍於孤峰請佛法藏于上國以攝六根兮而繫念於古佛青蓮以一宴坐兮而投機於尊者紫柏游大人之門固難為言觀滄海之量自難為水古稀告寂其儀不忒貽厥孫謀永懷靡極傳輝大德像住鷹窠頂聽頻伽音寶池玉樹應念而臨唯有吾宗不許動步心佛俱非全機獨露年踰知命別傳是依真燈不泯為爾傳輝寶山老師像胸中無一事常年自瀟灑熙怡現作比丘身出塵不用離家舍問伊日課汲水灌花閒趺雙膝一香一茶時節到來不留長物臨行受用數珠百八丹青寫就不知名梅谿鎮上清閒佛慧明上座像者阿師似阿獃喫著叢林閒飯只拾破艸鞋到處人稱你你向何處挨阿呵呵我不問你禪不問你道只問你甚年中遇大東風吹閃腰至今歪道不得蛇頭棒三十請自敲潛庵老師像諸合甫居士請昔在吳門與師相見一別多年只此舊面常坐三昧他人不知闇然日章潛也亦宜即假即中出入教觀世與出世兩頭坐斷孝思不匱有嗟蓼莪可繼可述家風不磨雲在庵道嵩師像圓頂方袍事親如佛雖為洞老漢兒孫卻得陳蒲鞋一橛二十餘年清修常轉數珠百八一微塵裏小搆精藍一剎那間正念瞥脫傳家只望後頭高北立玉峰青鬱鬱從聞友人像頂髮黑鼻子赤整衣坐語似默拂水山頭卓庵太尉祠中晦跡為雲棲裔入藤谿室慈澤未遠家法斯得梵行懋實聞見獲益問彼生緣與余同里道貌溫然如兄如弟言交有年敬題數語智林寺屺瞻開士像面長耳大眉聳顴豐臘踰從心精明兩瞳頤養清修智慧林中振茲火蓮追芳了通火蓮了通皆虞山應化尊宿家聲嚴正後彥叢叢年世可卜香剎永隆雨庵大德像山水為心松柏成性歲寒不凋其臘何永瑞艸盈前瀑流響應耳根不偶見法寂靜物外優游人未知山童特地炊香茗巢修上人像父母未生真面目靈然不昧在今時眉毛剔起匡床上又手閒閒有所思經在几悟由誰無論髓無論皮思盡還源明本地秋風落葉曉階吹慈航老師像生長廬陵不識米價住寺天台上無片瓦三千金化一人願力可謂不拔卻笑何人上釣一聲佛走四衢婆心只為太熱相逢尚有知音便恁麼也好休因甚又道個山頭翻白浪海底起紅塵熟處難忘真可笑世間疑殺幾多人石佛庵畫空老師像伽黎黃布袍緇坐樹根多少時常在定百無思戒珠瑩心地慈訓徒賢允有規人不識指問誰描畫來亦自奇石佛近應尒知明奇靜主像明奇老禪像來請老僧題題他做甚麼土上要加泥手中捏如意身上披伽黎問他住何處廣濟庵在小溪長庚鏡池老宿像生緣三佛地披緇太白峰出入清關橋行慣廿里松眼中瞳子能識人三請先師金粟身卒成中興天童大功業考鐘伐鼓日食萬指山光新余也獲交歲非一自隨先師至今日愛師品清眼力高晚年重聚歡無畢方情道誼生成有到山雲水皆如舊胸襟灑落不尋常煩惱見師開笑口頂髮年來霜雪多袈裟黃衲老頭陀白雲自去青山住一任人間爛斧柯濟寰老師像有松蒼然有石依然手執如意不作拳小庵寄跡良有年其言訥其貌樸髭髮漸霜喜無累神情熙怡長水邊寶塔在近閒雲舒卷即而求之硤山不遠石浪老禪像生緣在江北卻向浙中住走出叢林來即便冷冷地多年埋頭白水庵古廟香爐無火氣大似綿裏鍼棘頭刺冷地劄人非有意樗叟饒舌為汝證據李曉令持綸圖咄咄咄者個漢何處生非漁而漁觀者驚風度翩翩然信為人中英持竿而獨往視世鴻毛輕問伊姓不答姓問伊名不答名閒來竹院探宗乘撞著個多口阿師再四問伊父母未生前此身在何處曠觀百年後將復為雞為彈為漁去把住咽喉氣不伸不得不上祖師門驀忽兩關齊打破本來面目分明露咄咄咄休放過又竹林清風時襲人虎溪三笑側綸巾手撚髭鬚想何事眼空天地胸無塵孫冶堂行腳圖木杖芒履翩翩欲仙一笠如雲不飛在顛凝思注目有會忘言狹路相逢我不知其誰非羲皇上人即半是山居之讀書禪丁長卿文學像平疇曠然溪光蕩漾昔晤先生乃在庵中今日相逢卻在紙上鬚眉儼然本無二樣惟形與神超然難狀正冠危坐了無塵相世德斯馨千秋永享丁漢卿居士像夫何丹青之巧兮奪造化之功貌君子兮出毫端之淡濃雙眸兮湛秋水兩頰兮生春風步履兮有大雅度冠巾兮乃儒者之容知音覿面忽相逢問伊獨往將何從風波末路滿寰中湖鄉高隱輸渠儂李道人侍母行樂母行自行無人著力母樂自樂人難摸索母子至親或能知覺六十六年過去如昨九月黃花且共歡樂徐玉井道人像梧桐樹上白雲影閒坐石頭如不省如其要破生死關直須參透華陰山前百尺井戎明宇長者像幅巾正坐笑貌怡然為鄉長者享古稀年以僧為朋將米作飯一念西方更無餘想南無佛陀我昔供養丁華宇道人像蒼松之下獨自坐坐緘口不言思量甚麼面目清清手指尖尖有柄竹扇不扇且拈盆樹滿前非有意案頭經卷是何函問誰弟子必也無諳數珠為證定拜瞿曇陳衡山居士像二首眉平若衡髻聳如山胸無一事神色閒閒我來梅谿問法稽首涼巾道服獨行無偶本來面目超語言閒坐石頭叉卻手空明一片眼前開塊石相依絕點埃生就風神超物外得閒谿上看梅來徐玉宇道人像桂子香桐葉碧忙裏偷閒坐石邊好茶幾碗風生腋不須展箑衣巾涼行樂及時也難得漚花看破世間情生死臨頭只一默兒孫各自奔前程百歲光陰如過客浩然居士像士乙酉殉難生平抱義行天地臨難從容氣愈剛生面本來曾未死一刀家國盡生光殷元長事佛圖五濁八苦人生靡逃以病念佛其念堅牢願堅念淨樂土非遙現前末後諸苦頓超彌陀如來寶手親招蓮花坐臥樂焉陶陶八功德水日飲一瓢三界火宅從他自燒徐定宇歸來圖溫雅之度寬博之服峨冠幅巾內美郁郁實儒而獨立不倚似僊而放志遐矚百年一夢萬事蕉鹿宦海歸來盤桓松菊天竺先生夙有期覺路金繩晚歸宿伍虞顛道人像楊忠烈公初令於虞時樂公為方外遊而丞尹公浙之青溪人亦善公書中之賢酒中之仙末後乃參病中之禪昔人已去此像儼然此像非假昔人斯傳朱顏微酡神情甚全幅巾道具松下石邊著書自娛逍遙晚年誰為交知青谿之尹漢東之漣問其姓氏答曰虞顛一谿風月五嶽雲煙虞顛道人其果顛於虞獨為虞之顛也耶朱待予像幻中之幻身外之身有待則爾非予誰親耳目口鼻處動而靜大人先生就假談真寒塘曲曲春水粼粼藏山忽憶南華語只恐風霜老卻人吳節侯文學像道與之貌天與之形其顙䪻然眉宇清明余嘗晤對挹其雅度而得其生平其大者因心事父檢書燒燭中夜徬徨以文會友咀精嚼華發為琳瑯家庭之間肅肅恂恂上下和龐若然者非德行文學躬行心得入聖門之四科者耶若然者非尊其天爵棄其人爵遊於無何有之鄉者耶俯仰六合氣無不之眷彼美人或如西方有懷其親則歸中堂若然者乃如之人兮伊誰云亡曹母周孺人像伉儷相分在妙年冰心垂老對華筵兒孫若欲鐫貞德我偈應同石上傳汪子瑜居士像生平老實頭不愛閒打鬨雖然做俗漢卻有佛法種冷地要參禪開眼而做夢水滴石應穿眉毛幾時動山僧道若不騎牛覓牛直下與汝打破漆桶江君山水圖百虯盤屈深山樹萬馬奔嘶大壑泉中有人兮眉目好倚松聽水欲忘年項孔彰居士像一號易庵易庵變相多奇特臥庵癡筆欲為題安步當車交卻手不知心想甚東西佛說世間如影響即此便是真易庵看得水光山色飽歸來面上帶微酣王南伯文學再生像閒庭學禮朝趨大壑藏舟夜走轉過身來自看面目得如舊否丁籲卿文學像十二年前一相見今日重逢不隔線正襟危坐氣凜然只是從前舊顏面覿體證無生道近何求遠門前流水日洋洋德茂宗枝自蕃衍丁方荀行樂像果蓏在案樽酒按膝明月忽來炤我衣裓白鳥鶴鶴各適所適夜如何其梧桐露滴題王子佑松下憩圖千嶂縣泉萬馬聲長松夭矯老龍形蔭松坐石心眼曠瀹茗觀書神氣清昔人傲睨非捏怪石高千丈亦喜拜吾家本在洞庭西結侶煙霞期世外王順塘善友像古松蒼蒼白鳥鶴鶴春風來吹開我桃萼偷半日閒啜一杯樂雖居城南嘗行北郭菩提種子種多生恒結僧緣不為薄項素仙像此翁家東海邊用一指活萬千松下坐形神全以是人稱素仙雜題畫贊題畫簡兮簡兮彼何人斯抗志山林曳裾無羈有松落落有桐猗猗扣軫者琴下子者棋智運乎指心正乎思琴音棋響入耳神怡無懷葛天皞皞熙熙見逸乎爭得安於危高山流水待夫子期優哉游哉彼何人斯樂天知命彼何人斯牡丹圖華簇簇錦簇簇洛陽之春移來滿幅山鳥自何來羽毛同鸑鷟不擇他林棲文明喜茲育高堂張掛卮酒傾神仙未必居蓬瀛畫菜七首菜花黃蜂蝶忙兩朵洛陽花也來開在傍只好看不好喫分付看花郎採花無用急菜黃結子好打油洛陽城破花無色以味則異以菜則同甘辛誰辨老圃老農勿輕毫末而大太空君看須彌盧只在一子中菜根邊菔三個幾時種牛吞吐總然太湖好也落尋常數祖師道惟有鎮州出得最大種菜好在菜肥畫菜好在菜淡肥則入口淡則入眼君子樂之庖廚可逮上菜何長下菜能短介然以立不陵不援明乎庶物其學過半方乎小庭有芥幾莖不與不取思聖之任視非惡色得聖之清菜相近聖相鄰蔬食飲水富貴浮雲山上輥芥山下投鍼人身難遇佛語可尋積業若海苦溺方深以驚以惕慎其刀砧蔬食菜羹寡欲清心畫葡萄十一首秋初夏末方纔有多少行人棚下走抬頭貪吃樹頭鮮不覺流涎滿張口山翁憫之為出手戲拈竹杖一揮空坐見青天落星斗二佛喻眼根猶葡萄朵今對葡萄七月流火我既見物物亦見我物我皆真誰曰不可三色何紫能染指體何圓不忘天一顆之中滋味全百千萬顆無中邊四火雲燒成半紫半黑涼風吹掛半熟半生和盤托出滿架縱橫大家有手不須爭五不見葡萄種但見葡萄結春風解扶持藤本吹不折簇簇遙看紫彈懸輕輕一捏瓊漿泄無怪村童入眼譁從知小鳥牽藤悅秋暑冒征途何人是無舌六老藤似蛇蟠臘雪凍不死春風復蔓延夏葉猗猗然開花結實紫黑兼維筐及筥信手拈多喫之時口皮破是知取物宜乎廉七如眼之狀得眼之光摘來個個俱鮮芳但能潤口不能飽腸藤花開時雖有香無使多種勝稻梁八果雖微味能甘藤雖老屈能伸葉雖薄兮能蔭人勿嫌顏色聖所惡等閒入口解生津九一個兩個百千個個個漸看藤上大大到甜時放不過半青半紫街頭貨十小于彈大于珠紫光燁燁唇吻沾濡甘味從來世所須只是不經咬嚼難兄難弟櫻朱十一秋煙霏微秋果碩秋林艷然色奪赤吾從眾兮口體適于焉逍遙采而食
